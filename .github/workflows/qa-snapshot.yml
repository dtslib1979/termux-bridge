name: QA Snapshot

on:
  workflow_dispatch:
    inputs:
      tier:
        description: 'Max tier to check (1=HQ only, 2=+studios, 3=all)'
        required: false
        default: '3'
        type: choice
        options: ['1', '2', '3']
      ids:
        description: 'Specific site IDs (comma-separated, empty=all)'
        required: false
        default: ''

  # Daily at 15:00 KST (06:00 UTC)
  schedule:
    - cron: '0 6 * * *'

  push:
    branches: [main]
    paths:
      - 'qa/urls.json'

concurrency:
  group: qa-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run QA check
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tier }}" ]; then
            ARGS="$ARGS --tier=${{ github.event.inputs.tier }}"
          fi
          if [ -n "${{ github.event.inputs.ids }}" ]; then
            ARGS="$ARGS --id=${{ github.event.inputs.ids }}"
          fi
          node qa/check.js $ARGS

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 14

      - name: Commit QA results (JSON + report only)
        run: |
          git config user.name "QA Bot"
          git config user.email "qa-bot@dtslib.com"
          git add runs/
          git diff --staged --quiet && echo "No changes" && exit 0
          PASS=$(cat runs/index.json | node -e "const d=require('fs').readFileSync(0,'utf8');const j=JSON.parse(d);console.log(j[0]?.totals?.pass||0)")
          WARN=$(cat runs/index.json | node -e "const d=require('fs').readFileSync(0,'utf8');const j=JSON.parse(d);console.log(j[0]?.totals?.warn||0)")
          BROKEN=$(cat runs/index.json | node -e "const d=require('fs').readFileSync(0,'utf8');const j=JSON.parse(d);console.log(j[0]?.brokenLinks||0)")
          git commit -m "qa: ${PASS} pass / ${WARN} warn / ${BROKEN} broken — $(date -u +%Y-%m-%d)"
          git checkout -- package.json 2>/dev/null || true
          git clean -fd screenshots/ 2>/dev/null || true
          git pull --rebase || (git rebase --abort && git pull --no-rebase && git push && exit 0)
          git push
