<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 -->
  <rect width="100" height="100" rx="20" fill="#0d1a0d"/>

  <!-- 크고 굵은 >_ 터미널 심볼 (상단 중앙) -->
  <text x="50" y="48" font-family="monospace" font-size="36" font-weight="900"
        fill="#34D399" text-anchor="middle" letter-spacing="-2">&gt;_</text>

  <!-- 브릿지 아치 (하단, 굵고 심플) -->
  <path d="M 14 88 Q 50 66 86 88"
        stroke="#34D399" stroke-width="5" fill="none"
        stroke-linecap="round"/>
  <!-- 바닥 -->
  <line x1="10" y1="88" x2="90" y2="88"
        stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
</svg>
