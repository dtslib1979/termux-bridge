<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 -->
  <rect width="100" height="100" rx="16" fill="#0d0d0d"/>

  <!-- 터미널 창 (상단 60%) -->
  <rect x="7" y="7" width="86" height="55" rx="6" fill="#0a150a"/>
  <!-- 터미널 타이틀바 -->
  <rect x="7" y="7" width="86" height="12" rx="6" fill="#1c1c1c"/>
  <rect x="7" y="13" width="86" height="6" fill="#1c1c1c"/>
  <!-- 버튼 3개 -->
  <circle cx="17" cy="13" r="3" fill="#ff5f57"/>
  <circle cx="26" cy="13" r="3" fill="#ffbd2e"/>
  <circle cx="35" cy="13" r="3" fill="#28ca41"/>
  <!-- $ 프롬프트 -->
  <text x="12" y="36" font-family="monospace" font-size="13" font-weight="700" fill="#34D399">$_</text>
  <!-- 두번째 줄 흐릿 -->
  <rect x="12" y="42" width="35" height="2.5" rx="1" fill="#34D399" opacity="0.35"/>
  <rect x="12" y="49" width="22" height="2.5" rx="1" fill="#34D399" opacity="0.2"/>

  <!-- 구분선 -->
  <line x1="7" y1="65" x2="93" y2="65" stroke="#34D399" stroke-width="0.8" opacity="0.3"/>

  <!-- 브릿지 (하단 35%) -->
  <!-- 아치 -->
  <path d="M 15 90 Q 50 68 85 90" stroke="#34D399" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 기둥 3개 -->
  <line x1="32" y1="79" x2="32" y2="90" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="71" x2="50" y2="90" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="68" y1="79" x2="68" y2="90" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 바닥 -->
  <line x1="11" y1="90" x2="89" y2="90" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
</svg>
