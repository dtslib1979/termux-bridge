<title>AI 기능인 백서 v2 — 통합본 | 27 런타임 × 7 스테이션 × 5 공리</title>

<!-- Parksy v2: Stripe Docs-grade interactive tutorial — WCAG 2.2 AAA -->
<!-- Performance: preconnect + DNS prefetch (cuts RTT) -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<!-- Prism CSS only (lightweight, prevents FOUC); JS is deferred -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      crossorigin="anonymous">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A1A0F;--bg2:#0D2214;--gold:#EEC864;--yellow:#F5C542;--green:#5DD9A5;
  --blue:#7FB3FF;--purple:#B59CFF;
  --muted:rgba(255,255,255,0.62);--muted2:rgba(255,255,255,0.40);--text:#FFFFFF;
  --border:rgba(212,175,55,0.15);--border2:rgba(52,211,153,0.15);
  --card-bg:rgba(13,34,20,0.8);--code-bg:#061209;
  --card-r:10px;--badge-r:6px;--border-w:1.5px;
  --anim:0.4s;--anim-fast:0.25s;--ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --stagger:0.08;
  --font:system-ui,-apple-system,'SF Pro Display',sans-serif;--mono:'SF Mono','Fira Code','Consolas',monospace;--body-sz:13px;--body-lh:1.65;
}

html,body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  height:100vh;overflow:hidden;
}

/* ── Cinematic filter overlay ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -5%,rgba(212,175,55,0.07),transparent 60%),
    radial-gradient(ellipse 40% 60% at 95% 50%,rgba(96,165,250,0.04),transparent 60%),
    radial-gradient(ellipse 40% 60% at 5%  50%,rgba(167,139,250,0.03),transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ── Particle canvas ── */
#particle-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;
}

/* ── Header ── */
#art-header{
  position:fixed;top:0;left:0;right:240px;z-index:800;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border-bottom:var(--border-w) solid var(--border);
  padding:14px 20px 14px 32px;
}
.art-header-inner{display:flex;align-items:center;gap:14px;max-width:1100px;margin:0 auto;}
.art-badge{
  font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);border:1.5px solid rgba(212,175,55,.35);
  border-radius:var(--badge-r);padding:3px 10px;white-space:nowrap;flex-shrink:0;
}
#art-h1{
  font-size:clamp(13px,1.5vw,19px);font-weight:800;letter-spacing:-.02em;
  color:var(--text);
  display:-webkit-inline-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;line-height:1.3;word-break:break-all;
}
.art-meta-row{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.art-slide-counter{
  font-size:12px;color:var(--gold);font-family:var(--mono);font-weight:700;
  border:1px solid rgba(212,175,55,.3);border-radius:var(--badge-r);padding:4px 10px;
}
.art-slide-counter .art-slide-total{color:var(--muted);}

/* ── TOC sidebar ── */
#toc-sidebar{
  position:fixed;top:0;right:0;width:240px;height:100vh;z-index:700;
  background:rgba(10,26,15,.75);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-left:var(--border-w) solid var(--border);
  padding:70px 0 100px;
  overflow-y:auto;
  transition:transform .35s var(--ease);
}
#toc-sidebar.toc-hidden{transform:translateX(100%);}
#toc-sidebar::-webkit-scrollbar{width:3px;}
#toc-sidebar::-webkit-scrollbar-track{background:transparent;}
#toc-sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.toc-label{
  font-size:8.5px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);opacity:.7;padding:0 20px;margin-bottom:12px;
}
.toc-list{list-style:none;}
.toc-item a{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;font-size:12px;
  color:var(--muted);text-decoration:none;
  border-left:2px solid transparent;
  transition:color .2s,border-color .2s,background .2s;
  line-height:1.4;
}
.toc-item a .toc-dot{
  width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;
  transition:background .2s,transform .2s;
}
.toc-item a:hover{color:var(--text);background:rgba(212,175,55,.05);}
.toc-item a:hover .toc-dot{background:var(--gold);}
.toc-item.active a{
  color:var(--gold);border-left-color:var(--gold);
  background:rgba(212,175,55,.07);font-weight:700;
}
.toc-item.active a .toc-dot{background:var(--gold);transform:scale(1.4);}

/* ── Slide container ── */
#slide-container{
  position:fixed;top:56px;left:0;right:240px;bottom:64px;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;
}
#slide-container::-webkit-scrollbar{width:4px;}
#slide-container::-webkit-scrollbar-track{background:transparent;}
#slide-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.slide{
  display:none;
  width:100%;max-width:800px;margin:0 auto 40px;
  padding:40px 48px;
  flex-direction:column;
  animation:slideFadeIn .4s ease both;
  flex-shrink:0;
}
.slide:last-child{margin-bottom:0;}
.slide.active{display:flex;}
@keyframes slideFadeIn{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Hero slide ── */
.slide-hero{text-align:center;align-items:center;}
.slide-hero .art-hero-title{
  font-size:clamp(28px,4.5vw,52px);font-weight:900;letter-spacing:-.035em;
  line-height:1.12;color:var(--text);margin-bottom:20px;
}
.slide-hero .art-hero-title em{color:var(--gold);font-style:normal;}
.slide-hero .art-hero-lead{
  font-size:clamp(14px,1.8vw,18px);color:var(--muted);
  line-height:1.8;max-width:600px;
}

/* ── Section slide ── */
.section-num{
  font-size:10px;font-weight:800;letter-spacing:.12em;font-family:var(--mono);
  color:rgba(212,175,55,.4);margin-bottom:8px;
}
.art-heading{
  font-size:clamp(17px,2.2vw,24px);font-weight:800;
  color:var(--gold);letter-spacing:-.02em;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:var(--border-w) solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.art-heading::before{
  content:'';display:inline-block;
  width:3px;height:1em;
  background:linear-gradient(180deg,var(--gold),var(--yellow));
  border-radius:2px;flex-shrink:0;
}
.art-body{
  font-size:var(--body-sz);line-height:var(--body-lh);
  color:var(--text);word-break:keep-all;
}
.art-body strong,.art-body b{color:var(--yellow);font-weight:700;}
.art-body code{
  font-family:var(--mono);font-size:.88em;
  background:var(--code-bg);padding:1px 6px;border-radius:4px;color:var(--green);
}

/* ── Highlight box ── */
.art-highlight{
  position:relative;
  background:var(--card-bg);
  border:var(--border-w) solid var(--border);
  border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  padding:14px 40px 14px 18px;
  font-size:13px;line-height:var(--body-lh);
  color:var(--muted);margin-top:14px;
  cursor:pointer;overflow:hidden;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s var(--ease);
}
.art-highlight:hover{
  border-color:rgba(212,175,55,.45);
  border-left-color:var(--gold);
  box-shadow:0 0 24px rgba(212,175,55,.1);
  background:rgba(212,175,55,.04);
}
.art-highlight strong,.art-highlight b{color:var(--gold);font-weight:700;}
.hl-expand-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:rgba(212,175,55,.4);
  transition:transform .3s var(--ease),color .2s;
  user-select:none;
}
.art-highlight.expanded{
  padding-bottom:18px;
  box-shadow:0 0 28px rgba(212,175,55,.12);
  background:rgba(212,175,55,.05);
  border-color:rgba(212,175,55,.5);
}
.art-highlight.expanded .hl-expand-icon{
  transform:translateY(-50%) rotate(45deg);
  color:var(--gold);
}
.hl-extra{
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--ease),opacity .4s var(--ease);
  opacity:0;font-size:12.5px;color:rgba(232,245,233,.55);line-height:1.75;
}
.art-highlight.expanded .hl-extra{max-height:200px;opacity:1;margin-top:10px;}
.art-quote{
  border-left:3px solid var(--purple);
  padding:10px 14px;margin:12px 0;
  background:rgba(167,139,250,.06);
  border-radius:0 var(--card-r) var(--card-r) 0;
  font-size:13px;color:rgba(232,245,233,.7);line-height:1.75;font-style:italic;
}

/* ── Bottom nav bar ── */
#slide-nav{
  position:fixed;bottom:0;left:0;right:240px;z-index:900;
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:12px 24px;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:var(--border-w) solid var(--border);
}
#slide-nav button{
  background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:13px;font-weight:700;
  padding:7px 20px;border-radius:20px;cursor:pointer;
  transition:background .2s,opacity .2s;
  font-family:var(--font);
}
#slide-nav button:hover{background:rgba(212,175,55,.25);}
#slide-nav button:disabled{opacity:0.3;cursor:default;background:transparent;}
#slide-nav .counter{
  font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);min-width:60px;text-align:center;
}
#slide-nav .counter .sep{color:var(--muted);font-weight:400;margin:0 4px;}
#slide-nav .counter .total{color:var(--muted);font-weight:400;}

/* ── Right progress dots ── */
#slide-dots{
  position:fixed;right:256px;top:50%;transform:translateY(-50%);z-index:500;
  display:none;flex-direction:column;gap:8px;
}
#slide-dots.show{display:flex;}
.slide-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);cursor:pointer;
  transition:all .25s;
}
.slide-dot:hover{background:var(--muted2);}
.slide-dot.active{
  background:var(--gold);transform:scale(1.6);
  box-shadow:0 0 8px rgba(212,175,55,.5);
}

/* ── TOC toggle button ── */
#toc-toggle{
  position:fixed;top:14px;right:12px;z-index:801;
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:var(--badge-r);cursor:pointer;
  font-family:var(--font);letter-spacing:.05em;
  transition:background .2s;
}
#toc-toggle:hover{background:rgba(212,175,55,.25);}

/* ── Keyboard hint ── */
#kbd-hint{
  position:fixed;bottom:60px;right:256px;z-index:500;
  font-size:10px;color:var(--muted2);opacity:.4;
  font-family:var(--mono);pointer-events:none;
  text-align:right;line-height:1.6;
}

/* ── Responsive ── */
@media(max-width:900px){
  #toc-sidebar{display:none;}
  #slide-container{right:0;}
  #slide-nav{right:0;}
  #slide-dots{display:none!important;}
  #kbd-hint{display:none;}
  .slide{padding:24px 20px;}
  #art-header{right:0;padding:12px 16px;}
  #toc-toggle{display:none;}
  /* D-030 v3: 모바일 일반 모드 헤로 심플화 (record-mode와 같은 룩) */
  .slide-hero{min-height:auto !important;padding:60px 20px 50px !important;text-align:center;}
  .art-hero-title{font-size:36px !important;line-height:1.18 !important;margin-bottom:16px !important;letter-spacing:-.025em !important;font-weight:900;}
  .art-hero-lead{font-size:15px !important;line-height:1.65 !important;margin:0 0 22px !important;color:rgba(232,245,233,.78);}
  /* 헤로 메타: chip 풀세트 + 키 안내 hide. 메타 한 줄 + 시작 버튼만 살림 */
  .slide-hero > div:last-child{margin-top:18px !important;gap:10px !important;}
  .slide-hero > div:last-child > div:first-child{font-size:10px !important;opacity:.55 !important;letter-spacing:.14em !important;}
  .slide-hero > div:last-child > div:nth-child(2){display:none !important;}
  #hero-start-btn{font-size:13px !important;padding:11px 22px !important;}
  .slide-hero > div:last-child > div:last-child > div:last-child{display:none !important;}
}

/* ════════════════════════════════════════════════════════════════
   v2 AAA additions — WCAG 2.2 AAA + Stripe Docs-grade interactions
   ════════════════════════════════════════════════════════════════ */

/* ── Skip link (WCAG 2.4.1) ── */
.skip-link{
  position:absolute;top:-100px;left:0;
  background:var(--gold);color:#000;padding:12px 16px;
  z-index:9999;text-decoration:none;font-weight:700;
  border-radius:0 0 6px 0;
}
.skip-link:focus{top:0;}

/* ── Focus-visible (WCAG 2.4.7 AAA) ── */
button:focus-visible,a:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--gold) !important;
  outline-offset:2px !important;
  border-radius:4px;
}

/* ── Touch targets ≥44×44 (WCAG 2.5.5 AAA) ── */
#slide-nav button,#toc-toggle{
  min-width:44px;min-height:44px;padding:10px 24px;
}
.toc-item a,.slide-dot{
  min-width:44px;min-height:44px;
  display:flex;align-items:center;
}
.slide-dot{justify-content:center;}

/* ── Reduced motion (WCAG 2.3.3 AAA) ── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
  #particle-canvas{display:none;}
}

/* ── Code blocks v2 (Prism + line numbers + copy button) ── */
.art-codeblock{
  position:relative;background:var(--code-bg);
  border:1.5px solid var(--border);border-radius:var(--card-r);
  margin:14px 0;overflow:hidden;
}
.art-codeblock-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(212,175,55,.08);
  border-bottom:1px solid var(--border);font-size:11px;
  font-family:var(--mono);color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
}
.art-codeblock-lang{color:var(--gold);font-weight:700;}
.art-codeblock-actions{display:flex;gap:6px;}
.art-codeblock-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);padding:4px 10px;border-radius:4px;
  cursor:pointer;font-size:10px;font-family:var(--mono);
  transition:all .15s;
}
.art-codeblock-btn:hover{
  background:var(--gold);color:#000;border-color:var(--gold);
}
.art-codeblock pre{
  margin:0;padding:12px;overflow-x:auto;
  font-family:var(--mono);font-size:13px;line-height:1.6;
  background:transparent;
}
.art-codeblock pre code{
  background:transparent;padding:0;color:var(--text);
}
.art-codeblock .line-highlight{
  background:rgba(212,175,55,.18) !important;
  margin-left:-12px;padding-left:12px;
  border-left:3px solid var(--gold);
}
.art-codeblock-runnable .art-codeblock-output{
  background:#000;color:var(--green);
  padding:8px 12px;font-family:var(--mono);font-size:12px;
  border-top:1px dashed var(--border);
  white-space:pre-wrap;line-height:1.4;
}

/* ── Variable input form ── */
.art-input-group{
  background:rgba(212,175,55,.06);
  border:1px solid rgba(212,175,55,.25);
  border-radius:var(--card-r);
  padding:14px;margin:14px 0;
}
.art-input-group label{
  display:block;font-size:11px;font-weight:700;
  color:var(--gold);text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:6px;
}
.art-input-group input[type=text],
.art-input-group input[type=number]{
  width:100%;padding:10px;font-size:13px;
  background:rgba(0,0,0,.3);color:var(--text);
  border:1px solid rgba(212,175,55,.3);border-radius:4px;
  font-family:var(--mono);min-height:44px;
}
.art-input-group input:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 8px rgba(212,175,55,.3);
}

/* ── CTA buttons ── */
.art-cta{
  display:inline-block;margin:8px 8px 8px 0;padding:12px 24px;
  background:var(--gold);color:#000;font-weight:700;font-size:13px;
  text-decoration:none;border-radius:6px;border:none;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;
  min-height:44px;min-width:44px;
  transition:all .2s;
}
.art-cta:hover{
  filter:brightness(1.08);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(212,175,55,.3);
}
.art-cta-secondary{
  background:transparent;color:var(--gold);
  border:1.5px solid var(--gold);
}

/* ── Infographic container ── */
.art-infographic{
  margin:18px 0;padding:14px;
  background:var(--card-bg);
  border:1.5px solid var(--border);border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  min-height:200px;overflow:auto;
}
.art-infographic[data-infographic="stat_counter"]{display:grid;}

/* ── Cost transparency footer (Parksy differentiator #4) ── */
.art-cost-footer{
  position:fixed;bottom:8px;left:8px;z-index:400;
  font-size:10px;color:var(--muted2);opacity:.5;
  font-family:var(--mono);pointer-events:auto;
  background:rgba(10,26,15,.7);padding:4px 8px;border-radius:4px;
  cursor:pointer;
}
.art-cost-footer:hover{opacity:1;}

/* ── ARIA live region ── */
.sr-only{
  position:absolute !important;width:1px !important;height:1px !important;
  padding:0 !important;margin:-1px !important;overflow:hidden !important;
  clip:rect(0,0,0,0) !important;white-space:nowrap !important;border:0 !important;
}

/* ── slide-mode (extractor capture) ── */
body.slide-mode #art-header,
body.slide-mode #toc-sidebar,
body.slide-mode #slide-nav,
body.slide-mode #slide-dots,
body.slide-mode #toc-toggle,
body.slide-mode #kbd-hint,
body.slide-mode .art-cost-footer,
body.slide-mode .skip-link{display:none !important;}
body.slide-mode #slide-container{top:0;right:0;}

/* ── narrate-mode (scroll-based lecture) ── */
body.narrate-mode .slide{display:block !important;opacity:1 !important;}
body.narrate-mode #slide-dots,
body.narrate-mode #slide-nav{display:none;}
</style>
</head>
<body>

<!-- WCAG 2.4.1: Skip link -->
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<!-- ARIA live region for slide changes (4.1.3 AA) -->
<div id="a11y-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- ── Header ── -->
<header id="art-header" role="banner">
  <div class="art-header-inner">
    <span class="art-badge">PARKSY 슬라이드</span>
    <div id="art-h1">AI 기능인 백서 v2 — 통합본 | 27 런타임 × 7 스테이션 × 5 공리</div>
    <div class="art-meta-row">
      <span class="art-slide-counter" id="slide-counter-fa389f85">
        <span id="slide-cur-fa389f85">1</span>
        <span class="sep">/</span>
        <span class="total" id="slide-total-fa389f85">—</span>
      </span>
    </div>
  </div>

4;color:#0A1A0F;border-color:#EEC864;transform:scale(1.05)}.ci-7b3k .axiom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.4rem;margin:0.6rem 0}.ci-7b3k .axiom{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.4rem;padding:0.3rem 0.5rem;text-align:center;font-size:0.75rem;color:#B59CFF;transition:0.2s}.ci-7b3k .axiom:hover{background:#B59CFF;color:#0A1A0F;border-color:#B59CFF}.ci-7b3k .runtime-badge{display:inline-block;background:rgba(127,179,255,0.15);color:#7FB3FF;border-radius:999px;padding:0.1rem 0.5rem;font-size:0.7rem;margin:0.1rem}.ci-7b3k .reverse-flow{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;margin:0.5rem 0;padding:0.4rem 0.6rem;background:rgba(245,197,66,0.1);border-left:3px solid #F5C542;border-radius:0.3rem;font-size:0.85rem}.ci-7b3k .reverse-flow span{color:#F5C542;font-weight:600}.ci-7b3k .svg-wrap{text-align:center;margin:0.6rem 0}.ci-7b3k svg{max-width:100%;height:auto;display:inline-block}</style><div class=\"ci-7b3k\"><h2>서론 — 27 무료 런타임 × 7 스테이션 × 5대 공리 × 역귀납적 학습</h2><div class=\"sub\">AI 기능인(AI Functioner) — 개인 인프라 시스템</div><div class=\"reverse-flow\"><span>⟳ 역귀납 방식</span> 실행(AI 결과물) → 관찰 → 이론 추출</div><div class=\"layers\"><details><summary>Layer 0 — 27개 무료 런타임 <span class=\"runtime-badge\">도구 개론</span></summary><div class=\"layer-content\"><div>27개의 무료 런타임을 활용한 도구 개론. 각 런타임은 특정 작업에 최적화:</div><div class=\"pipeline\"><span class=\"station\">STT</span><span class=\"station\">LLM</span><span class=\"station\">TTS</span><span class=\"station\">이미지</span><span class=\"station\">비디오</span><span class=\"station\">코드</span><span class=\"station\">데이터</span><span class=\"station\">웹</span><span class=\"station\">IoT</span><span class=\"station\">검색</span><span class=\"station\">번역</span><span class=\"station\">음악</span><span class=\"station\">3D</span><span class=\"station\">문서</span><span class=\"station\">이메일</span><span class=\"station\">캘린더</span><span class=\"station\">지도</span><span class=\"station\">소셜</span><span class=\"station\">결제</span><span class=\"station\">저장</span><span class=\"station\">분석</span><span class=\"station\">모니터</span><span class=\"station\">알림</span><span class=\"station\">폼</span><span class=\"station\">챗봇</span><span class=\"station\">에이전트</span><span class=\"station\">자동화</span></div><div style=\"margin-top:0.4rem;font-size:0.75rem;color:rgba(255,255,255,0.62)\">각 런타임은 무료 티어로 시작 가능, 필요에 따라 확장</div></div></details><details><summary>Layer 1 — 각 런타임 운용법 <span class=\"runtime-badge\">도구 각론</span></summary><div class=\"layer-content\"><div>런타임별 상세 운용법과 최적 사용 패턴:</div><ul><li><span class=\"gold-dot\">●</span> STT: Whisper, Google STT, Vosk</li><li><span class=\"gold-dot\">●</span> LLM: GPT, Claude, Gemini, Llama</li><li><span class=\"gold-dot\">●</span> TTS: ElevenLabs, Edge TTS, gTTS</li><li><span class=\"gold-dot\">●</span> 이미지: DALL·E, Stable Diffusion, Midjourney</li><li><span class=\"gold-dot\">●</span> 코드: Code Interpreter, Replit, GitHub Copilot</li><li><span class=\"gold-dot\">●</span> 데이터: BigQuery, Airtable, Supabase</li><li><span class=\"gold-dot\">●</span> 웹: Vercel, Netlify, Cloudflare Workers</li></ul></div></details><details><summary>Layer 2 — 7 스테이션 워크센터 <span class=\"runtime-badge\">시스템 아키텍처</span></summary><div class=\"layer-content\"><div>7개 스테이션으로 구성된 워크센터 파이프라인:</div><div class=\"pipeline\"><span class=\"station\">① 입력</span><span class=\"station\">② 분석</span><span class=\"station\">③ 설계</span><span class=\"station\">④ 제작</span><span class=\"station\">⑤ 테스트</span><span class=\"station\">⑥ 배포</span><span class=\"station\">⑦ 모니터</span></div><div style=\"margin-top:0.4rem;font-size:0.8rem\">각 스테이션은 독립적이며, 필요에 따라 재배열 가능</div></div></details><details><summary>Layer 3 — AI 기능인 자기 시스템 <span class=\"runtime-badge\">개인 주권 인프라</span></summary><div class=\"layer-content\"><div>개인 주권 인프라 — 데이터와 도구를 완전히 통제:</div><ul><li><span class=\"highlight\">✓</span> 로컬 우선 — 클라우드 의존 최소화</li><li><span class=\"highlight\">✓</span> 오픈소스 기반 — 투명성과 확장성</li><li><span class=\"highlight\">✓</span> 모듈식 아키텍처 — 교체 가능한 컴포넌트</li><li><span class=\"highlight\">✓</span> 개인화 — 사용자 행동에 적응</li><li><span class=\"highlight\">✓</span> 프라이버시 — 데이터 주권 보장</li></ul></div></details></div><div style=\"margin-top:1rem\"><div style=\"color:#EEC864;font-weight:600;margin-bottom:0.3rem\">5대 공리</div><div class=\"axiom-grid\"><div class=\"axiom\">① 실행 우선</div><div class=\"axiom\">② 관찰 기반</div><div class=\"axiom\">③ 역귀납 학습</div><div class=\"axiom\">④ 모듈성</div><div class=\"axiom\">⑤ 주권</div></div></div><div class=\"svg-wrap\"><svg viewBox=\"0 0 300 80\" xmlns=\"http://www.w3.org/2000/svg\"><circle cx=\"30\" cy=\"40\" r=\"8\" fill=\"#EEC864\"/><text x=\"30\" y=\"44\" text-anchor=\"middle\" font-size=\"8\" fill=\"#0A1A0F\" font-weight=\"bold\">말</text><line x1=\"38\" y1=\"40\" x2=\"62\" y2=\"40\" stroke=\"#5DD9A5\" stroke-width=\"2\"/><circle cx=\"70\" cy=\"40\" r=\"8\" fill=\"#5DD9A5\"/><text x=\"70\" y=\"44\" text-anchor=\"middle\" font-size=\"7\" fill=\"#0A1A0F\" font-weight=\"bold\">STT</text><line x1=\"78\" y1=\"40\" x2=\"102\" y2=\"40\" stroke=\"#5DD9A5\" stroke-width=\"2\"/><circle cx=\"110\" cy=\"40\" r=\"8\" fill=\"#7FB3FF\"/><text x=\"110\" y=\"44\" text-anchor=\"middle\" font-size=\"7\" fill=\"#0A1A0F\" font-weight=\"bold\">분석</text><line x1=\"118\" y1=\"40\" x2=\"142\" y2=\"40\" stroke=\"#5DD9A5\" stroke-width=\"2\"/><circle cx=\"150\" cy=\"40\" r=\"8\" fill=\"#B59CFF\"/><text x=\"150\" y=\"44\" text-anchor=\"middle\" font-size=\"7\" fill=\"#0A1A0F\" font-weight=\"bold\">설계</text><line x1=\"158\" y1=\"40\" x2=\"182\" y2=\"40\" stroke=\"#5DD9A5\" stroke-width=\"2\"/><circle cx=\"190\" cy=\"40\" r=\"8\" fill=\"#FFA86E\"/><text x=\"190\" y=\"44\" text-anchor=\"middle\" font-size=\"7\" fill=\"#0A1A0F\" font-weight=\"bold\">제작</text><line x1=\"198\" y1=\"40\" x2=\"222\" y2=\"40\" stroke=\"#5DD9A5\" stroke-width=\"2\"/><circle cx=\"230\" cy=\"40\" r=\"8\" fill=\"#F5C542\"/><text x=\"230\" y=\"44\" text-a nt-weight: 600; }\n  .ci-27 .summary-box .highlight { color: #5DD9A5; }\n  .ci-27 details { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.7rem; padding: 0.6rem 0.8rem; margin-top: 0.8rem; }\n  .ci-27 details summary { cursor: pointer; color: #EEC864; font-weight: 600; font-size: 0.85rem; }\n  .ci-27 details[open] { border-color: #EEC864; }\n  .ci-27 details .inner { margin-top: 0.5rem; color: rgba(255,255,255,0.62); font-size: 0.8rem; line-height: 1.5; }\n</style>\n<div class='ci-27'>\n  <h2>🧰 27 무료 런타임 — 인프라의 부품 카탈로그</h2>\n  <div class='sub'>로컬 · 클라우드 · AI/LLM — 비용 0원으로 글로벌 인프라를 설계하라</div>\n\n  <input type='radio' name='tab-27' id='tab-27-1' class='tab-27' checked hidden>\n  <input type='radio' name='tab-27' id='tab-27-2' class='tab-27' hidden>\n  <input type='radio' name='tab-27' id='tab-27-3' class='tab-27' hidden>\n\n  <div class='tabs'>\n    <label for='tab-27-1'>🖥️ 로컬 (7)</label>\n    <label for='tab-27-2'>☁️ 클라우드 (11)</label>\n    <label for='tab-27-3'>🤖 AI/LLM (8)</label>\n  </div>\n\n  <!-- 로컬 패널 -->\n  <div class='panel panel-1'>\n    <div class='grid'>\n      <div class='card'><div class='name'>브라우저</div><div class='detail'>무제한 무료</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>Termux</div><div class='detail'>안드로이드 터미널</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>WSL</div><div class='detail'>Windows Linux</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>Python</div><div class='detail'>인터프리터</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>Node.js</div><div class='detail'>JS 런타임</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>Bun</div><div class='detail'>올인원 런타임</div><span class='badge'>로컬</span></div>\n      <div class='card'><div class='name'>Deno</div><div class='detail'>보안 런타임</div><span class='badge'>로컬</span></div>\n    </div>\n ummary-box'><span class='key'>☁️ 클라우드 11:</span> 정적/웹 · 컨테이너 · CI/VM — 한도 내에서 무료.</div>\n  </div>\n\n  <!-- AI/LLM 패널 -->\n  <div class='panel panel-3'>\n    <div class='grid'>\n      <div class='card'><div class='name'>Groq</div><div class='detail'>14,400/일</div><span class='badge orange'>추론</span></div>\n      <div class='card'><div class='name'>Gemini</div><div class='detail'>1,500/일</div><span class='badge orange'>추론</span></div>\n      <div class='card'><div class='name'>OpenRouter</div><div class='detail'>무료모델</div><span class='badge orange'>게이트웨이</span></div>\n      <div class='card'><div class='name'>HF Spaces</div><div class='detail'>커뮤니티</div><span class='badge orange'>호스팅</span></div>\n      <div class='card'><div class='name'>Colab</div><div class='detail'>T4 12h/일</div><span class='badge orange'>GPU</span></div>\n      <div class='card'><div class='name'>Kaggle</div><div class='detail'>T4×2 30h/주</div><span class='badge orange'>GPU</span></div>\n      <div class='card'><div class='name'>Modal</div><div class='detail'>$30/월</div><span class='badge orange'>서버리스</span></div>\n      <div class='card'><div class='name'>Lightning</div><div class='detail'>22h/월</div><span class='badge orange'>GPU</span></div>\n    </div>\n    <div class='summary-box'><span class='key'>🤖 AI/LLM 8:</span> Groq · Gemini · Colab · Kaggle — 남의 GPU로 추론/학습.</div>\n  </div>\n\n  <details>\n    <summary>💡 핵심 인사이트 — 무료 런타임의 역이용</summary>\n    <div class='inner'>\n      <span class='key'>Freemium 전략</span>이지만, AI 기능인은 <span class='highlight'>무료 한도 안에서만 설계</span>하여 비용 0원으로 글로벌 인프라를 갖는다.<br>\n      로컬 7 + 클라우드 11 + AI 8 = <span class='key'>총 26개 무료 런타임</span> — 제한을 자산으로 바꾸는 기술.\n    </div>\n  </details>\n</div>"}}}, {"heading": "결정 함수 — 작업을 런타임에 매핑", "body": "항시 가동 → Oracle VM / Fly.io / Cloudflare Workers. GPU → Colab/Kaggle(프로토) → RunPod(본학습). 정적 웹 → GitHub Pages. API → Workers(Edge) / Vercel(풀스택) / Railway(컨테이너). LLM → Groq(속도) / Gemini(맥락) / OpenRouter(멀티). 데모 → HF Spaces. 로컬 → Termux(폰) / WSL(PC). 원칙: 가장 비싼 자원(GPU 학습)만 유료, 나머지는 전부 무료 한도 안에서 해결.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-7k3p{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;max-width:100%;font-family:inherit}.ci-7k3p h2{color:#EEC864;margin:0 0 1rem;font-size:1.4rem;font-weight:700}.ci-7k3p .tabs{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1rem}.ci-7k3p .tabs label{background:#0D2214;color:rgba(255,255,255,0.62);padding:0.4rem 0.8rem;border-radius:2rem;border:1px solid rgba(212,175,55,0.15);cursor:pointer;font-size:0.8rem;transition:all 0.2s}.ci-7k3p .tabs label:hover{background:rgba(238,200,100,0.15);color:#fff}.ci-7k3p input[type=radio]{display:none}.ci-7k3p .panel{display:none;background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.8rem;padding:1rem;margin-top:0.5rem}.ci-7k3p #tab-7k3p-1:checked~.panel-1,.ci-7k3p #tab-7k3p-2:checked~.panel-2,.ci-7k3p #tab-7k3p-3:checked~.panel-3,.ci-7k3p #tab-7k3p-4:checked~.panel-4,.ci-7k3p #tab-7k3p-5:checked~.panel-5,.ci-7k3p #tab-7k3p-6:checked~.panel-6,.ci-7k3p #tab-7k3p-7:checked~.panel-7{display:block}.ci-7k3p .panel h3{color:#EEC864;margin:0 0 0.5rem;font-size:1rem}.ci-7k3p .panel p{margin:0.3rem 0;font-size:0.85rem;line-height:1.5}.ci-7k3p .panel .tag{display:inline-block;background:rgba(238,200,100,0.12);color:#EEC864;padding:0.15rem 0.5rem;border-radius:1rem;font-size:0.7rem;margin-right:0.3rem}.ci-7k3p .panel .tag.green{background:rgba(93,217,165,0.15);color:#5DD9A5}.ci-7k3p .panel .tag.blue{background:rgba(127,179,255,0.15);color:#7FB3FF}.ci-7k3p .panel .tag.purple{background:rgba(181,156,255,0.15);color:#B59CFF}.ci-7k3p .panel .tag.orange{background:rgba(255,168,110,0.15);color:#FFA86E}.ci-7k3p .principle{margin-top:1rem;padding:0.8rem;background:rgba(238,200,100,0.06);border-left:3px solid #EEC864;border-radius:0.4rem;font-size:0.85rem;color:rgba(255,255,255,0.85)}.ci-7k3p .principle strong{color:#EEC864}</style><div class='ci-7k3p'><h2>결정 함수 — 작업을 런타임에 매핑</h2><div class='tabs'><label for='tab-7k3p-1'>항시 가동</label><label for='tab-7k3p-2'>GPU 학습</label><label for='tab-7k3p-3'>정적 웹</label><label for='tab-7k3p-4'>API</label><label for='tab-7k3p-5'>LLM</label><label for='tab-7k3p-6'>데모</label><label for='tab-7k3p-7'>로컬</label></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-1' checked hidden><div class='panel panel-1'><h3>항시 가동</h3><p><span class='tag'>Oracle VM</span><span class='tag'>Fly.io</span><span class='tag green'>Cloudflare Workers</span></p><p>무료 티어로 24/7 운영. Workers는 10만 요청/일 무료, Fly.io는 3개 VM 무료. Oracle은 평생 무료 ARM 인스턴스.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-2' hidden><div class='panel panel-2'><h3>GPU 학습</h3><p><span class='tag'>Colab</span><span class='tag'>Kaggle (프로토)</span><span class='tag orange'>RunPod (본학습)</span></p><p>프로토타입은 Colab/Kaggle 무료 GPU. 본 학습은 RunPod $0.34/hr. 가장 비싼 자원만 유료.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-3' hidden><div class='panel panel-3'><h3>정적 웹</h3><p><span class='tag green'>GitHub Pages</span></p><p>무료, 커스텀 도메인, HTTPS. Jekyll/Hugo/Vite 정적 사이트에 최적.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-4' hidden><div class='panel panel-4'><h3>API</h3><p><span class='tag green'>Workers (Edge)</span><span class='tag blue'>Vercel (풀스택)</span><span class='tag purple'>Railway (컨테이너)</span></p><p>Workers: edge 함수 10ms CPU. Vercel: 서버리스 + DB. Railway: 도커 컨테이너 $5 크레딧.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-5' hidden><div class='panel panel-5'><h3>LLM</h3><p><span class='tag green'>Groq (속도)</span><span class='tag blue'>Gemini (맥락)</span><span class='tag purple'>OpenRouter (멀티)</span></p><p>Groq: 500 tok/s 무료. Gemini: 1M 컨텍스트. OpenRouter: 200+ 모델 라우팅.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-6' hidden><div class='panel panel-6'><h3>데모</h3><p><span class='tag'>HF Spaces</span></p><p>Hugging Face Spaces 무료 CPU/GPU. Gradio/Streamlit 데모 호스팅.</p></div><input type='radio' name='tabs-7k3p' id='tab-7k3p-7' hidden><div class='panel panel-7'><h3>로컬</h3><p><span class='tag'>Termux (폰)</span><span class='tag'>WSL (PC)</span></p><p>Termux: 안드로이드에서 리눅스. WSL: 윈도우에서 네이티브 리눅스. 둘 다 무료.</p></div><div class='principle'><strong>원칙:</strong> 가장 비싼 자원(GPU 학습)만 유료, 나머지는 전부 무료 한도 안에서 해결.</div></div></div>"}}}, {"heading": "7 스테이션 워크센터 — 입구와 허브", "body": "입구1 STT: 폰과 태블릿에서 음성 입력. 키보드는 예외. 브라우저 STT API + Termux. HCI와 문제 정의가 역할. 입구2 로그 캡처: LLM 대화·작업 히스토리를 로데이터로. APK → Download → GitHub 동기화. 개인형 ETL 계층. Station A GitHub 허브: 28개 레포 = 마이크로서비스. GitHub Pages + Actions. 파일명은 에이전트가 읽기 좋게 설계.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-7s *{box-sizing:border-box}.ci-7s{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;border:1px solid rgba(212,175,55,0.15);max-width:100%;overflow:hidden}.ci-7s h2{color:#EEC864;margin:0 0 1rem;font-size:1.4rem;text-align:center}.ci-7s .hub{display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;margin-bottom:1.5rem}.ci-7s .hub-item{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.5rem 1rem;font-size:0.85rem;color:#7FB3FF;cursor:pointer;transition:all 0.2s}.ci-7s .hub-item:hover{background:#0D2214;border-color:#EEC864;color:#EEC864}.ci-7s .pipeline{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-bottom:1.5rem}.ci-7s .station{flex:1 1 120px;min-width:100px;background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.6rem;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}.ci-7s .station:hover{background:#0D2214;border-color:#EEC864;transform:translateY(-2px)}.ci-7s .station .num{color:#EEC864;font-weight:700;font-size:1.1rem}.ci-7s .station .label{color:rgba(255,255,255,0.62);font-size:0.75rem;margin-top:0.2rem}.ci-7s .station .badge{display:inline-block;background:#5DD9A5;color:#0A1A0F;font-size:0.6rem;padding:0.1rem 0.4rem;border-radi <div class='station'><div class='num'>7</div><div class='label'>HCI</div><div class='badge'>정의</div></div></div><div class='detail-area'><details><summary>📱 입구1 — STT (Speech to Text)</summary><div class='detail-body'><strong>폰과 태블릿</strong>에서 음성 입력이 기본. <span class='tag'>키보드는 예외</span> <span class='tag'>브라우저 STT API</span> <span class='tag'>Termux</span><br>HCI와 문제 정의가 주요 역할을 담당합니다.</div></details><details><summary>📋 입구2 — 로그 캡처</summary><div class='detail-body'><strong>LLM 대화 · 작업 히스토리</strong>를 로데이터로 수집.<br>APK → Download → GitHub 동기화 파이프라인.<br><span class='tag'>개인형 ETL 계층</span> 구조.</div></details><details><summary>🔗 Station A — GitHub 허브</summary><div class='detail-body'><strong>28개 레포</strong> = 마이크로서비스 아키텍처.<br><span class='tag'>GitHub Pages</span> + <span class='tag'>Actions</span> 자동화.<br>파일명은 <strong>에이전트가 읽기 좋게</strong> 설계되었습니다.</div></details></div><div class='footnote'>🟡 <span>7 스테이션</span> · 입구 → 허브 → 확장 · 클릭하여 세부 정보 열기</div></div></div>"}}}, {"heading": "7 스테이션 — 에이전트와 인프라", "body": "Station B 에이전트·MCP: Claude Code + DeepSeek Aider. 컨텍스트 독립 운영. MCP는 역할/입출력 스키마 단위로 정의. 멀티 LLM 병렬 검증으로 개인용 위원회 시스템 운용. Station C 멀티 노드: Windows+WSL(외장디스크) + 폰(Termux) + 태블릿 + ADB. 각 노드는 서로의 복구 노드. BIOS 자동부팅으로 PC = 항시 홈서버. Station D 모델·웹·영상: RunPod(유료학습) → HF Spaces(무료서빙) → Vercel/Railway(배포). 학습 1회 유료, 운영 영구 무료. 출구 IoT: ESP32 → MQTT/HTTP → Cloudflare Workers → GitHub Pages. 저전압·저가 장난감과 교보재에 한정.", "infographic": {"type": "pipeline_stack", "data": {"layers": [{"label": "Station B: 에이전트·MCP", "items": [{"name": "Claude Code + DeepSeek Aider", "desc": "컨텍스트 독립 운영"}, {"name": "MCP", "desc": "역할/입출력 스키마 단위로 정의"}, {"name": "멀티 LLM 병렬 검증", "desc": "개인용 위원회 시스템 운용"}]}, {"label": "Station C: 멀티 노드", "items": [{"name": "Windows+WSL(외장디스크)", "desc": "노드 중 하나"}, {"name": "폰(Termux) + 태블릿 + ADB", "desc": "노드 중 하나"}, {"name": "각 노드", "desc": "서로의 복구 노드"}, {"name": "BIOS 자동부팅", "desc": "PC = 항시 홈서버"}]}, {"label": "Station D: 모델·웹·영상", "items": [{"name": "RunPod(유료학습)", "desc": "학습 1회 유료"}, {"name": "HF Spaces(무료서빙)", "desc": "운영 영구 무료"}, {"name": "Vercel/Railway(배포)", "desc": "배포"}, {"name": "출구 IoT", "desc": "ESP32 → MQTT/HTTP → Cloudflare Workers → GitHub Pages. 저전압·저가 장난감과 교보재에 한정"}]}]}}}, {"heading": "5대 공리", "body": "제1공리 STT First — 모든 입력은 말로. 키보드는 예외. 제2공리 7 Stations — 아이디어→물성 7단계 필수 통과, 자동화로만 가속. 제3공리 Philosophy Over Tech — 인간은 방향과 결정, AI가 구현. 제4공리 Parallel Consensus — 2개 이상 LLM 교차 검증. 제5공리 Free Runtime First(v2) — 무료가 기본값, 유료는 예외.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-5axioms *{box-sizing:border-box}.ci-5axioms{background:#0A1A0F;color:#fff;padding:2rem 1rem;max-width:100%;border-radius:1.5rem;border:1px solid rgba(212,175,55,0.15)}.ci-5axioms h2{color:#EEC864;font-size:1.6rem;margin:0 0 1.5rem;text-align:center;letter-spacing:.02em}.ci-5axioms .axiom-grid{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center}.ci-5axioms .axiom-card{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:1rem;padding:1rem;flex:1 1 160px;min-width:140px;max-width:200px;cursor:pointer;transition:all .2s;position:relative}.ci-5axioms .axiom-card:hover{background:#0D2214;border-color:#EEC864;transform:translateY(-4px);box-shadow:0 8px 20px rgba(238,200,100,0.12)}.ci-5axioms .axiom-card .num{color:#EEC864;font-weight:700;font-size:1.2rem;display:block;margin-bottom:.3rem}.ci-5axioms .axiom-card .title{color:#fff;font-weight:600;font-size:.95rem;margin-bottom:.4rem}.ci-5axioms .axiom-card .desc{color:rgba(255,255,255,0.62);font-size:.8rem;line-height:1.4}.ci-5axioms .axiom-card .expand-indicator{color:#7FB3FF;font-size:.7rem;display:block;margin-top:.5rem;text-align:right;opacity:0;transition:opacity .2s}.ci-5axioms .axiom-card:hover .expand-indicator{opacity:1}.ci-5axioms details{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:1rem;margin-top:1.5rem;padding:.5rem 1rem;transition:all .2s}.ci-5axioms details[open]{border-color:#EEC864;background:#0D2214}.ci-5axioms details summary{color:#EEC864;font-weight:600;cursor:pointer;padding:.5rem 0;list-style:none;display:flex;align-items:center;gap:.5rem}.ci-5axioms details summary::-webkit-details-marker{display:none}.ci-5axioms details summary::before{content:'▶';color:#EEC864;font-size:.8rem;transition:transform .2s}.ci-5axioms details[open] summary::before{content:'▼'}.ci-5axioms details .detail-content{padding:.5rem 0 1rem;color:rgba(255,255,255,0.62);font-size:.85rem;line-height:1.6;border-top:1px solid rgba(212,175,55,0.15)}.ci-5axioms details .detail-content strong{color:#5DD9A5}.ci-5axioms .footnote{text-align:center;margin-top:1.2rem;color:rgba(255,255,255,0.62);font-size:.75rem;border-top:1px solid rgba(212,175,55,0.15);padding-top:1rem}</style><div class='ci-5axioms'><h2>5대 공리</h2><div class='axiom-grid'><div class='axiom-card'><span class='num'>제1공리</span><span class='title'>STT First</span><span class='desc'>모든 입력은 말로. 키보드는 예외.</span><span class='expand-indicator'>+ 상세</span></div><div class='axiom-card'><span class='num'>제2공리</span><span class='title'>7 Stations</span><span class='desc'>아이디어→물성 7단계 필수 통과, 자동화로만 가속.</span><span class='expand-indicator'>+ 상세</span></div><div class='axiom-card'><span class='num'>제3공리</span><span class='title'>Philosophy Over Tech</span><span class='desc'>인간은 방향과 결정, AI가 구현.</span><span class='expand-indicator'>+ 상세</span></div><div class='axiom-card'><span class='num'>제4공리</span><span class='title'>Parallel Consensus</span><span class='desc'>2개 이상 LLM 교차 검증.</span><span class='expand-indicator'>+ 상세</span></div><div class='axiom-card'><span class='num'>제5공리</span><span class='title'>Free Runtime First(v2)</span><span class='desc'>무료가 기본값, 유료는 예외.</span><span class='expand-indicator'>+ 상세</span></div></div><details><summary>공리 해설 펼쳐보기</summary><div class='detail-content'><strong>제1공리 STT First</strong> — 음성 인터페이스가 우선이며, 키보드는 보조 수단으로만 허용됩니다.<br><strong>제2공리 7 Stations</strong> — 모든 프로젝트는 아이디어에서 물성까지 7단계를 반드시 거쳐야 하며, 자동화만이 속도를 높일 수 있습니다.<br><strong>제3공리 Philosophy Over Tech</strong> — 인간은 방향성과 핵심 결정을 내리고, AI는 그 구현을 담당합니다.<br><strong>제4공리 Parallel Consensus</strong> — 두 개 이상의 LLM이 교차 검증하여 신뢰도를 확보합니다.<br><strong>제5공리 Free Runtime First(v2)</strong> — 무료 실행 환경이 기본이며, 유료는 예외적인 경우에만 사용합니다.</div></details><div class='footnote'>🖱️ 카드를 클릭하거나 호버하여 각 공리를 탐색하세요</div></div></div>"}}}, {"heading": "역귀납적 학습", "body": "실행(AI 결과물) → 관찰 → 이론 추출. 일반적인 이론→실행의 역순. AI를 블랙박스 탐침처럼 사용해 패턴을 바텀업으로 축적한다. 27개 런타임도 마찬가지다. 매뉴얼을 다 읽고 시작하지 않고 작은 작업을 던져보고 패턴을 확장한다. 이 백서 자체가 역귀납의 산물이다.", "infographic": {"type": "flowchart", "data": {"steps": [{"label": "실행(AI 결과물)", "type": "start", "sub": "작은 작업을 던져봄"}, {"label": "관찰", "type": "step", "sub": "패턴을 바텀업으로 축적"}, {"label": "이론 추출", "type": "end", "sub": "역귀납적 학습 완료"}]}}}, {"heading": "전략적 배제", "body": "보안은 민감 데이터를 만들지 않음으로써 비용 0. 코드=GitHub, 결과물=YouTube가 무상 백업. 알고리즘은 사람이 검증 설계, 에이전트가 구현. 협업은 1인 모듈 완결, 내 손에 맞춤. 유료 범위: GPU 학습(RunPod)으로만 한정.", "infographic": {"type": "pipeline_stack", "data": {"layers": [{"label": "비용 제로 보안", "items": [{"name": "민감 데이터 배제", "desc": "보안은 민감 데이터를 만들지 않음으로써 비용 0"}]}, {"label": "무상 백업", "items": [{"name": "코드", "desc": "GitHub"}, {"name": "결과물", "desc": "YouTube"}]}, {"label": "구현 방식", "items": [{"name": "알고리즘", "desc": "사람이 검증 설계, 에이전트가 구현"}, {"name": "협업", "desc": "1인 모듈 완결, 내 손에 맞춤"}, {"name": "유료 범위", "desc": "GPU 학습(RunPod)으로만 한정"}]}]}}}, {"heading": "커버리지와 위계", "body": "정통 CS 이론 30~40%(의도적 얕음). AI 실전 CS/IT 70~80%. 무료 런타임 생태계 90%(6개 사용+21개 인지). 이 백서는 개론서(너비와 지형도)다. 각론서(28개 레포 README)가 항목별 운용 매뉴얼. 계론서(관계망과 동역학)는 미발간. AI 시대 제너럴리스트 = 도구 지형 전체를 인지하고 작업에 맞는 도구를 골라 조립하는 사람.", "infographic": {"type": "pipeline_stack", "data": {"layers": [{"label": "백서의 위계", "items": [{"name": "개론서", "desc": "너비와 지형도"}, {"name": "각론서", "desc": "28개 레포 README, 항목별 운용 매뉴얼"}, {"name": "계론서", "desc": "관계망과 동역학 (미발간)"}]}, {"label": "커버리지 비율", "items": [{"name": "정통 CS 이론", "desc": "30~40% (의도적 얕음)"}, {"name": "AI 실전 CS/IT", "desc": "70~80%"}, {"name": "무료 런타임 생태계", "desc": "90% (6개 사용 + 21개 인지)"}]}, {"label": "AI 시대 제너럴리스트", "items": [{"name": "정의", "desc": "도구 지형 전체를 인지하고 작업에 맞는 도구를 골라 조립하는 사람"}]}]}}}];

/* ─── slide navigation ─── */
function showSlide(index){
  if(index < 0 || index >= slideEls.length) return;
  // BUG-015 fix: was 'if(index === currentSlide) return;' which blocked
  // first showSlide(0) call. Now bail only when target is already active.
  if(index === currentSlide && slideEls[index].classList.contains('active')) return;

  // Hide current
  slideEls[currentSlide].classList.remove('active');

  // Show new
  currentSlide = index;
  slideEls[currentSlide].classList.add('active');

  // Re-trigger animation
  slideEls[currentSlide].style.animation = 'none';
  void slideEls[currentSlide].offsetHeight;
  slideEls[currentSlide].style.animation = '';

  // Update UI
  updateUI();
  updateHash();
}

function goSlide(delta){
  showSlide(currentSlide + delta);
}

window.showSlide = showSlide;

  if(btnP) btnP.disabled = currentSlide === 0;

  // TOC active
  var tocItems = document.querySelectorAll('.toc-item');
  for(var ti = 0; ti < tocItems.length; ti++){
    tocItems[ti].classList.toggle('active', parseInt(tocItems[ti].dataset.slideIdx) === currentSlide);

  var dots = document.querySelectorAll('.slide-dot');
  for(var di = 0; di < dots.length; di++){
    dots[di].classList.toggle('active', parseInt(dots[di].dataset.idx) === currentSlide);
  }
}

/* ─── Particle system ─── */
(function(){
  var canvas = _$('particle-canvas');
  if(!canvas) return;
  // Performance gate (Article 13 wrapper duty): kill in slide/narrate mode
  // and respect prefers-reduced-motion + low-end devices.
  var qs = new URLSearchParams(window.location.search);
  var mode = qs.get('mode');
  var reducedMotion = window.matchMedia &&
                      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var slowDevice = (navigator.deviceMemory && navigator.deviceMemory < 4) ||
                   (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4);
  if (mode === 'slide' || mode === 'narrate' || reducedMotion || slowDevice) {
    canvas.style.display = 'none';
    canvas.remove();  // free CPU completely
    return;
  }
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLORS = ['rgba(212,175,55,', 'rgba(52,211,153,', 'rgba(96,165,250,'];
  function Particle(){ this.reset(); }
  Particle.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.4 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = (Math.random() - 0.5) * 0.14 - 0.05;
    this.a = Math.random() * 0.5 + 0.1;
    this.da = (Math.random() - 0.5) * 0.003;
    this.col = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.pulse = Math.random() * Math.PI * 2;
  };
  Particle.prototype.update = function(){
    this.x += this.vx; this.y += this.vy; this.a += this.da; this.pulse += 0.02;
    if(this.a < 0.04 || this.a > 0.65) this.da *= -1;
    if(this.x < -10) this.x = W + 10; if(this.x > W+10) this.x = -10;
    if(this.y < -10) this.y = H + 10; if(this.y > H+10) this.y = -10;
  };
  Particle.prototype.draw = function(){
    var r = this.r * (1 + Math.sin(this.pulse) * 0.25);
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = this.col + this.a + ')'; ctx.fill();
  };

  var N = Math.min(60, Math.floor(W * H / 16000));
  for(var pi=0; pi<N; pi++) particles.push(new Particle());

  function drawLines(){
    var MAX_D = 120;
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var d = Math.sqrt(dx*dx+dy*dy);
        if(d < MAX_D){
          var alpha = (1 - d/MAX_D) * 0.08;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(212,175,55,' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  var raf;
  function animLoop(){
    ctx.clearRect(0,0,W,H); drawLines();
    particles.forEach(function(p){ p.update(); p.draw(); });
    raf = requestAnimationFrame(animLoop);
  }
  animLoop();
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) cancelAnimationFrame(raf);
    else animLoop();
  });
})();

function escapeHtml(s){

                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function embedInfographics(){

    var data;

    el.setAttribute('role', 'img');

/* Inline render — all 13 infographic types (Constitution D-010 phase-2 complete). */
function renderInfographic(container, type, data){
  if(type === 'custom_svg')     return renderCustomSvg(container, data);
  if(type === 'stat_counter')   return renderStatCounter(container, data);
  if(type === 'flowchart')      return renderFlowchart(container, data);
  if(type === 'vs_compare')     return renderVsCompare(container, data);
  if(type === 'zoom_detail')    return renderZoomDetail(container, data);
  if(type === 'timeline')       return renderTimeline(container, data);
  if(type === 'node_map')       return renderNodeMapSimple(container, data);
  if(type === 'orbit_diagram')  return renderOrbitDiagram(container, data);
  if(type === 'accordion')      return renderAccordion(container, data);
  if(type === 'dashboard')      return renderDashboard(container, data);
  if(type === 'landing_page')   return renderLandingHero(container, data);
  if(type === 'matrix_grid')    return renderMatrixGrid(container, data);
  if(type === 'pipeline_stack') return renderPipelineStack(container, data);
  if(type === 'article_page')   return renderArticleCard(container, data);
  container.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px;">'

function renderNodeMapSimple(c, d){
  // Simplified inline: just SVG with circles + lines (full force-directed in node_map.html)
  var W = 360, H = 220;
  var nodes = (d && d.nodes) || [];
  var links = (d && d.links) || [];
  // place nodes in a circle
  var cx = W/2, cy = H/2, r = 80;
  var positioned = nodes.map(function(n, i){
    var theta = (i / nodes.length) * 2 * Math.PI - Math.PI/2;
    return {x: n.root ? cx : cx + r*Math.cos(theta),
            y: n.root ? cy : cy + r*Math.sin(theta),
            label: n.label, root: !!n.root, idx: i, id: n.id};
  });
  function findIdx(ref){
    if(typeof ref === 'number') return ref;
    return positioned.findIndex(function(p){return p.id === ref;});
  }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:240px;display:block;">';
  links.forEach(function(l){
    var s = positioned[findIdx(l.source)], t = positioned[findIdx(l.target)];
    if(!s || !t) return;
    svg += '<line x1="'+s.x+'" y1="'+s.y+'" x2="'+t.x+'" y2="'+t.y+'" stroke="rgba(212,175,55,.4)" stroke-width="1.5" />';
  });
  positioned.forEach(function(p){
    var rx = p.root ? 9 : 5;
    svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+rx+'" fill="'+(p.root?'var(--gold)':'var(--green)')+'" />';
    svg += '<text x="'+(p.x)+'" y="'+(p.y - rx - 4)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(p.label||'')+'</text>';
  });
  svg += '</svg>';
  c.innerHTML = svg;
}

function renderOrbitDiagram(c, d){
  var W = 360, H = 260;
  /* Handle both LLM format ({core, orbits[{label,desc}]}) and renderer format ({center:{label}, orbits[{nodes:[{label}]}]}) */
  var centerLabel = (d && (d.center ? d.center.label : d.core)) || 'Core';
  var orbits = (d && d.orbits) || [];
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:280px;display:block;">';
  var cx = W/2, cy = H/2;
  orbits.forEach(function(o, i){
    var r = 50 + i*32;
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(212,175,55,.18)" stroke-dasharray="3 4" />';
    /* Support both o.nodes[] (renderer format) and direct label (LLM format) */
    var nodes = o.nodes || (o.label ? [{label: o.label, desc: o.desc}] : []);
    nodes.forEach(function(n, j){
      var theta = (j / nodes.length) * 2 * Math.PI + i * 0.4;
      var x = cx + r*Math.cos(theta), y = cy + r*Math.sin(theta);
      svg += '<circle cx="'+x+'" cy="'+y+'" r="6" fill="var(--gold)"><title>'+escapeHtml(n.label||'')+'</title></circle>';
      svg += '<text x="'+x+'" y="'+(y - 10)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(n.label||'')+'</text>';
    });
  });
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="var(--gold)" />';
  svg += '<text x="'+cx+'" y="'+(cy+4)+'" font-size="10" fill="#0A1A0F" text-anchor="middle" font-weight="700">'+escapeHtml(centerLabel)+'</text>';
  svg += '</svg>';
  /* Add orbit labels as a legend below the SVG */
  var legendHtml = '';
  orbits.forEach(function(o, i){
    var label = o.label || (o.nodes && o.nodes.length ? o.nodes[0].label : '');
    var desc = o.desc || (o.nodes && o.nodes.length ? o.nodes[0].desc : '');
    if(label){
      legendHtml += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-top:4px;">'
        + '<span style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></span>'
        + '<strong style="color:var(--gold);">'+escapeHtml(label)+'</strong>'
        + (desc ? '<span style="color:var(--muted);">'+escapeHtml(desc)+'</span>' : '')
        + '</div>';
    }
  });
  if(legendHtml) c.innerHTML = svg + '<div style="padding:4px 0;">'+legendHtml+'</div>';
  else c.innerHTML = svg;
}

function renderLandingHero(c, d){
  var hero = (d && d.hero) || {};
  var feats = (d && d.features) || [];
  var ctas = (d && d.ctas) || [];
  var box = document.createElement('div');
  box.style.cssText = 'background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(93,217,165,.05));border:1px solid var(--gold);border-radius:12px;padding:18px;';
  box.innerHTML = '<div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;">'+escapeHtml(hero.eyebrow||'Landing')+'</div>'
    + '<div style="font-size:22px;font-weight:900;color:var(--text);margin-top:6px;line-height:1.25;">'+escapeHtml(hero.title||'')+'</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-top:8px;">'+escapeHtml(hero.subtitle||'')+'</div>';
  if(feats.length){
    var fg = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:14px;">';
    feats.forEach(function(f){
      fg += '<div style="background:rgba(255,255,255,.03);border-left:2px solid var(--green);padding:8px 10px;border-radius:0 6px 6px 0;">'
         + '<div style="font-size:12px;font-weight:700;color:var(--green);">'+escapeHtml(f.label||'')+'</div>'
         + (f.desc?'<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+escapeHtml(f.desc)+'</div>':'')+'</div>';
    });
    fg += '</div>';
    box.innerHTML += fg;
  }
  if(ctas.length){
    var cg = '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">';
    ctas.forEach(function(b, i){
      var primary = i === 0;
      cg += '<button class="art-cta" data-href="'+escapeHtml(b.href||'#')+'" style="'
         + 'background:'+(primary?'var(--gold)':'transparent')+';color:'+(primary?'#0A1A0F':'var(--gold)')+';'
         + 'border:1.5px solid var(--gold);border-radius:6px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;">'
         + escapeHtml(b.label||'CTA')+'</button>';
    });
    cg += '</div>';
    box.innerHTML += cg;
  }
  c.appendChild(box);
}

function renderMatrixGrid(c, d){
  var rows = (d && d.rows) || [];
  var cols = (d && d.cols) || [];
  var cells = (d && d.cells) || {};
  if(!rows.length || !cols.length){ c.innerHTML = '<div style="color:var(--muted);font-size:12px;">matrix_grid: rows/cols required</div>'; return; }

  // Mobile fallback: > 4 columns OR viewport < 480px → render as row-grouped cards
  var narrow = (window.innerWidth || 0) < 480;
  var tooWide = cols.length > 4;
  if (narrow || tooWide) {
    var fallback = '<div style="display:flex;flex-direction:column;gap:10px;">';
    rows.forEach(function(row){
      fallback += '<div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;">'
        + '<div style="font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">'+escapeHtml(row)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;">';
      cols.forEach(function(col){
        var key = row + '|' + col;
        var v = cells[key];
        var content = '—'; var border = 'var(--border)';
        if (v && typeof v === 'object') {
          content = v.value || v.label || '✓';
          if (v.score === 'high') border = 'var(--green)';
          else if (v.score === 'low') border = '#FF8A8A';
          else if (v.score === 'mid') border = 'var(--yellow)';
        } else if (v != null) { content = String(v); }
        fallback += '<div style="background:rgba(255,255,255,.02);border-left:2px solid '+border+';padding:6px 8px;border-radius:0 4px 4px 0;font-size:11px;">'
          + '<div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</div>'
          + '<div style="color:var(--text);margin-top:2px;font-weight:600;">'+escapeHtml(content)+'</div>'
          + '</div>';
      });
      fallback += '</div></div>';
    });
    fallback += '</div>';
    c.innerHTML = fallback;
    return;
  }

  // Desktop / narrow data: 정규 표 (≤ 4 컬럼)
  var html = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
  html += '<thead><tr><th style="padding:8px;border-bottom:2px solid var(--gold);text-align:left;color:var(--gold);"></th>';
  cols.forEach(function(col){
    html += '<th style="padding:8px;border-bottom:2px solid var(--gold);text-align:center;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(row){
    html += '<tr><th style="padding:8px;text-align:left;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);">'+escapeHtml(row)+'</th>';
    cols.forEach(function(col){
      var key = row + '|' + col;
      var v = cells[key];
      var bg = '';
      var content = '—';
      if(v && typeof v === 'object'){
        content = v.value || v.label || '✓';
        if(v.score === 'high') bg = 'background:rgba(93,217,165,.2);';
        else if(v.score === 'low') bg = 'background:rgba(255,138,138,.15);';
        else if(v.score === 'mid') bg = 'background:rgba(212,175,55,.15);';
      } else if(v != null) {
        content = String(v);
      }
      html += '<td style="padding:8px;text-align:center;border-bottom:1px solid var(--border);'+bg+'">'+escapeHtml(content)+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function renderPipelineStack(c, d){
  /* BUG-019 fix: LLM generates d.layers[{label, items:[{name,desc}]}]
     but renderer expected d.stages[{label,desc,done,metric}].
     Handle both formats. */
  var stages = (d && (d.stages || d.layers)) || [];
  var row = document.createElement('div');
  row.style.cssText = 'display:flex;flex-wrap:wrap;align-items:stretch;gap:0;';
  stages.forEach(function(s, i){
    var box = document.createElement('div');
    var done = !!s.done;
    /* If s has items[] (LLM layers format), extract desc from items */
    var stageLabel = s.label || (s.name || '');
    var stageDesc = s.desc || '';
    if(s.items && s.items.length){
      stageDesc = s.items.map(function(it){ return it.label || it.name || it.desc || ''; }).join(' → ');
    }
    box.style.cssText = 'flex:1 1 140px;min-width:120px;background:'+(done?'rgba(93,217,165,.08)':'rgba(212,175,55,.05)')+';'
      + 'border:1px solid '+(done?'var(--green)':'var(--gold)')+';border-radius:8px;padding:10px;margin:4px;position:relative;';
    box.innerHTML = '<div style="font-size:10px;color:var(--muted);font-family:var(--mono);">P'+(i+1)+(done?' ✓':'')+'</div>'
      + '<div style="font-size:13px;font-weight:700;color:'+(done?'var(--green)':'var(--gold)')+';margin-top:4px;">'+escapeHtml(stageLabel)+'</div>'
      + (stageDesc?'<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;">'+escapeHtml(stageDesc)+'</div>':'')
      + (s.metric?'<div style="font-size:10px;color:var(--text);margin-top:6px;font-family:var(--mono);">'+escapeHtml(s.metric)+'</div>':'');
    row.appendChild(box);
  });
  c.appendChild(row);
}

function renderArticleCard(c, d){
  var title = (d && d.title) || 'Article';
  var meta = (d && d.meta) || {};
  var paragraphs = (d && d.paragraphs) || [];
  var card = document.createElement('article');
  card.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:16px;';
  var html = '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;">'
    + escapeHtml(meta.section||'Article')
    + (meta.date ? ' · <span style="font-family:var(--mono);">'+escapeHtml(meta.date)+'</span>' : '') + '</div>'
    + '<h4 style="font-size:18px;font-weight:800;color:var(--text);margin:0 0 10px;line-height:1.3;">'+escapeHtml(title)+'</h4>';
  paragraphs.forEach(function(p){
    html += '<p style="font-size:13px;color:var(--text);line-height:1.65;margin:0 0 8px;">'+escapeHtml(p)+'</p>';
  });
  if(meta.tags && meta.tags.length){
    html += '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;">'
      + meta.tags.map(function(t){
          return '<span style="font-size:10px;background:rgba(212,175,55,.12);color:var(--gold);padding:2px 8px;border-radius:10px;font-family:var(--mono);">#'+escapeHtml(t)+'</span>';
        }).join('')
      + '</div>';
  }
  card.innerHTML = html;
  c.appendChild(card);
}

function wireVariableInputs(){
  var inputs = document.querySelectorAll('input[data-var]');
  var state = {};
  // Load from localStorage
  try{
    var saved = localStorage.getItem('parksy_vars_fa389f85');
    if(saved) state = JSON.parse(saved);
  }catch(e){}
  inputs.forEach(function(inp){
    var name = inp.dataset.var;
    if(state[name] !== undefined) inp.value = state[name];
    inp.addEventListener('input', function(){
      state[name] = inp.value;
      try{ localStorage.setItem('parksy_vars_fa389f85', JSON.stringify(state)); }catch(e){}
      // Replace {{name}} occurrences in slide bodies
      document.querySelectorAll('[data-bind="'+name+'"]').forEach(function(el){
        el.textContent = inp.value;
      });
    });
    // Trigger initial substitution
    inp.dispatchEvent(new Event('input'));
  });
}

function wireCostFooter(){
  var f = document.getElementById('cost-footer');
  if(!f) return;
  f.addEventListener('click', function(){
    var meta = window.PARKSY_META || {build_cost: {estimated_usd: 0}};
    var cost = meta.build_cost || {};
    alert('Build cost transparency:\n\n'
      + 'Models: ' + (cost.models_used||['Claude']).join(', ') + '\n'
      + 'Tokens: ' + JSON.stringify(cost.tokens || {}) + '\n'
      + 'Estimated USD: $' + (cost.estimated_usd || 0).toFixed(2) + '\n'
      + 'Wall time: ' + (cost.wallclock_seconds || 0) + 's\n\n'
      + 'This page was machine-built. Source: github.com/dtslib1979/parksy-image');
  });
}

function wireSkipLink(){
  var skip = document.querySelector('.skip-link');
  if(!skip) return;
  skip.addEventListener('click', function(e){
    e.preventDefault();
    var target = document.getElementById('main-content');
    if(target){
      target.setAttribute('tabindex', '-1');
      target.focus();
    }
  });
}

function hookSlideAnnouncer(){
  var status = document.getElementById('a11y-status');
  if(!status) return;
  // Hook into existing showSlide if available; otherwise observe slide-wrapper
  var wrapper = document.getElementById('slide-wrapper-fa389f85');
  if(!wrapper) return;
  var observer = new MutationObserver(function(){
    var active = wrapper.querySelector('.slide.active');
    if(active){
      var heading = active.querySelector('h1, h2, .art-heading');
      if(heading) status.textContent = 'Slide: ' + heading.textContent;
    }
  });
  observer.observe(wrapper, {attributes: true, subtree: true, attributeFilter: ['class']});
}

})();
</script>

.slide{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.25,.46,.45,.94),transform .8s cubic-bezier(.25,.46,.45,.94)}

.slide.in-view .art-body,.slide.active .art-body{opacity:1}
</style>
<script id="d028-entry-js">
(function(){
  var io = new IntersectionObserver(function(es){
    es.forEach(function(e){if(e.isIntersecting) e.target.classList.add('in-view');});
  }, {threshold:[0,.15,.4], rootMargin:'-5% 0px -5% 0px'});
  function init(){
    var slides = document.querySelectorAll('.slide');
    slides.forEach(function(s){ io.observe(s); });
    if(slides[0]) slides[0].classList.add('in-view');
    var orig = window.showSlide;
    if(typeof orig === 'function'){
      window.showSlide = function(i){orig(i); if(slides[i]) slides[i].classList.add('in-view');};
    }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { setTimeout(init, 50); }
})();
</script>
