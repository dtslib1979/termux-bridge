nt-size:0.8rem;color:rgba(255,255,255,0.62);line-height:1.4}.ci-3a7f .compare-panel .hl{color:#5DD9A5;font-weight:600}.ci-3a7f .compare-panel .hl2{color:#FFA86E;font-weight:600}.ci-3a7f .footnote{font-size:0.7rem;color:rgba(255,255,255,0.4);margin-top:1rem;border-top:1px solid rgba(212,175,55,0.1);padding-top:0.6rem}</style><div class='ci-3a7f'><h2>⚙️ 중앙 스테이션 — GitHub 허브 + AI 에이전트 &amp; MCP</h2><div class='sub'>28개 레포가 마이크로서비스처럼 동작 · GitHub Pages + Actions CI/CD · LLM 친화적 구조</div><div class='hub-row'><div class='hub-card'><h3>📦 소스 코드</h3><p>도구, MCP, 유틸리티 레포지토리 — 에이전트가 직접 읽고 변환</p><span class='badge'>7 repos</span></div><div class='hub-card'><h3>📋 로그 레포</h3><p>대화 캡처 및 작업 트레이스 — 전체 히스토리 저장</p><span class='badge'>5 repos</span></div><div class='hub-card'><h3>🌐 웹 빌더</h3><p>정적 사이트 생성기 + 문서 빌더 — 자동 배포</p><span class='badge'>8 repos</span></div><div class='hub-card'><h3>📖 문서·퍼블리싱</h3><p>책, 기술 문서, 사이트 — GitHub Pages 퍼블리싱</p><span class='badge'>8 repos</span></div></div><div class='split-panel'><div class='split-left'><h3>🤖 AI 에이전트</h3><ul class='agent-list'><li>Claude Code — 능동적 협업자</li><li>Deepseek Aider — 구현·변환</li><li>Ph Claude.sh — 컨텍스트 격리 실행</li><li>Ph Aider.sh — 스크립트 기반</li></ul><div class='mcp-box'><strong>MCP 스페이스</strong> — 명시적 역할 + JSON 스키마로 설계된 재사용 가능 백엔드 에셋</div></div><div class='split-right'><h3>🔁 멀티 LLM 비교</h3><div class='toggle-wrap'><input type='radio' name='c3-compare' id='c3-before' hidden checked><label for='c3-before'>교차 검증</label><input type='radio' name='c3-compare' id='c3-after' hidden><label for='c3-after'>최종 결정</label></div><div class='compare-panel compare-before'><p><span class='hl'>동일 질문</span>을 여러 모델에 던져 응답 비교 · <span class='hl2'>차이점 분석</span> 및 신뢰도 평가</p></div><div class='compare-panel compare-after'><p><span class='hl'>최종 결정</span> — 교차 검증 결과를 종합하여 <span class='hl2'>최적의 답변</span> 선택 · 시스템에 반영</p></div></div></div><div class='footnote'>Station 3 · 4 — GitHub 허브 + AI 에이전트 &amp; MCP 레이어</div></div></div>"}}}, {"heading": "출력 스테이션 — 멀티 노드 + 모델/웹 + IoT", "body": "Station 5: 멀티 노드 인프라 — PC(Windows+WSL, 외장 WD Passport), 폰(Termux, T-root), 태블릿(Termux+ADB)이 회복 탄력적인 항시 실행 환경을 구성한다. 홈 화면 Termux 위젯으로 5개 주요 스크립트(Ph Claude.sh, Ph Aider.sh, Ph Local.sh, Ph Git.sh, Ph Sync.sh)를 실행한다. 각 노드는 서로의 복구 노드 역할을 하며, BIOS 자동 부팅으로 PC가 항시 홈서버로 동작한다. Station 6: 모델, 웹, 미디어 출력 — RunPod(GPU 학습) → Hugging Face(모델/앱 레지스트리) → Railway/Vercel(API/웹 배포). 학습 1회 유료, 운영은 무료. Station 7: IoT, 장난감, 물리적 프로토타입 — ESP32 → MQTT/HTTP → Cloudflare Workers → GitHub Pages. 저전압·저위험·저가 장비에 한정하며, 자동차 파워·브레이크·HVAC 같은 중요 시스템은 직접 수정하지 않는다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-7a3f *{box-sizing:border-box}.ci-7a3f{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;border:1px solid rgba(212,175,55,0.15);max-width:100%;overflow:hidden}.ci-7a3f h2{color:#EEC864;margin:0 0 1rem;font-size:1.4rem;font-weight:700}.ci-7a3f .tabs{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem}.ci-7a3f .tabs label{background:rgba(13,34,20,0.8);color:rgba(255,255,255,0.62);padding:0.5rem 1rem;border-radius:2rem;cursor:pointer;border:1px solid rgba(212,175,55,0.15);transition:all 0.2s;font-size:0.85rem;user-select:none}.ci-7a3f .tabs label:hover{background:#0D2214;color:#fff}.ci-7a3f input[type=radio]{display:none}.ci-7a3f .panel{display:none;padding:1rem;background:rgba(13,34,20,0.8);border-radius:0.75rem;border:1px solid rgba(212,175,55,0.15)}.ci-7a3f #tab-7a3f-1:checked~.tabs label[for=tab-7a3f-1],.ci-7a3f #tab-7a3f-2:checked~.tabs label[for=tab-7a3f-2],.ci-7a3f #tab-7a3f-3:checked~.tabs label[for=tab-7a3f-3]{background:#EEC864;color:#0A1A0F;border-color:#EEC864;font-weight:600}.ci-7a3f #tab-7a3f-1:checked~.panel-1,.ci-7a3f #tab-7a3f-2:checked~.panel-2,.ci-7a3f #tab-7a3f-3:checked~.panel-3{display:block}.ci-7a3f .node-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:0.75rem;margin-bottom:1rem}.ci-7a3f .node-card{background:#0D2214;border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.75rem;text-align:center;transition:all 0.2s}.ci-7a3f .node-card:hover{background:rgba(13,34,20,0.9);border-color:#EEC864;transform:translateY(-2px)}.ci-7a3f .node-card .icon{font-size:1.8rem;margin-bottom:0.3rem}.ci-7a3f .node-card .name{color:#EEC864;font-weight:600;font-size:0.9rem}.ci-7a3f .node-card .desc{color:rgba(255,255,255,0.62);font-size:0.75rem;margin-top:0.2rem}.ci-7a3f .script-list{display:flex;flex-wrap:wrap;gap:0.4rem;justify-content:center;margin:0.75rem 0}.ci-7a3f .script-tag{background:rgba(92,217,165,0.15);color:#5DD9A5;padding:0.2rem 0.6rem;border-radius:1rem;font-size:0.7rem;border:1px solid rgba(92,217,165,0.3)}.ci-7a3f .flow-row{display:flex;flex-wrap:wrap;align-items:center;gap:0.5rem;margin:0.5rem 0}.ci-7a3f .flow-step{background:#0D2214;border:1px solid rgba(212,175,55,0.15);border-radius:0.5rem;padding:0.4rem 0.7rem;font-size:0.8rem;color:rgba(255,255,255,0.62);flex:1;min-width:80px;text-align:center}.ci-7a3f .flow-step strong{color:#EEC864;display:block;font-size:0.85rem}.ci-7a3f .flow-arrow{color:#EEC864;font-size:1.2rem;flex-shrink:0}.ci-7a3f .iot-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:0.5rem}.ci-7a3f .iot-item{background:#0D2214;border:1px solid rgba(212,175,55,0.15);border-radius:0.5rem;padding:0.5rem;text-align:center;font-size:0.8rem}.ci-7a3f .iot-item .badge{color:#F5C542;font-weight:600}.ci-7a3f .iot-item .sub{color:rgba(255,255,255,0.62);font-size:0.7rem}.ci-7a3f .warning-box{background:rgba(245,197,66,0.1);border-left:3px solid #F5C542;padding:0.6rem 0.8rem;border-radius:0.4rem;margin-top:0.75rem;font-size:0.8rem;color:rgba(255,255,255,0.8)}.ci-7a3f details{background:rgba(13,34,20,0.6);border:1px solid rgba(212,175,55,0.15);border-radius:0.5rem;padding:0.5rem 0.75rem;margin-top:0.75rem}.ci-7a3f details summary{color:#EEC864;cursor:pointer;font-weight:600;font-size:0.85rem;user-select:none}.ci-7a3f details[open]{background:rgba(13,34,20,0.9)}.ci-7a3f details .detail-body{padding-top:0.5rem;font-size:0.8rem;color:rgba(255,255,255,0.8)}.ci-7a3f .cost-row{display:flex;gap:1rem;flex-wrap:wrap;margin:0.5rem 0}.ci-7a3f .cost-badge{background:rgba(92,217,165,0.1);color:#5DD9A5;padding:0.2rem 0.6rem;border-radius:0.3rem;font-size:0.75rem;border:1px solid rgba(92,217,165,0.3)}.ci-7a3f .cost-badge.orange{background:rgba(255,168,110,0.1);color:#FFA86E;border-color:rgba(255,168,110,0.3)}</style><div class='ci-7a3f'><h2>🔄 출력 스테이션 — 멀티 노드 + 모델/웹 + IoT</h2><input type='radio' name='tabs-7a3f' id='tab-7a3f-1' checked hidden><input type='radio' name='tabs-7a3f' id='tab-7a3f-2' hidden><input type='radio' name='tabs-7a3f' id='tab-7a3f-3' hidden><div class='tabs'><label for='tab-7a3f-1'>Station 5</label><label for='tab-7a3f-2'>Station 6</label><label for='tab-7a3f-3'>Station 7</label></div><div class='panel panel-1'><div class='node-grid'><div class='node-card'><div class='icon'>🖥️</div><div class='name'>PC</div><div class='desc'>Windows+WSL<br>외장 WD Passport</div></div><div class='node-card'><div class='icon'>📱</div><div class='name'>폰</div><div class='desc'>Termux, T-root</div></div><div class='node-card'><div class='icon'>📟</div><div class='name'>태블릿</div><div class='desc'>Termux+ADB</div></div></div><div class='script-list'><span class='script-tag'>Ph Claude.sh</span><span class='script-tag'>Ph Aider.sh</span><span class='script-tag'>Ph Local.sh</span><span class='script-tag'>Ph Git.sh</span><span class='script-tag'>Ph Sync.sh</span></div><div style='color:rgba(255,255,255,0.62);font-size:0.8rem;text-align:center;margin-bottom:0.5rem'>홈 화면 Termux 위젯 — 5개 주요 스크립트 실행</div><details><summary>🔁 회복 탄력적 인프라 상세</summary><div class='detail-body'>각 노드는 서로의 복구 노드 역할을 하며, BIOS 자동 부팅으로 PC가 항시 홈서버로 동작합니다. 노드 간 자동 페일오버 및 상태 동기화가 이루어집니다.</div></details></div><div class='panel panel-2'><div class='flow-row'><div class='flow-step'><strong>RunPod</strong>GPU 학습</div><div class='flow-arrow'>→</div><div class='flow-step'><strong>Hugging Face</strong>모델/앱 레지스트리</div><div class='flow-arrow'>→</div><div class='flow-step'><strong>Railway/Vercel</strong>API/웹 배포</div></div><div class='cost-row'><span class='cost-badge orange'>💰 학습 1회 유료</span><span class='cost-badge'>🆓 운영은 무료</span></div><details><summary>📦 배포 파이프라인</summary><div class='detail-body'>RunPod에서 GPU 학습 완료 후 Hugging Face에 모델 업로드, Railway/Vercel을 통해 API 및 웹 서비스로 즉시 배포. CI/CD 자동화.</div></details></div><div class='panel panel-3'><div class='iot-grid'><div class='iot-item'><div class='badge'>ESP32</div><div class='sub'>센서/액추에이터</div></div><div class='iot-item'><div class='badge'>MQTT/HTTP</div><div class='sub'>통신 프로토콜</div></div><div class='iot-item'><div class='badge'>Cloudflare Workers</div><div class='sub'>엣지 로직</div></div><div class='iot-item'><div class='badge'>GitHub Pages</div><div class='sub'>대시보드 호스팅</div></div></div><div class='warning-box'>⚠️ 저전압·저위험·저가 장비에 한정. 자동차 파워·브레이크·HVAC 같은 중요 시스템은 직접 수정하지 않음.</div><details><summary>🔧 프로토타입 제약 조건</summary><div class='detail-body'>모든 IoT 장치는 5V 이하, 리튬 배터리 보호 회로 내장, 외부 케이스 절연 필수. 고전력/고위험 시스템은 시뮬레이션으로만 테스트.</div></details></div></div></div>"}}}, {"heading": "5대 공리 — AI 기능인 인프라의 불변 규칙", "body": "제1공리 STT First — 모든 입력은 말로 한다. 키보드는 예외다. 제2공리 7 Stations — 아이디어→물성화 7단계를 반드시 통과하며, 자동화로만 가속한다. 제3공리 Philosophy Over Tech — 인간은 방향과 결정을 내리고, AI가 구현한다. 제4공리 Parallel Consensus — 2개 이상의 LLM이 교차 검증한다. 단일 판단 금지. 제5공리 Free Runtime First(v2) — 무료가 기본값이다. 유료는 GPU 학습에만 예외적으로 허용된다. 이 5개 공리는 인프라 설계의 모든 결정을 지배한다. 새로운 도구를 도입할 때마다 이 공리에 위배되지 않는지 검증한다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-5axioms *{box-sizing:border-box}.ci-5axioms{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;border:1px solid rgba(212,175,55,0.15);max-width:100%;font-family:inherit}.ci-5axioms h2{color:#EEC864;margin:0 0 1rem;font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}.ci-5axioms .axiom-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.75rem}.ci-5axioms .axiom-card{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.75rem;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative}.ci-5axioms .axiom-card:hover{border-color:#EEC864;background:rgba(238,200,100,0.08)}.ci-5axioms .axiom-card .num{color:#EEC864;font-weight:700;font-size:0.8rem;display:block;margin-bottom:0.25rem}.ci-5axioms .axiom-card .title{color:#fff;font-weight:600;font-size:0.95rem;margin-bottom:0.25rem}.ci-5axioms .axiom-card .brief{color:rgba(255,255,255,0.62);font-size:0.75rem;line-height:1.3}.ci-5axioms .axiom-card .expand-indicator{color:#EEC864;font-size:0.7rem;margin-top:0.4rem;display:inline-block;opacity:0.7}.ci-5axioms .axiom-card:hover .expand-indicator{opacity:1}.ci-5axioms .axiom-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease,opacity 0.25s;opacity:0;margin-top:0}.ci-5axioms .axiom-card:hover .axiom-detail{max-height:120px;opacity:1;margin-top:0.5rem;padding-top:0.5rem;border-top:1px solid rgba(212,175,55,0.15)}.ci-5axioms .axiom-detail p{color:rgba(255,255,255,0.85);font-size:0.78rem;line-height:1.4;margin:0}.ci-5axioms .axiom-detail .highlight{color:#5DD9A5;font-weight:500}.ci-5axioms .axiom-detail .warn{color:#F5C542}.ci-5axioms .axiom-detail .link{color:#7FB3FF}.ci-5axioms .axiom-detail .adv{color:#B59CFF}.ci-5axioms .axiom-detail .right{color:#FFA86E}.ci-5axioms .footer-note{margin-top:1rem;padding:0.75rem;background:rgba(13,34,20,0.6);border-radius:0.5rem;border-left:3px solid #EEC864;font-size:0.78rem;color:rgba(255,255,255,0.7);line-height:1.4}.ci-5axioms .footer-note strong{color:#EEC864}</style><div class='ci-5axioms'><h2>5대 공리 — AI 기능인 인프라의 불변 규칙</h2><div class='axiom-grid'><div class='axiom-card'><span class='num'>제1공리</span><div class='title'>STT First</div><div class='brief'>모든 입력은 말로 한다. 키보드는 예외다.</div><div class='expand-indicator'>▼ 상세</div><div class='axiom-detail'><p>음성 우선 원칙. <span class='highlight'>STT</span>가 기본 인터페이스이며, 키보드는 보조 수단으로만 허용. 장애·소음 환경에서만 예외.</p></div></div><div class='axiom-card'><span class='num'>제2공리</span><div class='title'>7 Stations</div><div class='brief'>아이디어→물성화 7단계, 자동화로만 가속</div><div class='expand-indicator'>▼ 상세</div><div class='axiom-detail'><p>7단계 파이프라인: <span class='warn'>아이디어</span> → <span class='link'>구체화</span> → <span class='adv'>설계</span> → <span class='right'>프로토타입</span> → <span class='highlight'>테스트</span> → <span class='warn'>최적화</span> → <span class='link'>배포</span>. 각 단계 자동화 필수.</p></div></div><div class='axiom-card'><span class='num'>제3공리</span><div class='title'>Philosophy Over Tech</div><div class='brief'>인간은 방향과 결정, AI가 구현</div><div class='expand-indicator'>▼ 상세</div><div class='axiom-detail'><p>인간은 <span class='highlight'>철학과 전략</span>에 집중. AI가 코드·설계·구현을 담당. 기술적 세부사항은 AI에 위임.</p></div></div><div class='axiom-card'><span class='num'>제4공리</span><div class='title'>Parallel Consensus</div><div class='brief'>2개 이상 LLM 교차 검증, 단일 판단 금지</div><div class='expand-indicator'>▼ 상세</div><div class='axiom-detail'><p>모든 결정은 <span class='warn'>최소 2개 LLM</span>이 독립적으로 검증. 불일치 시 제3 LLM 중재. 단일 모델 판단 <span class='right'>금지</span>.</p></div></div><div class='axiom-card'><span class='num'>제5공리</span><div class='title'>Free Runtime First (v2)</div><div class='brief'>무료 기본값, 유료는 GPU 학습만 예외</div><div class='expand-indicator'>▼ 상세</div><div class='axiom-detail'><p>런타임은 <span class='highlight'>무료</span>가 원칙. 유료 사용은 <span class='adv'>GPU 학습</span>에만 허용. 추론·배포는 항상 무료 계층 우선.</p></div></div></div><div class='footer-note'><strong>적용 규칙:</strong> 이 5개 공리는 인프라 설계의 모든 결정을 지배한다. 새로운 도구를 도입할 때마다 이 공리에 위배되지 않는지 검증한다.</div></div></div>"}}}, {"heading": "역귀납적 학습 — AI를 탐침으로 사용하는 바텀업 학습법", "body": "전통적인 학습은 이론→실행 순서를 따른다. AI 기능인은 이 순서를 역전시킨다: 실행(AI 결과물) → 관찰 → 이론 추출. AI를 블랙박스 탐침처럼 사용해 패턴을 바텀업으로 축적한다. 27개 런타임도 마찬가지다 — 매뉴얼을 다 읽고 시작하지 않고, 작은 작업을 던져보고 패턴을 확장한다. 실행 사이클: (1) 작은 작업을 AI에 던진다, (2) 결과를 관찰한다, (3) 패턴을 기록한다, (4) 패턴을 일반화한다, (5) 다음 작업에 적용한다. 이 백서 자체가 역귀납 학습의 산물이다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .ci-uid-0 { background: #0A1A0F; color: #FFFFFF; padding: 1.5rem; border-radius: 12px; max-width: 100%; font-size: 0.95rem; line-height: 1.5; }\n  .ci-uid-0 * { box-sizing: border-box; }\n  .ci-uid-0 h2 { color: #EEC864; margin: 0 0 0.5rem 0; font-size: 1.3rem; font-weight: 600; }\n  .ci-uid-0 .sub { color: rgba(255,255,255,0.62); margin-bottom: 1.2rem; font-size: 0.9rem; }\n  .ci-uid-0 .cycle-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 1rem 0; }\n  .ci-uid-0 .step-card { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 10px; padding: 0.6rem 0.8rem; flex: 1 1 100px; min-width: 80px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }\n  .ci-uid-0 .step-card:hover { border-color: #EEC864; background: rgba(238,200,100,0.1); }\n  .ci-uid-0 .step-card .num { display: inline-block; background: #EEC864; color: #0A1A0F; border-radius: 50%; width: 24px; height: 24px; line-height: 24px; font-weight: 700; font-size: 0.8rem; margin-bottom: 4px; }\n  .ci-uid-0 .step-card .label { color: #FFFFFF; font-size: 0.75rem; font-weight: 500; }\n  .ci-uid-0 .step-card .detail { display: none; margin-top: 6px; font-size: 0.7rem; color: rgba(255,255,255,0.62); border-top: 1px solid rgba(212,175,55,0.15); padding-top: 4px; }\n  .ci-uid-0 .step-card:hover .detail { display: block; }\n  .ci-uid-0 .compare-wrap { margin: 1.5rem 0 0.5rem; }\n  .ci-uid-0 .compare-tabs { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }\n  .ci-uid-0 .compare-tabs label { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 20px; padding: 0.3rem 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.62); cursor: pointer; transition: all 0.2s; }\n  .ci-uid-0 .compare-tabs label:hover { border-color: #EEC864; color: #EEC864; }\n  .ci-uid-0 input[type='radio'] { display: none; }\n  .ci-uid-0 #ci-trad-0:checked ~ .compare-tabs label[for='ci-trad-0'],\n  .ci-uid-0 #ci-rev-0:checked ~ .compare-tabs label[for='ci-rev-0'] { background: #EEC864; color: #0A1A0F; border-color: #EEC864; }\n  .ci-uid-0 .compare-panel { display: none; background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 10px; padding: 0.8rem 1rem; font-size: 0.85rem; }\n  .ci-uid-0 #ci-trad-0:checked ~ .compare-panel.trad,\n  .ci-uid-0 #ci-rev-0:checked ~ .compare-panel.rev { display: block; }\n  .ci-uid-0 .compare-panel strong { color: #EEC864; }\n  .ci-uid-0 .compare-panel .arrow { color: #5DD9A5; font-weight: 700; }\n  .ci-uid-0 .note { background: rgba(13,34,20,0.8); border-left: 3px solid #F5C542; padding: 0.5rem 0.8rem; border-radius: 0 8px 8px 0; margin-top: 1rem; font-size: 0.8rem; color: rgba(255,255,255,0.62); }\n  .ci-uid-0 .note strong { color: #F5C542; }\n  .ci-uid-0 .svg-wrap { text-align: center; margin: 0.5rem 0; }\n  .ci-uid-0 .svg-wrap svg { max-width: 100%; height: auto; }\n</style>\n<div class='ci-uid-0'>\n  <h2>역귀납적 학습</h2>\n  <div class='sub'>AI를 탐침으로 사용하는 바텀업 학습법</div>\n  \n  <!-- SVG animated cycle hint -->\n  <div class='svg-wrap'>\n    <svg viewBox='0 0 300 60' xmlns='http://www.w3.org/2000/svg'>\n      <circle cx='30' cy='30' r='8' fill='#EEC864'><animate attributeName='r' values='6;10;6' dur='2s' repeatCount='indefinite'/></circle>\n      <line x1='38' y1='30' x2='70' y2='30' stroke='rgba(255,255,255,0.3)' stroke-width='2'/>\n      <circle cx='90' cy='30' r='8' fill='#5DD9A5'><animate attributeName='r' values='6;10;6' dur='2s' begin='0.4s' repeatCount='indefinite'/></circle>\n      <line x1='98' y1='30' x2='130' y2='30' stroke='rgba(255,255,255,0.3)' stroke-width='2'/>\n      <circle cx='150' cy='30' r='8' fill='#7FB3FF'><animate attributeName='r' values='6;10;6' dur='2s' begin='0.8s' repeatCount='indefinite'/></circle>\n      <line x1='158' y1='30' x2='190' y2='30' stroke='rgba(255,255,255,0.3)' stroke-width='2'/>\n      <circle cx='210' cy='30' r='8' fill='#B59CFF'><animate attributeName='r' values='6;10;6' dur='2s' begin='1.2s' repeatCount='indefinite'/></circle>\n      <line x1='218' y1='30' x2='250' y2='30' stroke='rgba(255,255,255,0.3)' stroke-width='2'/>\n      <circle cx='270' cy='30' r='8' fill='#FFA86E'><animate attributeName='r' values='6;10;6' dur='2s' begin='1.6s' repeatCount='indefinite'/></circle>\n      <text x='150' y='55' text-anchor='middle' fill='rgba(255,255,255,0.4)' font-size='9'>실행 → 관찰 → 기록 → 일반화 → 적용</text>\n    </svg>\n  </div>\n\n  <!-- 5-step cycle cards with hover detail -->\n  <div class='cycle-grid'>\n    <div class='step-card'><div class='num'>1</div><div class='label'>작업 투척</div><div class='detail'>AI에 작은 과제를 던진다</div></div>\n    <div class='step-card'><div class='num'>2</div><div class='label'>결과 관찰</div><div class='detail'>출력물을 분석한다</div></div>\n    <div class='step-card'><div class='num'>3</div><div class='label'>패턴 기록</div><div class='detail'>반복되는 규칙을 메모</div></div>\n    <div class='step-card'><div class='num'>4</div><div class='label'>일반화</div><div class='detail'>추상화된 원리 도출</div></div>\n    <div class='step-card'><div class='num'>5</div><div class='label'>적용</div><div class='detail'>다음 작업에 활용</div></div>\n  </div>\n\n  <!-- Toggle compare: traditional vs reverse -->\n  <div class='compare-wrap'>\n    <input type='radio' name='ci-comp-0' id='ci-trad-0' checked hidden>\n    <input type='radio' name='ci-comp-0' id='ci-rev-0' hidden>\n    <div class='compare-tabs'>\n      <label for='ci-trad-0'>전통적 학습</label>\n      <label for='ci-rev-0'>역귀납적 학습</label>\n    </div>\n    <div class='compare-panel trad'>\n      <strong>이론</strong> <span class='arrow'>→</span> <strong>실행</strong><br>\n      매뉴얼을 먼저 읽고, 개념을 익힌 뒤 적용.<br>\n      <span style='color:rgba(255,255,255,0.4); font-size:0.75rem;'>Top-down, 선형적</span>\n    </div>\n    <div class='compare-panel rev'>\n      <strong>실행</strong> <span class='arrow'>→</span> <strong>관찰</strong> <span class='arrow'>→</span> <strong>이론</strong><br>\n      AI 결과물을 탐침 삼아 패턴을 바텀업으로 축적.<br>\n      <span style='color:rgba(255,255,255,0.4); font-size:0.75rem;'>Bottom-up, 순환적</span>\n    </div>\n  </div>\n\n  <!-- Details/summary for deeper explanation -->\n  <details style='margin-top:1rem; background:rgba(13,34,20,0.8); border:1px solid rgba(212,175,55,0.15); border-radius:8px; padding:0.5rem 0.8rem;'>\n    <summary style='cursor:pointer; color:#EEC864; font-weight:600; font-size:0.85rem;'>27개 런타임에도 동일한 원리</summary>\n    <div style='margin-top:0.5rem; font-size:0.8rem; color:rgba(255,255,255,0.62);'>\n      매뉴얼을 다 읽고 시작하지 않는다. 작은 작업을 던져보고 패턴을 확장한다. 이 백서 자체가 역귀납 학습의 산물이다.\n    </div>\n  </details>\n\n  <div class='note'>\n    <strong>핵심 통찰:</strong> AI를 블랙박스 탐침처럼 사용해 패턴을 바텀업으로 축적한다. 실행 사이클을 반복하며 지식을 확장.\n  </div>\n</div>"}}}, {"heading": "전략적 배제 — 안 하기로 결정하는 것도 전략이다", "body": "AI 기능인 인프라는 하지 않는 것을 명시적으로 정의함으로써 비용과 복잡성을 통제한다. 보안: 민감 데이터를 만들지 않음으로써 비용 0원. 데이터를 만들지 않으면 지킬 필요도 없다. 백업: 코드=GitHub, 결과물=YouTube가 무상 백업 역할을 한다. 별도 백업 시스템 불필요. 알고리즘: 사람이 검증·설계하고, 에이전트가 구현한다. 알고리즘 검증에 AI를 의존하지 않는다. 협업: 1인 모듈 완결 방식. 내 손에 맞춤 최적화되어 있어 팀 협업 오버헤드가 없다. 유료 범위: GPU 학습(RunPod)으로만 한정. 그 외 모든 비용은 0원.", "infographic": {"type": "stat_counter", "data": {"stats": [{"label": "보안", "value": "0", "unit": "원", "delta": "민감 데이터 미생성"}, {"label": "백업", "value": "0", "unit": "원", "delta": "GitHub·YouTube 무상 백업"}, {"label": "알고리즘 검증", "value": "0", "unit": "원", "delta": "AI 의존 안 함"}, {"label": "협업 오버헤드", "value": "0", "unit": "원", "delta": "1인 모듈 완결"}, {"label": "유료 범위 외 비용", "value": "0", "unit": "원", "delta": "GPU 학습(RunPod)만 유료"}]}}}, {"heading": "커버리지와 위계 — 이 백서의 지형도", "body": "이 백서는 개론서(너비와 지형도)다. 정통 CS 이론은 의도적으로 30~40%만 커버하며, AI 실전 CS/IT는 70~80%, 무료 런타임 생태계는 90%를 커버한다. 개론서 ← 이 백서: 전체 지형도를 제공한다. 각론서 → 28개 레포지토리 README: 항목별 운용 매뉴얼. 계론서 → 관계망과 동역학: 미발간. AI 시대 제너럴리스트란 도구 지형 전체를 인지하고, 작업에 맞는 도구를 골라 조립할 수 있는 사람을 말한다. AI 기능인은 이 제너럴리스트의 실천적 구현체다.", "infographic": {"type": "pipeline_stack", "data": {"layers": [{"label": "개론서", "items": [{"name": "이 백서", "desc": /* ─── slide navigation ─── */
function showSlide(index){
  if(index < 0 || index >= slideEls.length) return;
  // BUG-015 fix: was 'if(index === currentSlide) return;' which blocked
  // first showSlide(0) call. Now bail only when target is already active.
  if(index === currentSlide && slideEls[index].classList.contains('active')) return;

  // Hide current
  slideEls[currentSlide].classList.remove('active');

  // Show new
  currentSlide = index;
  slideEls[currentSlide].classList.add('active');

  // Re-trigger animation
  slideEls[currentSlide].style.animation = 'none';
  void slideEls[currentSlide].offsetHeight;
  slideEls[currentSlide].style.animation = '';

  // Update UI
  updateUI();
  updateHash();
}

function goSlide(delta){
  showSlide(currentSlide + delta);
}

/* BUG-016 fix: inline onclick="goSlide(±1)" handlers on prev/next buttons
   resolve against global scope, but goSlide/showSlide are IIFE-local.
   Expose to window so the buttons actually navigate. */
window.goSlide = goSlide;
window.showSlide = showSlide;

/* ─── UI ... ─── */
function updateUI(){
  var cur = currentSlide + 1;
  var tot = slideEls.length;

  // Counter
  var curEls = document.querySelectorAll('#slide-cur-' + uid + ', #nav-cur-' + uid);
  for(var i = 0; i < curEls.length; i++) curEls[i].textContent = cur;

  // Buttons
  var btnP = _$('btn-prev-' + uid);
  var btnN = _$('btn-next-' + uid);
  if(btnP) btnP.disabled = currentSlide === 0;
  if(btnN) btnN.disabled = currentSlide >= tot - 1;

  // TOC active
  var tocItems = document.querySelectorAll('.toc-item');
  for(var ti = 0; ti < tocItems.length; ti++){
    tocItems[ti].classList.toggle('active', parseInt(tocItems[ti].dataset.slideIdx) === currentSlide);
  }

  // Dots active
  var dots = document.querySelectorAll('.slide-dot');
  for(var di = 0; di < dots.length; di++){
    dots[di].classList.toggle('active', parseInt(dots[di].dataset.idx) === currentSlide);
  }
}

/* ─── URL ... ─── */
function updateHash(){
  var h = currentSlide === 0 ? '' : '#/' + currentSlide;
  if(location.hash !== h && !h && location.hash) history.replaceState(null, '', h || '.');
  else if(location.hash !== h) history.pushState(null, '', h || '.');
}

function parseHash(){
  try{
    var m = location.hash.match(/#\/(\d+)/);
    if(m){
      var idx = parseInt(m[1]);
      if(idx > 0 && idx < slideEls.length) showSlide(idx);
    }
  } catch(e){}
}

/* ─── Particle system ─── */
(function(){
  var canvas = _$('particle-canvas');
  if(!canvas) return;
  // Performance gate (Article 13 wrapper duty): kill in slide/narrate mode
  // and respect prefers-reduced-motion + low-end devices.
  var qs = new URLSearchParams(window.location.search);
  var mode = qs.get('mode');
  var reducedMotion = window.matchMedia &&
                      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var slowDevice = (navigator.deviceMemory && navigator.deviceMemory < 4) ||
                   (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4);
  if (mode === 'slide' || mode === 'narrate' || reducedMotion || slowDevice) {
    canvas.style.display = 'none';
    canvas.remove();  // free CPU completely
    return;
  }
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLORS = ['rgba(212,175,55,', 'rgba(52,211,153,', 'rgba(96,165,250,'];
  function Particle(){ this.reset(); }
  Particle.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.4 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = (Math.random() - 0.5) * 0.14 - 0.05;
    this.a = Math.random() * 0.5 + 0.1;
    this.da = (Math.random() - 0.5) * 0.003;
    this.col = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.pulse = Math.random() * Math.PI * 2;
  };
  Particle.prototype.update = function(){
    this.x += this.vx; this.y += this.vy; this.a += this.da; this.pulse += 0.02;
    if(this.a < 0.04 || this.a > 0.65) this.da *= -1;
    if(this.x < -10) this.x = W + 10; if(this.x > W+10) this.x = -10;
    if(this.y < -10) this.y = H + 10; if(this.y > H+10) this.y = -10;
  };
  Particle.prototype.draw = function(){
    var r = this.r * (1 + Math.sin(this.pulse) * 0.25);
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = this.col + this.a + ')'; ctx.fill();
  };

  var N = Math.min(60, Math.floor(W * H / 16000));
  for(var pi=0; pi<N; pi++) particles.push(new Particle());

  function drawLines(){
    var MAX_D = 120;
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var d = Math.sqrt(dx*dx+dy*dy);
        if(d < MAX_D){
          var alpha = (1 - d/MAX_D) * 0.08;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(212,175,55,' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  var raf;
  function animLoop(){
    ctx.clearRect(0,0,W,H); drawLines();
    particles.forEach(function(p){ p.update(); p.draw(); });
    raf = requestAnimationFrame(animLoop);
  }
  animLoop();
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) cancelAnimationFrame(raf);
    else animLoop();
  });
})();

   Parksy v2 enhancements — runs AFTER renderSlides()
   ════════════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', function _v2Init(){
  // Enhance all .art-body elements: ``` code blocks → Prism, **bold**, variables
  enhanceArticleBodies();
  // Embed infographics (data-infographic markup)
  embedInfographics();
  // Wire variable inputs (data-var → reactive)
  wireVariableInputs();
  // Wire cost-footer click
  wireCostFooter();
  // Wire skip link focus jump
  wireSkipLink();
  // Update slide-mode aria-live
  hookSlideAnnouncer();
});

function enhanceArticleBodies(){
  /* Simplified: codeblock conversion moved to renderSlides().
     This function now only triggers Prism highlighting on existing
     art-codeblock elements. No textContent re-processing needed. */
  if(window.Prism){
    document.querySelectorAll('.art-codeblock pre code').forEach(function(c){
      try{ Prism.highlightElement(c); }catch(e){}
    });
  }
}

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.copyCodeBlock = function(btn){
  var pre = btn.closest('.art-codeblock').querySelector('pre code');
  var text = pre.textContent;
  navigator.clipboard.writeText(text).then(function(){
    var orig = btn.textContent;
    btn.textContent = '복사됨';
    setTimeout(function(){ btn.textContent = orig; }, 1500);
  }).catch(function(){
    btn.textContent = '복사 실패';
  });
};

function embedInfographics(){
  document.querySelectorAll('[data-infographic]').forEach(function(el){
    if(el.dataset.v2Embedded) return;
    el.dataset.v2Embedded = '1';
    var type = el.dataset.infographic;
    var dataAttr = el.dataset.payload || '{}';
    var data;
    try{ data = JSON.parse(dataAttr); }catch(e){ data = {}; }
    el.classList.add('art-infographic');
    el.setAttribute('role', 'img');
    el.setAttribute('aria-label', 'Infographic: ' + type);
    renderInfographic(el, type, data);
  });
}

/* Inline render — all 13 infographic types (Constitution D-010 phase-2 complete). */
function renderInfographic(container, type, data){
  if(type === 'custom_svg')     return renderCustomSvg(container, data);
  if(type === 'stat_counter')   return renderStatCounter(container, data);
  if(type === 'flowchart')      return renderFlowchart(container, data);
  if(type === 'vs_compare')     return renderVsCompare(container, data);
  if(type === 'zoom_detail')    return renderZoomDetail(container, data);
  if(type === 'timeline')       return renderTimeline(container, data);
  if(type === 'node_map')       return renderNodeMapSimple(container, data);
  if(type === 'orbit_diagram')  return renderOrbitDiagram(container, data);
  if(type === 'accordion')      return renderAccordion(container, data);
  if(type === 'dashboard')      return renderDashboard(container, data);
  if(type === 'landing_page')   return renderLandingHero(container, data);
  if(type === 'matrix_grid')    return renderMatrixGrid(container, data);
  if(type === 'pipeline_stack') return renderPipelineStack(container, data);
  if(type === 'article_page')   return renderArticleCard(container, data);
  container.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px;">'
    + 'Unknown infographic type "<strong>'+escapeHtml(type)+'</strong>".</div>';
}

function renderCustomSvg(c, d){
  // D-029: LLM이 콘텐츠 맞춤 SVG/HTML 직접 생성한 거 그대로 박음
  // 안전 검증은 Python에서 이미 완료 (script src/onclick/javascript: 차단)
  var html = (d && d.html) || '';
  if(!html){
    c.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px;">custom_svg data missing</div>';
    return;
  }
  c.innerHTML = html;
}

function renderStatCounter(c, d){
  var stats = (d && d.stats) || [];
  var grid = document.createElement('div');
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = 'repeat(auto-fit,minmax(140px,1fr))';
  grid.style.gap = '12px';
  stats.forEach(function(s){
    var card = document.createElement('div');
    card.style.cssText = 'background:rgba(212,175,55,.06);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;';
    card.innerHTML = '<div style="font-size:28px;font-weight:900;color:var(--gold);">'+escapeHtml(s.value||'')+'</div>'
      + '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px;">'+escapeHtml(s.label||'')+'</div>'
      + (s.delta ? '<div style="font-size:11px;color:var(--green);margin-top:4px;">'+escapeHtml(s.delta)+'</div>' : '')
      + (typeof s.bar==='number' ? '<div style="height:3px;background:var(--border);margin-top:8px;border-radius:2px;overflow:hidden;"><div style="height:100%;background:var(--gold);width:'+s.bar+'%;"></div></div>' : '');
    grid.appendChild(card);
  });
  c.appendChild(grid);
}

function renderFlowchart(c, d){
  var steps = (d && d.steps) || [];
  var col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;gap:8px;';
  steps.forEach(function(s, i){
    var box = document.createElement('div');
    var typeColor = s.type==='start' ? 'var(--green)'
                  : s.type==='end' ? 'var(--gold)'
                  : s.type==='decision' ? 'var(--yellow)' : 'var(--blue)';
    box.style.cssText = 'background:rgba(255,255,255,.03);border:1.5px solid '+typeColor+';border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;';
    box.innerHTML = '<div style="flex:1;min-width:0;"><strong style="color:'+typeColor+';word-break:keep-all;">'+escapeHtml(s.label||'')+'</strong>'
      + (s.sub ? '<div style="font-size:11px;color:var(--muted);margin-top:2px;word-break:keep-all;">'+escapeHtml(s.sub)+'</div>' : '') + '</div>'
      + '<span style="font-size:10px;color:var(--muted);flex-shrink:0;">'+(s.type||'step')+'</span>';
    col.appendChild(box);
    if(i < steps.length - 1){
      var arrow = document.createElement('div');
      arrow.style.cssText = 'text-align:center;color:var(--muted);font-size:14px;';
      arrow.textContent = '↓';
      col.appendChild(arrow);
    }
  });
  c.appendChild(col);
}

function renderVsCompare(c, d){
  var L = (d && d.left) || {title:'Before',items:[]};
  var R = (d && d.right) || {title:'After',items:[]};
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:1fr 32px 1fr;gap:8px;align-items:start;';
  function side(s, accent){
    var col = document.createElement('div');
    col.innerHTML = '<div style="font-size:11px;font-weight:700;color:'+accent+';text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;">'+escapeHtml(s.title||'')+'</div>'
      + (s.items||[]).map(function(it){
          return '<div style="background:rgba(255,255,255,.03);border-left:2px solid '+accent+';padding:8px 10px;margin-bottom:4px;border-radius:0 4px 4px 0;font-size:12px;">'+escapeHtml(it.label||'')+
                 (it.desc ? '<div style="color:var(--muted);font-size:10px;margin-top:2px;">'+escapeHtml(it.desc)+'</div>' : '')+'</div>';
        }).join('');
    return col;
  }
  grid.appendChild(side(L, 'var(--red,#F87171)'));
  var vs = document.createElement('div');
  vs.style.cssText = 'text-align:center;font-weight:700;color:var(--gold);font-size:16px;padding-top:24px;';
  vs.textContent = 'VS';
  grid.appendChild(vs);
  grid.appendChild(side(R, 'var(--green)'));
  c.appendChild(grid);
}

function renderZoomDetail(c, d){
  var blocks = (d && d.blocks) || [];
  blocks.forEach(function(b){
    var lines = (b.code||'').split('\n');
    var hl = b.highlight_lines || [];
    var lineHtml = lines.map(function(line, i){
      var n = i+1;
      var cls = hl.indexOf(n) !== -1 ? ' style="background:rgba(212,175,55,.18);"' : '';
      return '<div'+cls+'><span style="color:var(--muted);user-select:none;display:inline-block;width:30px;text-align:right;margin-right:12px;">'+n+'</span>'+escapeHtml(line)+'</div>';
    }).join('');
    var div = document.createElement('div');
    div.className = 'art-codeblock';
    div.innerHTML = '<div class="art-codeblock-header">'
      + '<span class="art-codeblock-lang">'+escapeHtml(b.lang||'text')+'</span>'
      + (b.label ? '<span style="color:var(--muted);">'+escapeHtml(b.label)+'</span>' : '')
      + '</div><pre style="font-family:var(--mono);">'+lineHtml+'</pre>'
      + (b.desc ? '<div style="padding:8px 12px;background:rgba(255,255,255,.02);font-size:11px;color:var(--muted);border-top:1px solid var(--border);">'+escapeHtml(b.desc)+'</div>' : '');
    c.appendChild(div);
  });
}

function renderTimeline(c, d){
  var events = (d && d.events) || [];
  var col = document.createElement('div');
  col.style.cssText = 'position:relative;padding-left:24px;border-left:2px solid var(--gold);';
  events.forEach(function(e){
    var item = document.createElement('div');
    item.style.cssText = 'position:relative;margin-bottom:16px;';
    item.innerHTML = '<div style="position:absolute;left:-30px;top:4px;width:10px;height:10px;background:'+(e.done?'var(--green)':'var(--gold)')+';border-radius:50%;"></div>'
      + '<div style="font-size:11px;color:var(--muted);font-family:var(--mono);">'+escapeHtml(e.date||'')+'</div>'
      + '<div style="font-weight:700;color:var(--text);margin-top:2px;">'+escapeHtml(e.label||'')+'</div>'
      + (e.desc ? '<div style="font-size:12px;color:var(--muted);margin-top:4px;">'+escapeHtml(e.desc)+'</div>' : '');
    col.appendChild(item);
  });
  c.appendChild(col);
}

function renderNodeMapSimple(c, d){
  // Simplified inline: just SVG with circles + lines (full force-directed in node_map.html)
  var W = 360, H = 220;
  var nodes = (d && d.nodes) || [];
  var links = (d && d.links) || [];
  // place nodes in a circle
  var cx = W/2, cy = H/2, r = 80;
  var positioned = nodes.map(function(n, i){
    var theta = (i / nodes.length) * 2 * Math.PI - Math.PI/2;
    return {x: n.root ? cx : cx + r*Math.cos(theta),
            y: n.root ? cy : cy + r*Math.sin(theta),
            label: n.label, root: !!n.root, idx: i, id: n.id};
  });
  function findIdx(ref){
    if(typeof ref === 'number') return ref;
    return positioned.findIndex(function(p){return p.id === ref;});
  }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:240px;display:block;">';
  links.forEach(function(l){
    var s = positioned[findIdx(l.source)], t = positioned[findIdx(l.target)];
    if(!s || !t) return;
    svg += '<line x1="'+s.x+'" y1="'+s.y+'" x2="'+t.x+'" y2="'+t.y+'" stroke="rgba(212,175,55,.4)" stroke-width="1.5" />';
  });
  positioned.forEach(function(p){
    var rx = p.root ? 9 : 5;
    svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+rx+'" fill="'+(p.root?'var(--gold)':'var(--green)')+'" />';
    svg += '<text x="'+(p.x)+'" y="'+(p.y - rx - 4)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(p.label||'')+'</text>';
  });
  svg += '</svg>';
  c.innerHTML = svg;
}

/* ── BUG-016/D-010 phase-2: 7 new infographic types ────────────────────── */

function renderOrbitDiagram(c, d){
  var W = 360, H = 260;
  /* Handle both LLM format ({core, orbits[{label,desc}]}) and renderer format ({center:{label}, orbits[{nodes:[{label}]}]}) */
  var centerLabel = (d && (d.center ? d.center.label : d.core)) || 'Core';
  var orbits = (d && d.orbits) || [];
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:280px;display:block;">';
  var cx = W/2, cy = H/2;
  orbits.forEach(function(o, i){
    var r = 50 + i*32;
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(212,175,55,.18)" stroke-dasharray="3 4" />';
    /* Support both o.nodes[] (renderer format) and direct label (LLM format) */
    var nodes = o.nodes || (o.label ? [{label: o.label, desc: o.desc}] : []);
    nodes.forEach(function(n, j){
      var theta = (j / nodes.length) * 2 * Math.PI + i * 0.4;
      var x = cx + r*Math.cos(theta), y = cy + r*Math.sin(theta);
      svg += '<circle cx="'+x+'" cy="'+y+'" r="6" fill="var(--gold)"><title>'+escapeHtml(n.label||'')+'</title></circle>';
      svg += '<text x="'+x+'" y="'+(y - 10)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(n.label||'')+'</text>';
    });
  });
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="var(--gold)" />';
  svg += '<text x="'+cx+'" y="'+(cy+4)+'" font-size="10" fill="#0A1A0F" text-anchor="middle" font-weight="700">'+escapeHtml(centerLabel)+'</text>';
  svg += '</svg>';
  /* Add orbit labels as a legend below the SVG */
  var legendHtml = '';
  orbits.forEach(function(o, i){
    var label = o.label || (o.nodes && o.nodes.length ? o.nodes[0].label : '');
    var desc = o.desc || (o.nodes && o.nodes.length ? o.nodes[0].desc : '');
    if(label){
      legendHtml += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-top:4px;">'
        + '<span style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></span>'
        + '<strong style="color:var(--gold);">'+escapeHtml(label)+'</strong>'
        + (desc ? '<span style="color:var(--muted);">'+escapeHtml(desc)+'</span>' : '')
        + '</div>';
    }
  });
  if(legendHtml) c.innerHTML = svg + '<div style="padding:4px 0;">'+legendHtml+'</div>';
  else c.innerHTML = svg;
}

function renderAccordion(c, d){
  var items = (d && d.items) || [];
  var col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
  items.forEach(function(it, i){
    var det = document.createElement('details');
    if(i === 0) det.open = true;
    det.style.cssText = 'background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:0;overflow:hidden;';
    var sum = document.createElement('summary');
    sum.style.cssText = 'padding:10px 14px;cursor:pointer;font-weight:700;color:var(--gold);list-style:none;display:flex;justify-content:space-between;align-items:center;';
    sum.innerHTML = '<span>'+escapeHtml(it.title||('Item '+(i+1)))+'</span><span style="color:var(--muted);font-size:11px;">'+(it.tag ? escapeHtml(it.tag) : '▾')+'</span>';
    det.appendChild(sum);
    var body = document.createElement('div');
    body.style.cssText = 'padding:8px 14px 12px;font-size:13px;color:var(--text);border-top:1px solid var(--border);';
    body.innerHTML = escapeHtml(it.body||'');
    det.appendChild(body);
    col.appendChild(det);
  });
  c.appendChild(col);
}

function renderDashboard(c, d){
  var kpis = (d && d.kpis) || [];
  var grid = document.createElement('div');
  grid.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;';
  kpis.forEach(function(k){
    var card = document.createElement('div');
    var trend = k.trend === 'up' ? 'var(--green)' : k.trend === 'down' ? '#FF8A8A' : 'var(--muted)';
    var arrow = k.trend === 'up' ? '▲' : k.trend === 'down' ? '▼' : '▬';
    card.style.cssText = 'background:rgba(212,175,55,.05);border:1px solid var(--border);border-radius:10px;padding:12px;';
    card.innerHTML = '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;">'+escapeHtml(k.label||'')+'</div>'
      + '<div style="font-size:24px;font-weight:900;color:var(--gold);margin-top:4px;font-family:var(--mono);">'+escapeHtml(k.value||'—')+'</div>'
      + '<div style="font-size:11px;color:'+trend+';margin-top:4px;">'+arrow+' '+escapeHtml(k.delta||'')+'</div>'
      + (typeof k.bar === 'number' ? '<div style="height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden;"><div style="height:100%;width:'+k.bar+'%;background:'+trend+';"></div></div>' : '');
    grid.appendChild(card);
  });
  c.appendChild(grid);
}

function renderLandingHero(c, d){
  var hero = (d && d.hero) || {};
  var feats = (d && d.features) || [];
  var ctas = (d && d.ctas) || [];
  var box = document.createElement('div');
  box.style.cssText = 'background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(93,217,165,.05));border:1px solid var(--gold);border-radius:12px;padding:18px;';
  box.innerHTML = '<div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.15em;">'+escapeHtml(hero.eyebrow||'Landing')+'</div>'
    + '<div style="font-size:22px;font-weight:900;color:var(--text);margin-top:6px;line-height:1.25;">'+escapeHtml(hero.title||'')+'</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-top:8px;">'+escapeHtml(hero.subtitle||'')+'</div>';
  if(feats.length){
    var fg = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:14px;">';
    feats.forEach(function(f){
      fg += '<div style="background:rgba(255,255,255,.03);border-left:2px solid var(--green);padding:8px 10px;border-radius:0 6px 6px 0;">'
         + '<div style="font-size:12px;font-weight:700;color:var(--green);">'+escapeHtml(f.label||'')+'</div>'
         + (f.desc?'<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+escapeHtml(f.desc)+'</div>':'')+'</div>';
    });
    fg += '</div>';
    box.innerHTML += fg;
  }
  if(ctas.length){
    var cg = '<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">';
    ctas.forEach(function(b, i){
      var primary = i === 0;
      cg += '<button class="art-cta" data-href="'+escapeHtml(b.href||'#')+'" style="'
         + 'background:'+(primary?'var(--gold)':'transparent')+';color:'+(primary?'#0A1A0F':'var(--gold)')+';'
         + 'border:1.5px solid var(--gold);border-radius:6px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:13px;">'
         + escapeHtml(b.label||'CTA')+'</button>';
    });
    cg += '</div>';
    box.innerHTML += cg;
  }
  c.appendChild(box);
}

function renderMatrixGrid(c, d){
  var rows = (d && d.rows) || [];
  var cols = (d && d.cols) || [];
  var cells = (d && d.cells) || {};
  if(!rows.length || !cols.length){ c.innerHTML = '<div style="color:var(--muted);font-size:12px;">matrix_grid: rows/cols required</div>'; return; }

  // Mobile fallback: > 4 columns OR viewport < 480px → render as row-grouped cards
  var narrow = (window.innerWidth || 0) < 480;
  var tooWide = cols.length > 4;
  if (narrow || tooWide) {
    var fallback = '<div style="display:flex;flex-direction:column;gap:10px;">';
    rows.forEach(function(row){
      fallback += '<div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;">'
        + '<div style="font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">'+escapeHtml(row)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;">';
      cols.forEach(function(col){
        var key = row + '|' + col;
        var v = cells[key];
        var content = '—'; var border = 'var(--border)';
        if (v && typeof v === 'object') {
          content = v.value || v.label || '✓';
          if (v.score === 'high') border = 'var(--green)';
          else if (v.score === 'low') border = '#FF8A8A';
          else if (v.score === 'mid') border = 'var(--yellow)';
        } else if (v != null) { content = String(v); }
        fallback += '<div style="background:rgba(255,255,255,.02);border-left:2px solid '+border+';padding:6px 8px;border-radius:0 4px 4px 0;font-size:11px;">'
          + '<div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</div>'
          + '<div style="color:var(--text);margin-top:2px;font-weight:600;">'+escapeHtml(content)+'</div>'
          + '</div>';
      });
      fallback += '</div></div>';
    });
    fallback += '</div>';
    c.innerHTML = fallback;
    return;
  }

  // Desktop / narrow data: 정규 표 (≤ 4 컬럼)
  var html = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
  html += '<thead><tr><th style="padding:8px;border-bottom:2px solid var(--gold);text-align:left;color:var(--gold);"></th>';
  cols.forEach(function(col){
    html += '<th style="padding:8px;border-bottom:2px solid var(--gold);text-align:center;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(row){
    html += '<tr><th style="padding:8px;text-align:left;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);">'+escapeHtml(row)+'</th>';
    cols.forEach(function(col){
      var key = row + '|' + col;
      var v = cells[key];
      var bg = '';
      var content = '—';
      if(v && typeof v === 'object'){
        content = v.value || v.label || '✓';
        if(v.score === 'high') bg = 'background:rgba(93,217,165,.2);';
        else if(v.score === 'low') bg = 'background:rgba(255,138,138,.15);';
        else if(v.score === 'mid') bg = 'background:rgba(212,175,55,.15);';
      } else if(v != null) {
        content = String(v);
      }
      html += '<td style="padding:8px;text-align:center;border-bottom:1px solid var(--border);'+bg+'">'+escapeHtml(content)+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function renderPipelineStack(c, d){
  /* BUG-019 fix: LLM generates d.layers[{label, items:[{name,desc}]}]
     but renderer expected d.stages[{label,desc,done,metric}].
     Handle both formats. */
  var stages = (d && (d.stages || d.layers)) || [];
  var row = document.createElement('div');
  row.style.cssText = 'display:flex;flex-wrap:wrap;align-items:stretch;gap:0;';
  stages.forEach(function(s, i){
    var box = document.createElement('div');
    var done = !!s.done;
    /* If s has items[] (LLM layers format), extract desc from items */
    var stageLabel = s.label || (s.name || '');
    var stageDesc = s.desc || '';
    if(s.items && s.items.length){
      stageDesc = s.items.map(function(it){ return it.label || it.name || it.desc || ''; }).join(' → ');
    }
    box.style.cssText = 'flex:1 1 140px;min-width:120px;background:'+(done?'rgba(93,217,165,.08)':'rgba(212,175,55,.05)')+';'
      + 'border:1px solid '+(done?'var(--green)':'var(--gold)')+';border-radius:8px;padding:10px;margin:4px;position:relative;';
    box.innerHTML = '<div style="font-size:10px;color:var(--muted);font-family:var(--mono);">P'+(i+1)+(done?' ✓':'')+'</div>'
      + '<div style="font-size:13px;font-weight:700;color:'+(done?'var(--green)':'var(--gold)')+';margin-top:4px;">'+escapeHtml(stageLabel)+'</div>'
      + (stageDesc?'<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;">'+escapeHtml(stageDesc)+'</div>':'')
      + (s.metric?'<div style="font-size:10px;color:var(--text);margin-top:6px;font-family:var(--mono);">'+escapeHtml(s.metric)+'</div>':'');
    row.appendChild(box);
  });
  c.appendChild(row);
}

function renderArticleCard(c, d){
  var title = (d && d.title) || 'Article';
  var meta = (d && d.meta) || {};
  var paragraphs = (d && d.paragraphs) || [];
  var card = document.createElement('article');
  card.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:16px;';
  var html = '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;">'
    + escapeHtml(meta.section||'Article')
    + (meta.date ? ' · <span style="font-family:var(--mono);">'+escapeHtml(meta.date)+'</span>' : '') + '</div>'
    + '<h4 style="font-size:18px;font-weight:800;color:var(--text);margin:0 0 10px;line-height:1.3;">'+escapeHtml(title)+'</h4>';
  paragraphs.forEach(function(p){
    html += '<p style="font-size:13px;color:var(--text);line-height:1.65;margin:0 0 8px;">'+escapeHtml(p)+'</p>';
  });
  if(meta.tags && meta.tags.length){
    html += '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;">'
      + meta.tags.map(function(t){
          return '<span style="font-size:10px;background:rgba(212,175,55,.12);color:var(--gold);padding:2px 8px;border-radius:10px;font-family:var(--mono);">#'+escapeHtml(t)+'</span>';
        }).join('')
      + '</div>';
  }
  card.innerHTML = html;
  c.appendChild(card);
}

function wireVariableInputs(){
  var inputs = document.querySelectorAll('input[data-var]');
  var state = {};
  // Load from localStorage
  try{
    var saved = localStorage.getItem('parksy_vars_b2d921a9');
    if(saved) state = JSON.parse(saved);
  }catch(e){}
  inputs.forEach(function(inp){
    var name = inp.dataset.var;
    if(state[name] !== undefined) inp.value = state[name];
    inp.addEventListener('input', function(){
      state[name] = inp.value;
      try{ localStorage.setItem('parksy_vars_b2d921a9', JSON.stringify(state)); }catch(e){}
      // Replace {{name}} occurrences in slide bodies
      document.querySelectorAll('[data-bind="'+name+'"]').forEach(function(el){
        el.textContent = inp.value;
      });
    });
    // Trigger initial substitution
    inp.dispatchEvent(new Event('input'));
  });
}

function wireCostFooter(){
  var f = document.getElementById('cost-footer');
  if(!f) return;
  f.addEventListener('click', function(){
    var meta = window.PARKSY_META || {build_cost: {estimated_usd: 0}};
    var cost = meta.build_cost || {};
    alert('Build cost transparency:\n\n'
      + 'Models: ' + (cost.models_used||['Claude']).join(', ') + '\n'
      + 'Tokens: ' + JSON.stringify(cost.tokens || {}) + '\n'
      + 'Estimated USD: $' + (cost.estimated_usd || 0).toFixed(2) + '\n'
      + 'Wall time: ' + (cost.wallclock_seconds || 0) + 's\n\n'
      + 'This page was machine-built. Source: github.com/dtslib1979/parksy-image');
  });
}

function wireSkipLink(){
  var skip = document.querySelector('.skip-link');
  if(!skip) return;
  skip.addEventListener('click', function(e){
    e.preventDefault();
    var target = document.getElementById('main-content');
    if(target){
      target.setAttribute('tabindex', '-1');
      target.focus();
    }
  });
}

function hookSlideAnnouncer(){
  var status = document.getElementById('a11y-status');
  if(!status) return;
  // Hook into existing showSlide if available; otherwise observe slide-wrapper
  var wrapper = document.getElementById('slide-wrapper-b2d921a9');
  if(!wrapper) return;
  var observer = new MutationObserver(function(){
    var active = wrapper.querySelector('.slide.active');
    if(active){
      var heading = active.querySelector('h1, h2, .art-heading');
      if(heading) status.textContent = 'Slide: ' + heading.textContent;
    }
  });
  observer.observe(wrapper, {attributes: true, subtree: true, attributeFilter: ['class']});
}

})();
</script>

<script id="d028-entry-js">
(function(){
  var io = new IntersectionObserver(function(es){
    es.forEach(function(e){if(e.isIntersecting) e.target.classList.add('in-view');});
  }, {threshold:[0,.15,.4], rootMargin:'-5% 0px -5% 0px'});
  function init(){
    var slides = document.querySelectorAll('.slide');
    slides.forEach(function(s){ io.observe(s); });
    if(slides[0]) slides[0].classList.add('in-view');
    var orig = window.showSlide;
    if(typeof orig === 'function'){
      window.showSlide = function(i){orig(i); if(slides[i]) slides[i].classList.add('in-view');};
    }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { setTimeout(init, 50); }
})();
</script>
