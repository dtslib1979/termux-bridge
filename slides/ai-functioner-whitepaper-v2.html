<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AI 기능인 백서 v2 — 통합본 | 27 런타임 × 7 스테이션 × 5대 공리</title>

<!-- Parksy v2: Stripe Docs-grade interactive tutorial — WCAG 2.2 AAA -->
<!-- Performance: preconnect + DNS prefetch (cuts RTT) -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<!-- Prism CSS only (lightweight, prevents FOUC); JS is deferred -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      crossorigin="anonymous">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A1A0F;--bg2:#0D2214;--gold:#EEC864;--yellow:#F5C542;--green:#5DD9A5;
  --blue:#7FB3FF;--purple:#B59CFF;
  --muted:rgba(255,255,255,0.62);--muted2:rgba(255,255,255,0.40);--text:#FFFFFF;
  --border:rgba(212,175,55,0.15);--border2:rgba(52,211,153,0.15);
  --card-bg:rgba(13,34,20,0.8);--code-bg:#061209;
  --card-r:10px;--badge-r:6px;--border-w:1.5px;
  --anim:0.4s;--anim-fast:0.25s;--ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --stagger:0.08;
  --font:system-ui,-apple-system,'SF Pro Display',sans-serif;--mono:'SF Mono','Fira Code','Consolas',monospace;--body-sz:13px;--body-lh:1.65;
}

html,body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  height:100vh;overflow:hidden;
}

/* ── Cinematic filter overlay ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -5%,rgba(212,175,55,0.07),transparent 60%),
    radial-gradient(ellipse 40% 60% at 95% 50%,rgba(96,165,250,0.04),transparent 60%),
    radial-gradient(ellipse 40% 60% at 5%  50%,rgba(167,139,250,0.03),transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ── Particle canvas ── */
#particle-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;
}

/* ── Header ── */
#art-header{
  position:fixed;top:0;left:0;right:240px;z-index:800;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border-bottom:var(--border-w) solid var(--border);
  padding:14px 20px 14px 32px;
}
.art-header-inner{display:flex;align-items:center;gap:14px;max-width:1100px;margin:0 auto;}
.art-badge{
  font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);border:1.5px solid rgba(212,175,55,.35);
  border-radius:var(--badge-r);padding:3px 10px;white-space:nowrap;flex-shrink:0;
}
#art-h1{
  font-size:clamp(13px,1.5vw,19px);font-weight:800;letter-spacing:-.02em;
  color:var(--text);
  display:-webkit-inline-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;line-height:1.3;word-break:break-all;
}
.art-meta-row{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.art-slide-counter{
  font-size:12px;color:var(--gold);font-family:var(--mono);font-weight:700;
  border:1px solid rgba(212,175,55,.3);border-radius:var(--badge-r);padding:4px 10px;
}
.art-slide-counter .art-slide-total{color:var(--muted);}

/* ── TOC sidebar ── */
#toc-sidebar{
  position:fixed;top:0;right:0;width:240px;height:100vh;z-index:700;
  background:rgba(10,26,15,.75);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-left:var(--border-w) solid var(--border);
  padding:70px 0 100px;
  overflow-y:auto;
  transition:transform .35s var(--ease);
}
#toc-sidebar.toc-hidden{transform:translateX(100%);}
#toc-sidebar::-webkit-scrollbar{width:3px;}
#toc-sidebar::-webkit-scrollbar-track{background:transparent;}
#toc-sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.toc-label{
  font-size:8.5px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);opacity:.7;padding:0 20px;margin-bottom:12px;
}
.toc-list{list-style:none;}
.toc-item a{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;font-size:12px;
  color:var(--muted);text-decoration:none;
  border-left:2px solid transparent;
  transition:color .2s,border-color .2s,background .2s;
  line-height:1.4;
}
.toc-item a .toc-dot{
  width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;
  transition:background .2s,transform .2s;
}
.toc-item a:hover{color:var(--text);background:rgba(212,175,55,.05);}
.toc-item a:hover .toc-dot{background:var(--gold);}
.toc-item.active a{
  color:var(--gold);border-left-color:var(--gold);
  background:rgba(212,175,55,.07);font-weight:700;
}
.toc-item.active a .toc-dot{background:var(--gold);transform:scale(1.4);}

/* ── Slide container ── */
#slide-container{
  position:fixed;top:56px;left:0;right:240px;bottom:64px;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;
}
#slide-container::-webkit-scrollbar{width:4px;}
#slide-container::-webkit-scrollbar-track{background:transparent;}
#slide-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.slide{
  display:none;
  width:100%;max-width:800px;margin:0 auto 40px;
  padding:40px 48px;
  flex-direction:column;
  animation:slideFadeIn .4s ease both;
  flex-shrink:0;
}
.slide:last-child{margin-bottom:0;}
.slide.active{display:flex;}
@keyframes slideFadeIn{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Hero slide ── */
.slide-hero{text-align:center;align-items:center;}
.slide-hero .art-hero-title{
  font-size:clamp(28px,4.5vw,52px);font-weight:900;letter-spacing:-.035em;
  line-height:1.12;color:var(--text);margin-bottom:20px;
}
.slide-hero .art-hero-title em{color:var(--gold);font-style:normal;}
.slide-hero .art-hero-lead{
  font-size:clamp(14px,1.8vw,18px);color:var(--muted);
  line-height:1.8;max-width:600px;
}

/* ── Section slide ── */
.section-num{
  font-size:10px;font-weight:800;letter-spacing:.12em;font-family:var(--mono);
  color:rgba(212,175,55,.4);margin-bottom:8px;
}
.art-heading{
  font-size:clamp(17px,2.2vw,24px);font-weight:800;
  color:var(--gold);letter-spacing:-.02em;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:var(--border-w) solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.art-heading::before{
  content:'';display:inline-block;
  width:3px;height:1em;
  background:linear-gradient(180deg,var(--gold),var(--yellow));
  border-radius:2px;flex-shrink:0;
}
.art-body{
  font-size:var(--body-sz);line-height:var(--body-lh);
  color:var(--text);word-break:keep-all;
}
.art-body strong,.art-body b{color:var(--yellow);font-weight:700;}
.art-body code{
  font-family:var(--mono);font-size:.88em;
  background:var(--code-bg);padding:1px 6px;border-radius:4px;color:var(--green);
}

/* ── Highlight box ── */
.art-highlight{
  position:relative;
  background:var(--card-bg);
  border:var(--border-w) solid var(--border);
  border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  padding:14px 40px 14px 18px;
  font-size:13px;line-height:var(--body-lh);
  color:var(--muted);margin-top:14px;
  cursor:pointer;overflow:hidden;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s var(--ease);
}
.art-highlight:hover{
  border-color:rgba(212,175,55,.45);
  border-left-color:var(--gold);
  box-shadow:0 0 24px rgba(212,175,55,.1);
  background:rgba(212,175,55,.04);
}
.art-highlight strong,.art-highlight b{color:var(--gold);font-weight:700;}
.hl-expand-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:rgba(212,175,55,.4);
  transition:transform .3s var(--ease),color .2s;
  user-select:none;
}
.art-highlight.expanded{
  padding-bottom:18px;
  box-shadow:0 0 28px rgba(212,175,55,.12);
  background:rgba(212,175,55,.05);
  border-color:rgba(212,175,55,.5);
}
.art-highlight.expanded .hl-expand-icon{
  transform:translateY(-50%) rotate(45deg);
  color:var(--gold);
}
.hl-extra{
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--ease),opacity .4s var(--ease);
  opacity:0;font-size:12.5px;color:rgba(232,245,233,.55);line-height:1.75;
}
.art-highlight.expanded .hl-extra{max-height:200px;opacity:1;margin-top:10px;}
.art-quote{
  border-left:3px solid var(--purple);
  padding:10px 14px;margin:12px 0;
  background:rgba(167,139,250,.06);
  border-radius:0 var(--card-r) var(--card-r) 0;
  font-size:13px;color:rgba(232,245,233,.7);line-height:1.75;font-style:italic;
}

/* ── Bottom nav bar ── */
#slide-nav{
  position:fixed;bottom:0;left:0;right:240px;z-index:900;
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:12px 24px;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:var(--border-w) solid var(--border);
}
#slide-nav button{
  background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:13px;font-weight:700;
  padding:7px 20px;border-radius:20px;cursor:pointer;
  transition:background .2s,opacity .2s;
  font-family:var(--font);
}
#slide-nav button:hover{background:rgba(212,175,55,.25);}
#slide-nav button:disabled{opacity:0.3;cursor:default;background:transparent;}
#slide-nav .counter{
  font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);min-width:60px;text-align:center;
}
#slide-nav .counter .sep{color:var(--muted);font-weight:400;margin:0 4px;}
#slide-nav .counter .total{color:var(--muted);font-weight:400;}

/* ── Right progress dots ── */
#slide-dots{
  position:fixed;right:256px;top:50%;transform:translateY(-50%);z-index:500;
  display:none;flex-direction:column;gap:8px;
}
#slide-dots.show{display:flex;}
.slide-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);cursor:pointer;
  transition:all .25s;
}
.slide-dot:hover{background:var(--muted2);}
.slide-dot.active{
  background:var(--gold);transform:scale(1.6);
  box-shadow:0 0 8px rgba(212,175,55,.5);
}

/* ── TOC toggle button ── */
#toc-toggle{
  position:fixed;top:14px;right:12px;z-index:801;
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:var(--badge-r);cursor:pointer;
  font-family:var(--font);letter-spacing:.05em;
  transition:background .2s;
}
#toc-toggle:hover{background:rgba(212,175,55,.25);}

/* ── Keyboard hint ── */
#kbd-hint{
  position:fixed;bottom:60px;right:256px;z-index:500;
  font-size:10px;color:var(--muted2);opacity:.4;
  font-family:var(--mono);pointer-events:none;
  text-align:right;line-height:1.6;
}

/* ── Responsive ── */
@media(max-width:900px){
  #toc-sidebar{display:none;}
  #slide-container{right:0;}
  #slide-nav{right:0;}
  #slide-dots{display:none!important;}
  #kbd-hint{display:none;}
  .slide{padding:24px 20px;}
  #art-header{right:0;padding:12px 16px;}
  #toc-toggle{display:none;}
  /* D-030 v3: 모바일 일반 모드 헤로 심플화 (record-mode와 같은 룩) */
  .slide-hero{min-height:auto !important;padding:60px 20px 50px !important;text-align:center;}
  .art-hero-title{font-size:36px !important;line-height:1.18 !important;margin-bottom:16px !important;letter-spacing:-.025em !important;font-weight:900;}
  .art-hero-lead{font-size:15px !important;line-height:1.65 !important;margin:0 0 22px !important;color:rgba(232,245,233,.78);}
  /* 헤로 메타: chip 풀세트 + 키 안내 hide. 메타 한 줄 + 시작 버튼만 살림 */
  .slide-hero > div:last-child{margin-top:18px !important;gap:10px !important;}
  .slide-hero > div:last-child > div:first-child{font-size:10px !important;opacity:.55 !important;letter-spacing:.14em !important;}
  .slide-hero > div:last-child > div:nth-child(2){display:none !important;}
  #hero-start-btn{font-size:13px !important;padding:11px 22px !important;}
  .slide-hero > div:last-child > div:last-child > div:last-child{display:none !important;}
}

/* ════════════════════════════════════════════════════════════════
   v2 AAA additions — WCAG 2.2 AAA + Stripe Docs-grade interactions
   ════════════════════════════════════════════════════════════════ */

/* ── Skip link (WCAG 2.4.1) ── */
.skip-link{
  position:absolute;top:-100px;left:0;
  background:var(--gold);color:#000;padding:12px 16px;
  z-index:9999;text-decoration:none;font-weight:700;
  border-radius:0 0 6px 0;
}
.skip-link:focus{top:0;}

/* ── Focus-visible (WCAG 2.4.7 AAA) ── */
button:focus-visible,a:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--gold) !important;
  outline-offset:2px !important;
  border-radius:4px;
}

/* ── Touch targets ≥44×44 (WCAG 2.5.5 AAA) ── */
#slide-nav button,#toc-toggle{
  min-width:44px;min-height:44px;padding:10px 24px;
}
.toc-item a,.slide-dot{
  min-width:44px;min-height:44px;
  display:flex;align-items:center;
}
.slide-dot{justify-content:center;}

/* ── Reduced motion (WCAG 2.3.3 AAA) ── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
  #particle-canvas{display:none;}
}

/* ── Code blocks v2 (Prism + line numbers + copy button) ── */
.art-codeblock{
  position:relative;background:var(--code-bg);
  border:1.5px solid var(--border);border-radius:var(--card-r);
  margin:14px 0;overflow:hidden;
}
.art-codeblock-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(212,175,55,.08);
  border-bottom:1px solid var(--border);font-size:11px;
  font-family:var(--mono);color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
}
.art-codeblock-lang{color:var(--gold);font-weight:700;}
.art-codeblock-actions{display:flex;gap:6px;}
.art-codeblock-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);padding:4px 10px;border-radius:4px;
  cursor:pointer;font-size:10px;font-family:var(--mono);
  transition:all .15s;
}
.art-codeblock-btn:hover{
  background:var(--gold);color:#000;border-color:var(--gold);
}
.art-codeblock pre{
  margin:0;padding:12px;overflow-x:auto;
  font-family:var(--mono);font-size:13px;line-height:1.6;
  background:transparent;
}
.art-codeblock pre code{
  background:transparent;padding:0;color:var(--text);
}
.art-codeblock .line-highlight{
  background:rgba(212,175,55,.18) !important;
  margin-left:-12px;padding-left:12px;
  border-left:3px solid var(--gold);
}
.art-codeblock-runnable .art-codeblock-output{
  background:#000;color:var(--green);
  padding:8px 12px;font-family:var(--mono);font-size:12px;
  border-top:1px dashed var(--border);
  white-space:pre-wrap;line-height:1.4;
}

/* ── Variable input form ── */
.art-input-group{
  background:rgba(212,175,55,.06);
  border:1px solid rgba(212,175,55,.25);
  border-radius:var(--card-r);
  padding:14px;margin:14px 0;
}
.art-input-group label{
  display:block;font-size:11px;font-weight:700;
  color:var(--gold);text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:6px;
}
.art-input-group input[type=text],
.art-input-group input[type=number]{
  width:100%;padding:10px;font-size:13px;
  background:rgba(0,0,0,.3);color:var(--text);
  border:1px solid rgba(212,175,55,.3);border-radius:4px;
  font-family:var(--mono);min-height:44px;
}
.art-input-group input:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 8px rgba(212,175,55,.3);
}

/* ── CTA buttons ── */
.art-cta{
  display:inline-block;margin:8px 8px 8px 0;padding:12px 24px;
  background:var(--gold);color:#000;font-weight:700;font-size:13px;
  text-decoration:none;border-radius:6px;border:none;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;
  min-height:44px;min-width:44px;
  transition:all .2s;
}
.art-cta:hover{
  filter:brightness(1.08);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(212,175,55,.3);
}
.art-cta-secondary{
  background:transparent;color:var(--gold);
  border:1.5px solid var(--gold);
}

/* ── Infographic container ── */
.art-infographic{
  margin:18px 0;padding:14px;
  background:var(--card-bg);
  border:1.5px solid var(--border);border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  min-height:200px;overflow:auto;
}
.art-infographic[data-infographic="stat_counter"]{display:grid;}

/* ── Cost transparency footer (Parksy differentiator #4) ── */
.art-cost-footer{
  position:fixed;bottom:8px;left:8px;z-index:400;
  font-size:10px;color:var(--muted2);opacity:.5;
  font-family:var(--mono);pointer-events:auto;
  background:rgba(10,26,15,.7);padding:4px 8px;border-radius:4px;
  cursor:pointer;
}
.art-cost-footer:hover{opacity:1;}

/* ── ARIA live region ── */
.sr-only{
  position:absolute !important;width:1px !important;height:1px !important;
  padding:0 !important;margin:-1px !important;overflow:hidden !important;
  clip:rect(0,0,0,0) !important;white-space:nowrap !important;border:0 !important;
}

/* ── slide-mode (extractor capture) ── */
body.slide-mode #art-header,
body.slide-mode #toc-sidebar,
body.slide-mode #slide-nav,
body.slide-mode #slide-dots,
body.slide-mode #toc-toggle,
body.slide-mode #kbd-hint,
body.slide-mode .art-cost-footer,
body.slide-mode .skip-link{display:none !important;}
body.slide-mode #slide-container{top:0;right:0;}

/* ── narrate-mode (scroll-based lecture) ── */
body.narrate-mode .slide{display:block !important;opacity:1 !important;}
body.narrate-mode #slide-dots,
body.narrate-mode #slide-nav{display:none;}
</style>
</head>
<body>

<!-- WCAG 2.4.1: Skip link -->
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<!-- ARIA live region for slide changes (4.1.3 AA) -->
<div id="a11y-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- ── Header ── -->
<header id="art-header" role="banner">
  <div class="art-header-inner">
    <span class="art-badge">PARKSY 슬라이드</span>
    <div id="art-h1">AI 기능인 백서 v2 — 통합본 | 27 런타임 × 7 스테이션 × 5대 공리</div>
    <div class="art-meta-row">
      <span class="art-slide-counter" id="slide-counter-b2d921a9">
        <span id="slide-cur-b2d921a9">1</span>
        <span class="sep">/</span>
        <span class="total" id="slide-total-b2d921a9">—</span>
      </span>

var SECTIONS = [{"heading": "서론 — 27 무료 런타임 × 7 스테이션 × 5대 공리 × 역귀납적 학습", "body": "AI 기능인(AI Functioner)은 모든 작업을 말(STT)로 시작해 웹페이지·콘텐츠·IoT 장난감 같은 실제 물건으로 끝내는 개인 인프라 시스템이다. 7개의 스테이션으로 구성된 워크센터를 통해 아이디어를 물성화하며, 전통적인 이론→실행 순서를 따르지 않고 실행 → 관찰 → 이론 추출의 역귀납 방식으로 학습한다. 시스템은 4개 레이어로 구성된다: Layer 0 — 27개 무료 런타임(도구 개론), Layer 1 — 각 런타임 운용법(도구 각론), Layer 2 — 7 스테이션 워크센터(시스템 아키텍처), Layer 3 — AI 기능인 자기 시스템(개인 주권 인프라).", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .ci-7b3k { background: #0A1A0F; color: #FFFFFF; padding: 1.5rem; border-radius: 1rem; max-width: 100%; font-family: inherit; }\n  .ci-7b3k * { box-sizing: border-box; }\n  .ci-7b3k h2 { color: #EEC864; margin: 0 0 0.5rem 0; font-size: 1.4rem; font-weight: 600; }\n  .ci-7b3k .sub { color: rgba(255,255,255,0.62); font-size: 0.85rem; margin-bottom: 1.2rem; }\n  .ci-7b3k .layers { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }\n  .ci-7b3k .layer-tab { flex: 1 1 45%; min-width: 120px; }\n  .ci-7b3k .layer-tab input { display: none; }\n  .ci-7b3k .layer-tab label { display: block; background: #0D2214; border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.8rem; color: rgba(255,255,255,0.62); transition: all 0.2s; text-align: center; }\n  .ci-7b3k .layer-tab input:checked + label { background: rgba(238,200,100,0.15); border-color: #EEC864; color: #EEC864; font-weight: 600; }\n  .ci-7b3k .layer-content { display: none; background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.8rem; padding: 1rem; margin-bottom: 1.5rem; }\n  .ci-7b3k .layer-content.show { display: block; }\n  .ci-7b3k .layer-content h3 { color: #EEC864; margin: 0 0 0.4rem 0; font-size: 1rem; }\n  .ci-7b3k .layer-content p { margin: 0.2rem 0; font-size: 0.85rem; color: rgba(255,255,255,0.85); }\n  .ci-7b3k .layer-content .badge { display: inline-block; background: rgba(93,217,165,0.2); color: #5DD9A5; border-radius: 0.4rem; padding: 0.15rem 0.5rem; font-size: 0.75rem; margin-right: 0.3rem; }\n  .ci-7b3k .layer-content .badge.yellow { background: rgba(245,197,66,0.2); color: #F5C542; }\n  .ci-7b3k .layer-content .badge.blue { background: rgba(127,179,255,0.2); color: #7FB3FF; }\n  .ci-7b3k .layer-content .badge.purple { background: rgba(181,156,255,0.2); color: #B59CFF; }\n  .ci-7b3k .layer-content .badge.orange { background: rgba(255,168,110,0.2); color: #FFA86E; }\n  .ci-7b3k .pipeline { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin: 1.2rem 0; }\n  .ci-7b3k .station { flex: 1 1 12%; min-width: 70px; max-width: 100px; }\n  .ci-7b3k .station input { display: none; }\n  .ci-7b3k .station label { display: block; background: #0D2214; border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.4rem 0.2rem; text-align: center; cursor: pointer; font-size: 0.7rem; color: rgba(255,255,255,0.62); transition: all 0.2s; }\n  .ci-7b3k .station input:checked + label { background: rgba(238,200,100,0.2); border-color: #EEC864; color: #EEC864; font-weight: 600; }\n  .ci-7b3k .station-detail { display: none; background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.8rem; padding: 0.8rem; margin: 0.5rem 0 1.2rem 0; }\n  .ci-7b3k .station-detail.show { display: block; }\n  .ci-7b3k .station-detail h4 { color: #EEC864; margin: 0 0 0.3rem 0; font-size: 0.9rem; }\n  .ci-7b3k .station-detail p { margin: 0.15rem 0; font-size: 0.8rem; color: rgba(255,255,255,0.85); }\n  .ci-7b3k .axioms { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 1rem 0; }\n  .ci-7b3k .axiom-card { flex: 1 1 18%; min-width: 100px; background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.5rem; text-align: center; }\n  .ci-7b3k .axiom-card .num { color: #EEC864; font-size: 1.2rem; font-weight: 700; }\n  .ci-7b3k .axiom-card .label { font-size: 0.7rem; color: rgba(255,255,255,0.62); }\n  .ci-7b3k .axiom-card .desc { font-size: 0.7rem; color: rgba(255,255,255,0.85); margin-top: 0.2rem; }\n  .ci-7b3k .reverse { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.8rem; padding: 0.8rem; margin: 1rem 0; }\n  .ci-7b3k .reverse h4 { color: #F5C542; margin: 0 0 0.3rem 0; font-size: 0.9rem; }\n  .ci-7b3k .reverse p { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin: 0.2rem 0; }\n  .ci-7b3k .reverse .arrow { color: #5DD9A5; font-weight: 600; }\n  .ci-7b3k .runtime-grid { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.5rem 0; }\n  .ci-7b3k .runtime-item { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.4rem; padding: 0.2rem 0.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.62); }\n  .ci-7b3k .runtime-item.gold { border-color: #EEC864; color: #EEC864; }\n  .ci-7b3k .runtime-item.green { border-color: #5DD9A5; color: #5DD9A5; }\n  .ci-7b3k .runtime-item.blue { border-color: #7FB3FF; color: #7FB3FF; }\n  .ci-7b3k .runtime-item.purple { border-color: #B59CFF; color: #B59CFF; }\n  .ci-7b3k .runtime-item.orange { border-color: #FFA86E; color: #FFA86E; }\n  .ci-7b3k .runtime-item.yellow { border-color: #F5C542; color: #F5C542; }\n  .ci-7b3k details { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.5rem 0.8rem; margin: 0.5rem 0; }\n  .ci-7b3k details summary { cursor: pointer; color: #EEC864; font-weight: 600; font-size: 0.85rem; }\n  .ci-7b3k details p { font-size: 0.8rem; color: rgba(255,255,255,0.85); margin: 0.3rem 0; }\n</style>\n<div class=\"ci-7b3k\">\n  <h2>서론 — 27 무료 런타임 × 7 스테이션 × 5대 공리 × 역귀납적 학습</h2>\n  <div class=\"sub\">AI 기능인(AI Functioner) — 개인 인프라 시스템</div>\n\n  <!-- Layer tabs -->\n  <div class=\"layers\">\n    <div class=\"layer-tab\">\n      <input type=\"radio\" name=\"layer-7b3k\" id=\"l0-7b3k\" hidden checked>\n      <label for=\"l0-7b3k\">Layer 0 — 27 무료 런타임</label>\n    </div>\n    <div class=\"layer-tab\">\n      <input type=\"radio\" name=\"layer-7b3k\" id=\"l1-7b3k\" hidden>\n      <label for=\"l1-7b3k\">Layer 1 — 런타임 운용법</label>\n    </div>\n    <div class=\"layer-tab\">\n      <input type=\"radio\" name=\"layer-7b3k\" id=\"l2-7b3k\" hidden>\n      <label for=\"l2-7b3k\">Layer 2 — 7 스테이션</label>\n    </div>\n    <div class=\"layer-tab\">\n      <input type=\"radio\" name=\"layer-7b3k\" id=\"l3-7b3k\" hidden>\n      <label for=\"l3-7b3k\">Layer 3 — AI 기능인</label>\n    </div>\n  </div>\n\n  <!-- Layer 0 content -->\n  <div class=\"layer-content show\" id=\"layer0-7b3k\">\n    <h3>27개 무료 런타임 (도구 개론)</h3>\n    <p>모든 작업을 말(STT)로 시작해 실제 물건으로 끝내는 데 필요한 무료 런타임들.</p>\n    <div class=\"runtime-grid\">\n      <span class=\"runtime-item gold\">Whisper</span>\n      <span class=\"runtime-item green\">TTS</span>\n      <span class=\"runtime-item blue\">GPT-4o</span>\n      <span class=\"runtime-item purple\">Claude</span>\n      <span class=\"runtime-item orange\">Gemini</span>\n      <span class=\"runtime-item yellow\">Stable Diffusion</span>\n      <span class=\"runtime-item gold\">DALL·E</span>\n      <span class=\"runtime-item green\">ElevenLabs</span>\n      <span class=\"runtime-item blue\">Replicate</span>\n      <span class=\"runtime-item purple\">Hugging Face</span>\n      <span class=\"runtime-item orange\">Cohere</span>\n      <span class=\"runtime-item yellow\">LangChain</span>\n      <span class=\"runtime-item gold\">LlamaIndex</span>\n      <span class=\"runtime-item green\">Chroma</span>\n      <span class=\"runtime-item blue\">Pinecone</span>\n      <span class=\"runtime-item purple\">Weaviate</span>\n      <span class=\"runtime-item orange\">Supabase</span>\n      <span class=\"runtime-item yellow\">Vercel AI SDK</span>\n      <span class=\"runtime-item gold\">Modal</span>\n      <span class=\"runtime-item green\">RunPod</span>\n      <span class=\"runtime-item blue\">Together AI</span>\n      <span class=\"runtime-item purple\">Fireworks</span>\n      <span class=\"runtime-item orange\">Groq</span>\n      <span class=\"runtime-item yellow\">Deepgram</span>\n      <span class=\"runtime-item gold\">AssemblyAI</span>\n      <span class=\"runtime-item green\">Ollama</span>\n      <span class=\"runtime-item blue\">LocalAI</span>\n    </div>\n    <details>\n      <summary>자세히 보기</summary>\n      <p>각 런타임은 특정 작업에 최적화되어 있으며, 조합하여 사용할 수 있습니다. 예: Whisper + GPT-4o + TTS = 음성 비서.</p>\n    </details>\n  </div>\n\n  <!-- Layer 1 content -->\n  <div class=\"layer-content\" id=\"layer1-7b3k\">\n    <h3>각 런타임 운용법 (도구 각론)</h3>\n    <p>런타임별 API 키, SDK, 파라미터, 비용 최적화 전략.</p>\n    <div class=\"runtime-grid\">\n      <span class=\"runtime-item gold\">Whisper: 음성→텍스트</span>\n      <span class=\"runtime-item green\">TTS: 텍스트→음성</span>\n      <span class=\"runtime-item blue\">GPT-4o: 멀티모달</span>\n      <span class=\"runtime-item purple\">Claude: 긴 컨텍스트</span>\n      <span class=\"runtime-item orange\">Stable Diffusion: 이미지 생성</span>\n    </div>\n    <details>\n      <summary>운용 팁</summary>\n      <p>무료 티어 한도 내에서 효율적으로 사용하려면 캐싱과 배치 처리를 활용하세요.</p>\n    </details>\n  </div>\n\n  <!-- Layer 2 content -->\n  <div class=\"layer-content\" id=\"layer2-7b3k\">\n    <h3>7 스테이션 워크센터 (시스템 아키텍처)</h3>\n    <p>아이디어를 물성화하는 7단계 파이프라인.</p>\n    <!-- Station tabs -->\n    <div class=\"pipeline\">\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s1-7b3k\" hidden checked>\n        <label for=\"s1-7b3k\">1. 입력</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s2-7b3k\" hidden>\n        <label for=\"s2-7b3k\">2. 분석</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s3-7b3k\" hidden>\n        <label for=\"s3-7b3k\">3. 설계</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s4-7b3k\" hidden>\n        <label for=\"s4-7b3k\">4. 제작</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s5-7b3k\" hidden>\n        <label for=\"s5-7b3k\">5. 테스트</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s6-7b3k\" hidden>\n        <label for=\"s6-7b3k\">6. 배포</label>\n      </div>\n      <div class=\"station\">\n        <input type=\"radio\" name=\"station-7b3k\" id=\"s7-7b3k\" hidden>\n        <label for=\"s7-7b3k\">7. 피드백</label>\n      </div>\n    </div>\n    <!-- Station details -->\n    <div class=\"station-detail show\" id=\"sd1-7b3k\">\n      <h4>1. 입력 (STT)</h4>\n      <p>음성 명령을 텍스트로 변환. Whisper / Deepgram 사용.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd2-7b3k\">\n      <h4>2. 분석</h4>\n      <p>의도 파악 및 컨텍스트 분석. GPT-4o / Claude.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd3-7b3k\">\n      <h4>3. 설계</h4>\n      <p>아이디어 구조화, 워크플로우 설계. LangChain / LlamaIndex.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd4-7b3k\">\n      <h4>4. 제작</h4>\n      <p>콘텐츠 생성, 코드 작성, 이미지 생성. Stable Diffusion / DALL·E.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd5-7b3k\">\n      <h4>5. 테스트</h4>\n      <p>품질 검증, 에러 체크. Replicate / Modal.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd6-7b3k\">\n      <h4>6. 배포</h4>\n      <p>웹페이지, IoT, 콘텐츠 퍼블리싱. Vercel / Supabase.</p>\n    </div>\n    <div class=\"station-detail\" id=\"sd7-7b3k\">\n      <h4>7. 피드백</h4>\n      <p>사용자 반응 수집, 개선 루프. AssemblyAI / Groq.</p>\n    </div>\n  </div>\n\n  <!-- Layer 3 content -->\n  <div class=\"layer-content\" id=\"layer3-7b3k\">\n    <h3>AI 기능인 자기 시스템 (개인 주권 인프라)</h3>\n    <p>전통적인 이론→실행 순서를 따르지 않고 실행 → 관찰 → 이론 추출의 역귀납 방식으로 학습.</p>\n    <div class=\"reverse\">\n      <h4>역귀납적 학습 (Abductive Learning)</h4>\n      <p><span class=\"arrow\">실행</span> → <span class=\"arrow\">관찰</span> → <span class=\"arrow\">이론 추출</span></p>\n      <p>예: 먼저 웹페이지를 만들고, 결과를 관찰한 후, 더 나은 설계 원칙을 도출.</p>\n    </div>\n    <details>\n      <summary>5대 공리</summary>\n      <div class=\"axioms\">\n        <div class=\"axiom-card\"><div class=\"num\">1</div><div class=\"label\">자기 주권</div><div class=\"desc\">데이터와 인프라 소유</div></div>\n        <div class=\"axiom-card\"><div class=\"num\">2</div><div class=\"label\">무료 우선</div><div class=\"desc\">27개 무료 런타임 활용</div></div>\n        <div class=\"axiom-card\"><div class=\"num\">3</div><div class=\"label\">모듈성</div><div class=\"desc\">7 스테이션 분리</div></div>\n        <div class=\"axiom-card\"><div class=\"num\">4</div><div class=\"label\">역귀납</div><div class=\"desc\">실행→관찰→이론</div></div>\n        <div class=\"axiom-card\"><div class=\"num\">5</div><div class=\"label\">개방형</div><div class=\"desc\">오픈소스 기반</div></div>\n      </div>\n    </details>\n  </div>\n\n  <!-- Show/hide layer content via radio -->\n  <div style=\"display:none\">\n    <style>\n      #l0-7b3k:checked ~ #layer0-7b3k { display: block; }\n      #l0-7b3k:checked ~ #layer1-7b3k,\n      #l0-7b3k:checked ~ #layer2-7b3k,\n      #l0-7b3k:checked ~ #layer3-7b3k { display: none; }\n      #l1-7b3k:checked ~ #layer1-7b3k { display: block; }\n      #l1-7b3k:checked ~ #layer0-7b3k,\n      #l1-7b3k:checked ~ #layer2-7b3k,\n      #l1-7b3k:checked ~ #layer3-7b3k { display: none; }\n      #l2-7b3k:checked ~ #layer2-7b3k { display: block; }\n      #l2-7b3k:checked ~ #layer0-7b3k,\n      #l2-7b3k:checked ~ #layer1-7b3k,\n      #l2-7b3k:checked ~ #layer3-7b3k { display: none; }\n      #l3-7b3k:checked ~ #layer3-7b3k { display: block; }\n      #l3-7b3k:checked ~ #layer0-7b3k,\n      #l3-7b3k:checked ~ #layer1-7b3k,\n      #l3-7b3k:checked ~ #layer2-7b3k { display: none; }\n    </style>\n  </div>\n\n  <!-- Station detail show/hide -->\n  <div style=\"display:none\">\n    <style>\n      #s1-7b3k:checked ~ #sd1-7b3k { display: block; }\n      #s1-7b3k:checked ~ #sd2-7b3k,\n      #s1-7b3k:checked ~ #sd3-7b3k,\n      #s1-7b3k:checked ~ #sd4-7b3k,\n      #s1-7b3k:checked ~ #sd5-7b3k,\n      #s1-7b3 "0\" y=\"20\" width=\"400\" height=\"20\" rx=\"10\" fill=\"rgba(13,34,20,0.8)\" stroke=\"rgba(212,175,55,0.15)\" stroke-width=\"1\"/>\n    <circle cx=\"30\" cy=\"30\" r=\"8\" fill=\"#EEC864\"/>\n    <circle cx=\"95\" cy=\"30\" r=\"8\" fill=\"#5DD9A5\"/>\n    <circle cx=\"160\" cy=\"30\" r=\"8\" fill=\"#7FB3FF\"/>\n    <circle cx=\"225\" cy=\"30\" r=\"8\" fill=\"#B59CFF\"/>\n    <circle cx=\"290\" cy=\"30\" r=\"8\" fill=\"#FFA86E\"/>\n    <circle cx=\"355\" cy=\"30\" r=\"8\" fill=\"#F5C542\"/>\n    <text x=\"30\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">STT</text>\n    <text x=\"95\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">분석</text>\n    <text x=\"160\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">설계</text>\n    <text x=\"225\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">제작</text>\n    <text x=\"290\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">테스트</text>\n    <text x=\"355\" y=\"55\" text-anchor=\"middle\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">배포</text>\n  </svg>\n</div>"}}}, {"heading": "AI 기능인의 정체성 — 나는 AI 시스템 장인이다", "body": "모든 작업은 말에서 시작해 7개 스테이션을 거쳐 소프트웨어, 서비스, 콘텐츠, 장난감으로 물성화된다. 나는 AI 에이전트(Claude Code, Deepseek Aider)와 MCP 도구를 사용해 시스템을 구현·변환·오케스트레이션한다. 이 백서는 AI 기능인 인프라의 버전 1 공식 명세서다: 레포지토리 구조, 에이전트 설정, MCP 스키마, 런타임 할당 테이블, 전개 규칙을 포함한다. 에이전트와 인간 독자 모두가 참조할 수 있도록 설계되었다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .ci-7a9f * { box-sizing: border-box; }\n  .ci-7a9f { background: #0A1A0F; color: #FFFFFF; padding: 1.5rem; border-radius: 1rem; max-width: 100%; font-family: inherit; }\n  .ci-7a9f h2 { color: #EEC864; margin: 0 0 0.5rem 0; font-size: 1.4rem; font-weight: 600; }\n  .ci-7a9f .sub { color: rgba(255,255,255,0.62); font-size: 0.9rem; margin-bottom: 1.2rem; }\n  .ci-7a9f .pipeline { display: flex; flex-wrap: wrap; gap i-7a9f .panel .tag.gold { color: #EEC864; border-color: rgba(238,200,100,0.3); }\n  .ci-7a9f .panel .tag.green { color: #5DD9A5; border-color: rgba(93,217,165,0.3); }\n  .ci-7a9f .panel .tag.purple { color: #B59CFF; border-color: rgba(181,156,255,0.3); }\n  .ci-7a9f .panel .tag.orange { color: #FFA86E; border-color: rgba(255,168,110,0.3); }\n  .ci-7a9f .panel .tag.yellow { color: #F5C542; border-color: rgba(245,197,66,0.3); }\n  .ci-7a9f .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.6rem; }\n  .ci-7a9f .meta-item { background: #0A1A0F; border-radius: 0.4rem; padding: 0.4rem 0.6rem; font-size: 0.8rem; }\n  .ci-7a9f .meta-item strong { color: #EEC864; }\n  .ci-7a9f .spec-box { background: #0A1A0F; border: 1px solid rgba(212,175,55,0.15); border-radius: 0.5rem; padding: 0.6rem; margin-top: 0.6rem; font-size: 0.8rem; }\n  .ci-7a9f .spec-box code { color: #5DD9A5; }\n  .ci-7a9f .toggle-wrap { margin-top: 1.2rem; }\n  .ci-7a9f .toggle-wrap input { display: none; }\n  .ci-7a9f .toggle-wrap label { display: inline-block; background: #0D2214; color: rgba(255,255,255,0.62); padding: 0.3rem 1rem; border-radius: 2rem; border: 1px solid rgba(212,175,55,0.15); cursor: pointer; font-size: 0.85rem; transition: 0.2s; }\n  .ci-7a9f .toggle-wrap label:hover { border-color: #EEC864; color: #EEC864; }\n  .ci-7a9f #toggle-7a9f-b:checked ~ .toggle-wrap label[for='toggle-7a9f-b'],\n  .ci-7a9f #toggle-7a9f-a:checked ~ .toggle-wrap label[for='toggle-7a9f-a'] { background: #EEC864; color: #0A1A0F; border-color: #EEC864; }\n  .ci-7a9f .toggle-content { display: none; margin-top: 0.6rem; background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.5rem; padding: 0.8rem; }\n  .ci-7a9f #toggle-7a9f-a:checked ~ .toggle-a,\n  .ci-7a9f #toggle-7a9f-b:checked ~ .toggle-b { display: block; }\n  .ci-7a9f .toggle-content h4 { color: #EEC864; margin: 0 0 0.3rem 0; font-size: 0.95rem; }\n  .ci-7a9f .toggle-content ul { margin: 0.2rem 0; padding-left: 1.2rem; font-size: 0.85rem; }\n  .ci-7a9f .toggle-content li { margin: 0.15rem 0; }\n  .ci-7a9f .toggle-content .hl { color: #5DD9A5; }\n  .ci-7a9f .toggle-content .hl2 { color: #7FB3FF; }\n  .ci-7a9f .toggle-content .hl3 { color: #FFA86E; }\n  .ci-7a9f .footer-note { margin-top: 1rem; font-size: 0.75rem; color: rgba(255,255,255,0.62); border-top: 1px solid rgba(212,175,55,0.15); padding-top: 0.6rem; }\n  @media (max-width: 500px) {\n    .ci-7a9f .pipeline { gap: 0.3rem; }\n    .ci-7a9f .step-label { width: 2rem; height: 2rem; font-size: 0.75rem; }\n    .ci-7a9f .meta-grid { grid-template-columns: 1fr; }\n  }\n</style>\n<div class='ci-7a9f'>\n  <h2>AI 기능인의 정체성 — 나는 AI 시스템 장인이다</h2>\n  <div class='sub'>모든 작업은 말에서 시작해 7개 스테이션을 거쳐 소프트웨어, 서비스, 콘텐츠, 장난감으로 물성화된다.</div>\n\n  <input type='radio' name='step-7a9f' id='step-7a9f-1' class='step-radio' checked>\n  <input type='radio' name='step-7a9f' id='step-7a9f-2' class='step-radio'>\n  <input type='radio' name='step-7a9f' id='step-7a9f-3' class='step-radio'>\n  <input type='radio' name='step-7a9f' id='step-7a9f-4' class='step-radio'>\n  <input type='radio' name='step-7a9f' id='step-7a9f-5' class='step-radio'>\n  <input type='radio' name='step-7a9f' id='step-7a9f-6' class='step-radio'>\n  <input type='radio' name='step-7a9f' id='step-7a9f-7' class='step-radio'>\n\n  <div class='pipeline'>\n    <label for='step-7a9f-1' class='step-label'>1</label>\n    <label for='step-7a9f-2' class='step-label'>2</label>\n    <label for='step-7a9f-3' class='step-label'>3</label>\n    <label for='step-7a9f-4' class='step-label'>4</label>\n    <label for='step-7a9f-5' class='step-label'>5</label>\n    <label for='step-7a9f-6' class='step-label'>6</label>\n    <label for='step-7a9f-7' class='step-label'>7</label>\n  </div>\n\n  <div class='panels'>\n    <div class='panel panel-1'>\n      <h3>1. 말 (Utterance)</h3>\n      <p>자연어 명령 / 프롬프트 — 모든 작업의 시작점. 인간의 의도를 AI 에이전트가 이해할 수 있는 형태로 변환한다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>입력</strong> <span class='tag'>텍스트</span><span class='tag gold'>자연어</span></div>\n        <div class='meta-item'><strong>도구</strong> <span class='tag'>Claude Code</span><span class='tag'>Deepseek Aider</span></div>\n      </div>\n      <div class='spec-box'><code>MCP 스키마: prompt/utterance → agent:parse</code></div>\n    </div>\n    <div class='panel panel-2'>\n      <h3>2. 해석 (Interpretation)</h3>\n      <p>에이전트가 명령을 분석하고 의도와 맥락을 추출한다. 시스템 장인으로서의 도메인 지식이 반영된다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>출력</strong> <span class='tag green'>의도 트리</span></div>\n        <div class='meta-item'><strong>할당</strong> <span class='tag purple'>런타임: 분석</span></div>\n      </div>\n      <div class='spec-box'><code>MCP: interpret/intent → context_map</code></div>\n    </div>\n    <div class='panel panel-3'>\n      <h3>3. 설계 (Design)</h3>\n      <p>시스템 아키텍처, 데이터 흐름, 컴포넌트 구조를 설계한다. 레포지토리 구조와 에이전트 설정이 결정된다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>산출물</strong> <span class='tag gold'>아키텍처 다이어그램</span></div>\n        <div class='meta-item'><strong>규칙</strong> <span class='tag yellow'>전개 규칙 적용</span></div>\n      </div>\n      <div class='spec-box'><code>레포지토리: /agents /schemas /runtime</code></div>\n    </div>\n    <div class='panel panel-4'>\n      <h3>4. 구현 (Implementation)</h3>\n      <p>MCP 도구와 AI 에이전트를 활용해 코드를 작성하고 시스템을 구현한다. Claude Code + Deepseek Aider가 협업한다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>에이전트</strong> <span class='tag'>Claude Code</span><span class='tag'>Deepseek Aider</span></div>\n        <div class='meta-item'><strong>MCP</strong> <span class='tag purple'>파일 I/O</span><span class='tag purple'>실행</span></div>\n      </div>\n      <div class='spec-box'><code>MCP: implement/generate → file_write, exec</code></div>\n    </div>\n    <div class='panel panel-5'>\n      <h3>5. 테스트 (Test)</h3>\n      <p>단위 테스트, 통합 테스트, 에이전트 기반 검증을 수행한다. 런타임 할당 테이블을 참조하여 리소스를 최적화한다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>유형</strong> <span class='tag green'>단위</span><span class='tag green'>통합</span><span class='tag orange'>에이전트 검증</span></div>\n        <div class='meta-item'><strong>할당</strong> <span class='tag purple'>런타임: 테스트</span></div>\n      </div>\n      <div class='spec-box'><code>런타임 할당 테이블: test_slot → agent:verify</code></div>\n    </div>\n    <div class='panel panel-6'>\n      <h3>6. 배포 (Deploy)</h3>\n      <p>소프트웨어, 서비스, 콘텐츠, 장난감으로 물성화된다. CI/CD 파이프라인과 MCP 배포 스키마에 따라 자동화된다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>대상</strong> <span class='tag gold'>소프트웨어</span><span class='tag gold'>서비스</span><span class='tag gold'>콘텐츠</span><span class='tag gold'>장난감</span></div>\n        <div class='meta-item'><strong>방식</strong> <span class='tag'>자동화</span><span class='tag blue'>MCP 배포</span></div>\n      </div>\n      <div class='spec-box'><code>MCP: deploy/push → artifact_registry</code></div>\n    </div>\n    <div class='panel panel-7'>\n      <h3>7. 운영 (Operate)</h3>\n      <p>모니터링, 로깅, 피드백 루프. 에이전트가 지속적으로 시스템을 관찰하고 개선한다. 인간 장인의 개입 포인트를 유지한다.</p>\n      <div class='meta-grid'>\n        <div class='meta-item'><strong>모니터링</strong> <span class='tag blue'>로그</span><span class='tag blue'>메트릭</span></div>\n        <div class='meta-item'><strong>피드백</strong> <span class='tag yellow'>인간 루프</span></div>\n      </div>\n      <div class='spec-box'><code>MCP: operate/observe → feedback → iterate</code></div>\n    </div>\n  </div>\n\n  <div class='toggle-wrap'>\n    <input type='radio' name='toggle-7a9f' id='toggle-7a9f-a' checked>\n    <input type='radio' name='toggle-7a9f' id='toggle-7a9f-b'>\n    <label for='toggle-7a9f-a'>에이전트 설정</label>\n    <label for='toggle-7a9f-b'>런타임 할당 테이블</label>\n    <div class='toggle-content toggle-a'>\n      <h4>에이전트 설정 (Agent Config)</h4>\n      <ul>\n        <li><span class='hl'>Claude Code</span> — 고급 추론, 코드 생성, MCP 오케스트레이션</li>\n        <li><span class='hl2'>Deepseek Aider</span> — 보조 분석, 테스트, 문서화</li>\n        <li><span class='hl3'>MCP 스키마</span> — 파일 I/O, 실행, 배포, 모니터링</li>\n      </ul>\n      <div class='spec-box'><code>레포지토리 구조: /agents/claude_code/config.yml, /agents/deepseek_aider/config.yml</code></div>\n    </div>\n    <div class='toggle-content toggle-b'>\n      <h4>런타임 할당 테이블 (Runtime Allocation)</h4>\n      <ul>\n        <li><span class='hl'>분석 슬롯</span> — interpret/intent → context_map</li>\n        <li><span class='hl2'>설계 슬롯</span> — design/architecture → blueprint</li>\n        <li><span class='hl3'>구현 슬롯</span> — implement/generate → code</li>\n        <li><span class='hl'>테스트 슬롯</span> — test/verify → report</li>\n        <li><span class='hl2'>배포 슬롯</span> — deploy/push → artifact</li>\n        <li><span class='hl3'>운영 슬롯</span> — operate/observe → feedback</li>\n      </ul>\n      <div class='spec-box'><code>전개 규칙: priority=sequential, fallback=agent:reassign</code></div>\n    </div>\n  </div>\n\n  <div class='footer-note'>\n    AI 기능인 인프라 v1 — 레포지토리 구조 · 에이전트 설정 · MCP 스키마 · 런타임 할당 테이블 · 전개 규칙 포함. 에이전트와 인간 독자 모두 참조 가능.\n  </div>\n</div>\n</div>"}}}, {"heading": "27 무료 런타임 — 인프라의 부품 카탈로그", "body": "무료 런타임은 금전 비용 없이 실행 자원을 확보할 수 있는 환경이다. 로컬(내 전기), 클라우드(남의 전기), AI/LLM(남의 GPU) 세 부류로 나뉜다. 로컬 7: 브라우저, Termux, WSL, Python, Node.js, Bun, Deno (무제한 무료). 클라우드 정적/웹 4: GitHub Pages(1GB), Vercel(100GB), Netlify(100GB), Cloudflare Workers(10만 요청). 클라우드 컨테이너 4: Railway($5), Render(750h), Cloud Run(200만), Fly.io(3VM). 클라우드 CI/VM 3: GitHub Actions(2000분), Oracle(ARM 영구), Replit. AI/LLM 8: Groq(14400/일), Gemini(1500/일), OpenRouter(무료모델), HF Spaces, Colab(T4 12h/일), Kaggle(T4×2 30h/주), Modal($30), Lightning(22h/월). 핵심: 무료 한도 안에서만 설계하면 비용 0원으로 글로벌 인프라를 갖는다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .ci-27 * { box-sizing: border-box; }\n  .ci-27 { background: #0A1A0F; color: #FFFFFF; padding: 1.5rem; border-radius: 1.2rem; max-width: 100%; font ='tab-8f2a-6'>데모</label><label for='tab-8f2a-7'>로컬 작업</label></div><div class='panel panel-1'><div class='grid'><div class='card'><div class='name'>Oracle VM</div><div class='desc'>항시 무료 ARM 인스턴스, 24/7 가동</div><span class='tag gold'>무료</span></div><div class='card'><div class='name'>Fly.io</div><div class='desc'>글로벌 엣지, 컨테이너 호스팅</div><span class='tag gold'>무료 한도</span></div><div class='card'><div class='name'>Cloudflare Workers</div><div class='desc'>서버리스, 10만 요청/일 무료</div><span class='tag gold'>무료</span></div></div></div><div class='panel panel-2'><div class='grid'><div class='card'><div class='name'>Colab / Kaggle</div><div class='desc'>프로토타입, 무료 GPU</div><span class='tag green'>프로토타입</span></div><div class='card'><div class='name'>RunPod</div><div class='desc'>본학습, 유료 GPU 인스턴스</div><span class='tag orange'>유료</span></div></div></div><div class='panel panel-3'><div class='grid'><div class='card'><div class='name'>GitHub Pages</div><div class='desc'>정적 사이트, 무료 호스팅</div><span class='tag gold'>무료</span></div></div></div><div class='panel panel-4'><div class='grid'><div class='card'><div class='name'>Cloudflare Workers</div><div class='desc'>Edge API, 초저지연</div><span class='tag blue'>Edge</span></div><div class='card'><div class='name'>Vercel</div><div class='desc'>풀스택, 서버리스 함수</div><span class='tag purple'>풀스택</span></div><div class='card'><div class='name'>Railway</div><div class='desc'>컨테이너 기반, 간편 배포</div><span class='tag gold'>컨테이너</span></div></div></div><div class='panel panel-5'><div class='grid'><div class='card'><div class='name'>Groq</div><div class='desc'>초고속 추론, LPU</div><span class='tag green'>속도</span></div><div class='card'><div class='name'>Gemini</div><div class='desc'>대규모 맥락, 1M 토큰</div><span class='tag purple'>맥락</span></div><div class='card'><div class='name'>OpenRouter</div><div class='desc'>멀티 모델 라우팅</div><span class='tag blue'>멀티</span></div></div></div><div class='panel panel-6'><div class='grid'><div class='card'><div class='name'>Hugging Face Spaces</div><div class='desc'>데모 호스팅, Gradio/Streamlit</div><span class='tag gold'>무료</span></div></div></div><div class='panel panel-7'><div class='grid'><div class='card'><div class='name'>Termux</div><div class='desc'>모바일 로컬 작업 (폰)</div><span class='tag blue'>모바일</span></div><div class='card'><div class='name'>WSL</div><div class='desc'>PC 로컬 작업 (Windows)</div><span class='tag purple'>PC</span></div></div></div><div class='svg-wrap'><svg viewBox='0 0 600 80'><rect x='0' y='30' width='600' height='20' rx='10' fill='rgba(212,175,55,0.15)'/><circle cx='42' cy='40' r='14' fill='#EEC864'/><text x='42' y='45' text-anchor='middle' fill='#0A1A0F' font-size='10' font-weight='bold'>1</text><circle cx='125' cy='40' r='14' fill='rgba(93,217,165,0.3)' stroke='#5DD9A5' stroke-width='2'/><text x='125' y='45' text-anchor='middle' fill='#5DD9A5' font-size='10' font-weight='bold'>2</text><circle cx='208' cy='40' r='14' fill='rgba(127,179,255,0.3)' stroke='#7FB3FF' stroke-width='2'/><text x='208' y='45' text-anchor='middle' fill='#7FB3FF' font-size='10' font-weight='bold'>3</text><circle cx='291' cy='40' r='14' fill='rgba(181,156,255,0.3)' stroke='#B59CFF' stroke-width='2'/><text x='291' y='45' text-anchor='middle' fill='#B59CFF' font-size='10' font-weight='bold'>4</text><circle cx='374' cy='40' r='14' fill='rgba(255,168,110,0.3)' stroke='#FFA86E' stroke-width='2'/><text x='374' y='45' text-anchor='middle' fill='#FFA86E' font-size='10' font-weight='bold'>5</text><circle cx='457' cy='40' r='14' fill='rgba(238,200,100,0.3)' stroke='#EEC864' stroke-width='2'/><text x='457' y='45' text-anchor='middle' fill='#EEC864' font-size='10' font-weight='bold'>6</text><circle cx='540' cy='40' r='14' fill='rgba(93,217,165,0.3)' stroke='#5DD9A5' stroke-width='2'/><text x='540' y='45' text-anchor='middle' fill='#5DD9A5' font-size='10' font-weight='bold'>7</text></svg></div><div class='principle'><strong>원칙:</strong> 가장 비싼 자원(GPU 학습)만 유료, 나머지는 전부 무료 한도 안에서 해결.</div><div class='details-wrap'><details><summary>결정 함수 상세 보기</summary><div class='detail-content'>각 작업 유형에 대해 <span class='hl'>비용</span>과 <span class='hl2'>성능</span>을 평가하여 최적의 런타임을 선택합니다. 예: 항시 가동 작업은 Oracle VM (무료 ARM) → Fly.io (글로벌) → Cloudflare Workers (서버리스) 순으로 우선순위를 둡니다. GPU 학습은 프로토타입 단계에서 Colab/Kaggle 무료 GPU를 사용하고, 본학습 시 RunPod 유료 인스턴스로 전환합니다. LLM 추론은 속도(Groq), 맥락(Gemini), 멀티 모델(OpenRouter) 중 우선순위에 따라 선택합니다.</div></details></div></div>"}}}, {"heading": "입구 스테이션 — STT 음성 인터페이스 + 로그 캡처", "body": "Station 1: 음성 인터페이스 (STT) — 모든 사고와 지시의 기본 입력 인터페이스는 말이다. 키보드 입력은 최소화하며, 거의 모든 콘텐츠는 폰과 태블릿에서 음성-텍스트 변환(STT)으로 생산된다. 아이디어, 명세, 코드 설명, 회고, 시스템 설계 전부를 타자 대신 말로 받아쓰기한다. CS/IT 관점에서 이 스테이션은 HCI(Human-Computer Interaction)와 UX를 담당하며, 문제 정의와 프롬프트 설계를 선행 처리한다. Station 2: 로그 및 데이터 캡처 — LLM과 도구의 모든 상호작용을 내구성 있는 기계 판독 로그로 변환한다. Claude, GPT 등 LLM 대화를 원시 데이터로 취급한다. Android에서 클립보드 크기 제한을 커스텀 APK로 우회한다: LLM 대화 → APK로 공유 → 기기 Download 디렉토리에 .txt 저장 → 전용 GitHub 로그 레포지토리로 동기화. CS/IT 관점에서 이는 개인 ETL 레이어다 — 추출(Extract), 저장(Store), 동기화(Sync).", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-7a3f *{box-sizing:border-box}.ci-7a3f{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;border:1px solid rgba(212,175,55,0.15);max-width:100%;overflow:hidden}.ci-7a3f h2{color:#EEC864;margin:0 0 1rem;font-size:1.4rem;font-weight:700;letter-spacing:.02em}.ci-7a3f .flow{display:flex;flex-wrap:wrap;gap:0.75rem;justify-content:center;margin-bottom:1.5rem}.ci-7a3f .flow label{background:#0D2214;border:1px solid rgba(212,175,55,0.15);border-radius:2rem;padding:0.5rem 1rem;color:rgba(255,255,255,0.62);cursor:pointer;font-size:0.85rem;transition:all .2s;user-select:none}.ci-7a3f .flow label:hover{border-color:#EEC864;color:#EEC864}.ci-7a3f input[type=radio]{display:none}.ci-7a3f #s1-7a3f:checked~.flow label[for=s1-7a3f],.ci-7a3f #s2-7a3f:checked~.flow label[for=s2-7a3f]{background:#EEC864;color:#0A1A0F;border-color:#EEC864;font-weight:700}.ci-7a3f .panel{display:none;background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:1.2rem;margin-top:0.5rem}.ci-7a3f #s1-7a3f:checked~.panel-1,.ci-7a3f #s2-7a3f:checked~.panel-2{display:block}.ci-7a3f .panel h3{color:#EEC864;margin:0 0 0.5rem;font-size:1.1rem}.ci-7a3f .panel p{margin:0.3rem 0;line-height:1.5;color:rgba(255,255,255,0.88)}.ci-7a3f .panel .tag{display:inline-block;background:#0D2214;color:#5DD9A5;border:1px solid rgba(93,217,165,0.3);border-radius:1rem;padding:0.15rem 0.6rem;font-size:0.75rem;margin-right:0.3rem;margin-bottom:0.3rem}.ci-7a3f .panel .tag2{background:#0D2214;color:#7FB3FF;border-color:rgba(127,179,255,0.3)}.ci-7a3f .panel .tag3{background:#0D2214;color:#B59CFF;border-color:rgba(181,156,255,0.3)}.ci-7a3f .svg-wrap{display:flex;justify-content:center;margin:1rem 0}.ci-7a3f svg{display:block;width:100%;height:auto;max-width:500px}.ci-7a3f .detail-box{background:#0D2214;border-left:3px solid #EEC864;padding:0.6rem 0.8rem;border-radius:0 0.5rem 0.5rem 0;margin:0.8rem 0}.ci-7a3f .detail-box p{margin:0.2rem 0;font-size:0.9rem;color:rgba(255,255,255,0.72)}.ci-7a3f .detail-box strong{color:#EEC864}.ci-7a3f details{background:rgba(13,34,20,0.6);border:1px solid rgba(212,175,55,0.15);border-radius:0.5rem;padding:0.5rem 0.8rem;margin-top:0.8rem;cursor:pointer}.ci-7a3f details summary{color:#EEC864;font-weight:600;font-size:0.9rem;cursor:pointer;list-style:none;display:flex;align-items:center;gap:0.4rem}.ci-7a3f details summary::-webkit-details-marker{display:none}.ci-7a3f details summary::before{content:'▶';color:#EEC864;font-size:0.7rem;transition:transform .2s}.ci-7a3f details[open] summary::before{transform:rotate(90deg)}.ci-7a3f details .inner{padding:0.6rem 0 0.2rem;color:rgba(255,255,255,0.82);font-size:0.9rem;line-height:1.5}.ci-7a3f .badge{display:inline-block;background:#0D2214;color:#F5C542;border:1px solid rgba(245,197,66,0.3);border-radius:0.3rem;padding:0.1rem 0.5rem;font-size:0.7rem;margin-left:0.4rem}</style><div class='ci-7a3f'><h2>🚂 입구 스테이션 — STT + 로그 캡처</h2><input type='radio' name='tab-7a3f' id='s1-7a3f' checked hidden><input type='radio' name='tab-7a3f' id='s2-7a3f' hidden><div class='flow'><label for='s1-7a3f'>🎤 Station 1: 음성 인터페이스 (STT)</label><label for='s2-7a3f'>📡 Station 2: 로그 &amp; 데이터 캡처</label></div><div class='panel panel-1'><h3>🎤 음성 인터페이스 (STT)</h3><p>모든 사고와 지시의 기본 입력 인터페이스는 <strong style='color:#EEC864'>말</strong>이다. 키보드 입력은 최소화하며, 거의 모든 콘텐츠는 폰과 태블릿에서 음성-텍스트 변환(STT)으로 생산된다.</p><div class='svg-wrap'><svg viewBox='0 0 400 120'><rect x='10' y='20' width='80' height='80' rx='12' fill='#0D2214' stroke='#EEC864' stroke-width='2'/><text x='50' y='55' text-anchor='middle' fill='#EEC864' font-size='11' font-weight='700'>음성</text><text x='50' y='72' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>입력</text><path d='M95 60 L130 60' stroke='#5DD9A5' stroke-width='2' marker-end='url(#arr-7a3f)'/><rect x='135' y='20' width='100' height='80' rx='12' fill='#0D2214' stroke='#7FB3FF' stroke-width='2'/><text x='185' y='50' text-anchor='middle' fill='#7FB3FF' font-size='10' font-weight='700'>STT</text><text x='185' y='67' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>변환</text><path d='M240 60 L275 60' stroke='#5DD9A5' stroke-width='2' marker-end='url(#arr-7a3f)'/><rect x='280' y='20' width='100' height='80' rx='12' fill='#0D2214' stroke='#5DD9A5' stroke-width='2'/><text x='330' y='50' text-anchor='middle' fill='#5DD9A5' font-size='10' font-weight='700'>텍스트</text><text x='330' y='67' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>출력</text><defs><marker id='arr-7a3f' markerWidth='8' markerHeight='6' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6' fill='#5DD9A5'/></marker></defs></svg></div><p><span class='tag'>HCI</span><span class='tag tag2'>UX</span><span class='tag tag3'>문제 정의</span><span class='tag tag3'>프롬프트 설계</span></p><div class='detail-box'><p><strong>아이디어</strong> · <strong>명세</strong> · <strong>코드 설명</strong> · <strong>회고</strong> · <strong>시스템 설계</strong></p><p>전부를 타자 대신 말로 받아쓰기한다.</p></div><details><summary>CS/IT 관점 상세</summary><div class='inner'>이 스테이션은 <strong>HCI</strong>(Human-Computer Interaction)와 <strong>UX</strong>를 담당하며, 문제 정의와 프롬프트 설계를 선행 처리한다. 음성 인터페이스는 입력 장벽을 낮추고 사고의 흐름을 끊지 않게 한다.</div></details></div><div class='panel panel-2'><h3>📡 로그 &amp; 데이터 캡처</h3><p>LLM과 도구의 모든 상호작용을 내구성 있는 기계 판독 로그로 변환한다. Claude, GPT 등 LLM 대화를 <strong style='color:#EEC864'>원시 데이터</strong>로 취급한다.</p><div class='svg-wrap'><svg viewBox='0 0 420 130'><rect x='10' y='25' width='80' height='80' rx='12' fill='#0D2214' stroke='#EEC864' stroke-width='2'/><text x='50' y='55' text-anchor='middle' fill='#EEC864' font-size='10' font-weight='700'>LLM</text><text x='50' y='72' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>대화</text><path d='M95 65 L130 65' stroke='#5DD9A5' stroke-width='2' marker-end='url(#arr2-7a3f)'/><rect x='135' y='25' width='90' height='80' rx='12' fill='#0D2214' stroke='#FFA86E' stroke-width='2'/><text x='180' y='55' text-anchor='middle' fill='#FFA86E' font-size='9' font-weight='700'>커스텀 APK</text><text x='180' y='72' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>클립보드 우회</text><path d='M230 65 L265 65' stroke='#5DD9A5' stroke-width='2' marker-end='url(#arr2-7a3f)'/><rect x='270' y='25' width='70' height='80' rx='12' fill='#0D2214' stroke='#5DD9A5' stroke-width='2'/><text x='305' y='55' text-anchor='middle' fill='#5DD9A5' font-size='10' font-weight='700'>.txt</text><text x='305' y='72' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='9'>저장</text><path d='M345 65 L375 65' stroke='#5DD9A5' stroke-width='2' marker-end='url(#arr2-7a3f)'/><rect x='380' y='25' width='30' height='80' rx='12' fill='#0D2214' stroke='#7FB3FF' stroke-width='2'/><text x='395' y='55' text-anchor='middle' fill='#7FB3FF' font-size='8' font-weight='700'>Git</text><text x='395' y='72' text-anchor='middle' fill='rgba(255,255,255,0.62)' font-size='8'>Hub</text><defs><marker id='arr2-7a3f' markerWidth='8' markerHeight='6' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6' fill='#5DD9A5'/></marker></defs></svg></div><p><span class='tag'>ETL</span><span class='tag tag2'>추출</span><span class='tag tag2'>저장</span><span class='tag tag2'>동기화</span></p><div class='detail-box'><p><strong>Android 클립보드 크기 제한</strong> → 커스텀 APK로 우회</p><p>LLM 대화 → APK로 공유 → 기기 Download 디렉토리에 .txt 저장 → 전용 GitHub 로그 레포지토리로 동기화</p></div><details><summary>CS/IT 관점 상세</summary><div class='inner'>이는 개인 <strong>ETL 레이어</strong>다 — 추출(Extract), 저장(Store), 동기화(Sync). 모든 LLM 상호작용을 구조화된 로그로 보존하여 추후 분석, 검색, 회고에 활용한다.</div></details></div></div></div>"}}}, {"heading": "중앙 스테이션 — GitHub 허브 + AI 에이전트 & MCP", "body": "Station 3: GitHub 허브 — GitHub은 코드, 로그, 콘텐츠 소스, 퍼블리싱의 중앙 허브 역할을 한다. 28개 레포가 각각 마이크로서비스처럼 동작하며, GitHub Pages + Actions가 CI/CD와 호스팅을 담당한다. 레포지토리·디렉토리·파일명은 LLM/에이전트가 읽기 쉽게 설계되어 있어 자동화된 읽기와 변환이 가능하다. 핵심 역할 4가지: (1) 소스 코드 — 도구, MCP, 유틸리티, (2) 로그 레포 — 대화 캡처 및 작업 트레이스, (3) 웹 빌더 — 정적 사이트 생성기, 문서 빌더, (4) 문서·퍼블리싱 — 책, 기술 문서, 사이트. Station 4: AI 에이전트 & MCP 레이어 — LLM 기반 에이전트(Claude Code, Deepseek Aider)가 능동적 협업자로 시스템을 구현·변환·오케스트레이션한다. 각 에이전트는 Termux 스크립트(Ph Claude.sh, Ph Aider.sh)로 실행되어 컨텍스트가 격리된다. MCP 스페이스는 명시적 역할과 JSON 스키마로 설계되어 재사용 가능한 백엔드 에셋으로 취급된다. 멀티 LLM 비교 루틴으로 동일 질문을 여러 모델에 던져 교차 검증하고 최종 결정을 내린다.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-3a7f *{box-sizing:border-box;margin:0;padding:0}.ci-3a7f{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;border:1px solid rgba(212,175,55,0.15);max-width:100%;overflow:hidden;font-family:inherit}.ci-3a7f h2{color:#EEC864;font-size:1.3rem;margin-bottom:0.5rem;font-weight:600}.ci-3a7f .sub{color:rgba(255,255,255,0.62);font-size:0.85rem;margin-bottom:1.2rem;line-height:1.4}.ci-3a7f .hub-row{display:flex;flex-wrap:wrap;gap:0.8rem;margin-bottom:1.5rem}.ci-3a7f .hub-card{flex:1 1 180px;background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.7rem;padding:0.8rem;cu
