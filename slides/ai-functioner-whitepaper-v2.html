<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0A1A0F">
<meta property="og:title" content="AI 기능인 백서 v2 — 27 무료 런타임 × 7 스테이션">
<meta property="og:type" content="article">
<title>AI 기능인 백서 v2 — 27 무료 런타임 × 7 스테이션</title>

<!-- Parksy v2: Stripe Docs-grade interactive tutorial — WCAG 2.2 AAA -->
<!-- Performance: preconnect + DNS prefetch (cuts RTT) -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<!-- Prism CSS only (lightweight, prevents FOUC); JS is deferred -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      crossorigin="anonymous">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A1A0F;--bg2:#0D2214;--gold:#EEC864;--yellow:#F5C542;--green:#5DD9A5;
  --blue:#7FB3FF;--purple:#B59CFF;
  --muted:rgba(255,255,255,0.62);--muted2:rgba(255,255,255,0.40);--text:#FFFFFF;
  --border:rgba(212,175,55,0.15);--border2:rgba(52,211,153,0.15);
  --card-bg:rgba(13,34,20,0.8);--code-bg:#061209;
  --card-r:10px;--badge-r:6px;--border-w:1.5px;
  --anim:0.4s;--anim-fast:0.25s;--ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --stagger:0.08;
  --font:system-ui,-apple-system,'SF Pro Display',sans-serif;--mono:'SF Mono','Fira Code','Consolas',monospace;--body-sz:13px;--body-lh:1.65;
}

html,body{
  background:var(--bg);color:var(--text);font-family:var(--font);
  height:100vh;overflow:hidden;
}

/* ── Cinematic filter overlay ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% -5%,rgba(212,175,55,0.07),transparent 60%),
    radial-gradient(ellipse 40% 60% at 95% 50%,rgba(96,165,250,0.04),transparent 60%),
    radial-gradient(ellipse 40% 60% at 5%  50%,rgba(167,139,250,0.03),transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
}

/* ── Particle canvas ── */
#particle-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;
}

/* ── Header ── */
#art-header{
  position:fixed;top:0;left:0;right:240px;z-index:800;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border-bottom:var(--border-w) solid var(--border);
  padding:14px 20px 14px 32px;
}
.art-header-inner{display:flex;align-items:center;gap:14px;max-width:1100px;margin:0 auto;}
.art-badge{
  font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);border:1.5px solid rgba(212,175,55,.35);
  border-radius:var(--badge-r);padding:3px 10px;white-space:nowrap;flex-shrink:0;
}
#art-h1{
  font-size:clamp(13px,1.5vw,19px);font-weight:800;letter-spacing:-.02em;
  color:var(--text);
  display:-webkit-inline-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  flex:1;line-height:1.3;word-break:break-all;
}
.art-meta-row{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.art-slide-counter{
  font-size:12px;color:var(--gold);font-family:var(--mono);font-weight:700;
  border:1px solid rgba(212,175,55,.3);border-radius:var(--badge-r);padding:4px 10px;
}
.art-slide-counter .art-slide-total{color:var(--muted);}

/* ── TOC sidebar ── */
#toc-sidebar{
  position:fixed;top:0;right:0;width:240px;height:100vh;z-index:700;
  background:rgba(10,26,15,.75);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border-left:var(--border-w) solid var(--border);
  padding:70px 0 100px;
  overflow-y:auto;
  transition:transform .35s var(--ease);
}
#toc-sidebar.toc-hidden{transform:translateX(100%);}
#toc-sidebar::-webkit-scrollbar{width:3px;}
#toc-sidebar::-webkit-scrollbar-track{background:transparent;}
#toc-sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.toc-label{
  font-size:8.5px;font-weight:800;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gold);opacity:.7;padding:0 20px;margin-bottom:12px;
}
.toc-list{list-style:none;}
.toc-item a{
  display:flex;align-items:center;gap:8px;
  padding:8px 20px;font-size:12px;
  color:var(--muted);text-decoration:none;
  border-left:2px solid transparent;
  transition:color .2s,border-color .2s,background .2s;
  line-height:1.4;
}
.toc-item a .toc-dot{
  width:5px;height:5px;border-radius:50%;background:var(--border);flex-shrink:0;
  transition:background .2s,transform .2s;
}
.toc-item a:hover{color:var(--text);background:rgba(212,175,55,.05);}
.toc-item a:hover .toc-dot{background:var(--gold);}
.toc-item.active a{
  color:var(--gold);border-left-color:var(--gold);
  background:rgba(212,175,55,.07);font-weight:700;
}
.toc-item.active a .toc-dot{background:var(--gold);transform:scale(1.4);}

/* ── Slide container ── */
#slide-container{
  position:fixed;top:56px;left:0;right:240px;bottom:64px;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;
}
#slide-container::-webkit-scrollbar{width:4px;}
#slide-container::-webkit-scrollbar-track{background:transparent;}
#slide-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.slide{
  display:none;
  width:100%;max-width:800px;margin:0 auto 40px;
  padding:40px 48px;
  flex-direction:column;
  animation:slideFadeIn .4s ease both;
  flex-shrink:0;
}
.slide:last-child{margin-bottom:0;}
.slide.active{display:flex;}
@keyframes slideFadeIn{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── Hero slide ── */
.slide-hero{text-align:center;align-items:center;}
.slide-hero .art-hero-title{
  font-size:clamp(28px,4.5vw,52px);font-weight:900;letter-spacing:-.035em;
  line-height:1.12;color:var(--text);margin-bottom:20px;
}
.slide-hero .art-hero-title em{color:var(--gold);font-style:normal;}
.slide-hero .art-hero-lead{
  font-size:clamp(14px,1.8vw,18px);color:var(--muted);
  line-height:1.8;max-width:600px;
}

/* ── Section slide ── */
.section-num{
  font-size:10px;font-weight:800;letter-spacing:.12em;font-family:var(--mono);
  color:rgba(212,175,55,.4);margin-bottom:8px;
}
.art-heading{
  font-size:clamp(17px,2.2vw,24px);font-weight:800;
  color:var(--gold);letter-spacing:-.02em;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:var(--border-w) solid var(--border);
  display:flex;align-items:center;gap:12px;
}
.art-heading::before{
  content:'';display:inline-block;
  width:3px;height:1em;
  background:linear-gradient(180deg,var(--gold),var(--yellow));
  border-radius:2px;flex-shrink:0;
}
.art-body{
  font-size:var(--body-sz);line-height:var(--body-lh);
  color:var(--text);word-break:keep-all;
}
.art-body strong,.art-body b{color:var(--yellow);font-weight:700;}
.art-body code{
  font-family:var(--mono);font-size:.88em;
  background:var(--code-bg);padding:1px 6px;border-radius:4px;color:var(--green);
}

/* ── Highlight box ── */
.art-highlight{
  position:relative;
  background:var(--card-bg);
  border:var(--border-w) solid var(--border);
  border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  padding:14px 40px 14px 18px;
  font-size:13px;line-height:var(--body-lh);
  color:var(--muted);margin-top:14px;
  cursor:pointer;overflow:hidden;
  transition:border-color .25s var(--ease),box-shadow .25s var(--ease),background .25s var(--ease);
}
.art-highlight:hover{
  border-color:rgba(212,175,55,.45);
  border-left-color:var(--gold);
  box-shadow:0 0 24px rgba(212,175,55,.1);
  background:rgba(212,175,55,.04);
}
.art-highlight strong,.art-highlight b{color:var(--gold);font-weight:700;}
.hl-expand-icon{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:rgba(212,175,55,.4);
  transition:transform .3s var(--ease),color .2s;
  user-select:none;
}
.art-highlight.expanded{
  padding-bottom:18px;
  box-shadow:0 0 28px rgba(212,175,55,.12);
  background:rgba(212,175,55,.05);
  border-color:rgba(212,175,55,.5);
}
.art-highlight.expanded .hl-expand-icon{
  transform:translateY(-50%) rotate(45deg);
  color:var(--gold);
}
.hl-extra{
  max-height:0;overflow:hidden;
  transition:max-height .4s var(--ease),opacity .4s var(--ease);
  opacity:0;font-size:12.5px;color:rgba(232,245,233,.55);line-height:1.75;
}
.art-highlight.expanded .hl-extra{max-height:200px;opacity:1;margin-top:10px;}
.art-quote{
  border-left:3px solid var(--purple);
  padding:10px 14px;margin:12px 0;
  background:rgba(167,139,250,.06);
  border-radius:0 var(--card-r) var(--card-r) 0;
  font-size:13px;color:rgba(232,245,233,.7);line-height:1.75;font-style:italic;
}

/* ── Bottom nav bar ── */
#slide-nav{
  position:fixed;bottom:0;left:0;right:240px;z-index:900;
  display:flex;align-items:center;justify-content:center;gap:20px;
  padding:12px 24px;
  background:rgba(10,26,15,.88);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:var(--border-w) solid var(--border);
}
#slide-nav button{
  background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:13px;font-weight:700;
  padding:7px 20px;border-radius:20px;cursor:pointer;
  transition:background .2s,opacity .2s;
  font-family:var(--font);
}
#slide-nav button:hover{background:rgba(212,175,55,.25);}
#slide-nav button:disabled{opacity:0.3;cursor:default;background:transparent;}
#slide-nav .counter{
  font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);min-width:60px;text-align:center;
}
#slide-nav .counter .sep{color:var(--muted);font-weight:400;margin:0 4px;}
#slide-nav .counter .total{color:var(--muted);font-weight:400;}

/* ── Right progress dots ── */
#slide-dots{
  position:fixed;right:256px;top:50%;transform:translateY(-50%);z-index:500;
  display:none;flex-direction:column;gap:8px;
}
#slide-dots.show{display:flex;}
.slide-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--border);cursor:pointer;
  transition:all .25s;
}
.slide-dot:hover{background:var(--muted2);}
.slide-dot.active{
  background:var(--gold);transform:scale(1.6);
  box-shadow:0 0 8px rgba(212,175,55,.5);
}

/* ── TOC toggle button ── */
#toc-toggle{
  position:fixed;top:14px;right:12px;z-index:801;
  background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);
  color:var(--gold);font-size:11px;font-weight:700;
  padding:5px 12px;border-radius:var(--badge-r);cursor:pointer;
  font-family:var(--font);letter-spacing:.05em;
  transition:background .2s;
}
#toc-toggle:hover{background:rgba(212,175,55,.25);}

/* ── Keyboard hint ── */
#kbd-hint{
  position:fixed;bottom:60px;right:256px;z-index:500;
  font-size:10px;color:var(--muted2);opacity:.4;
  font-family:var(--mono);pointer-events:none;
  text-align:right;line-height:1.6;
}

/* ── Responsive ── */
@media(max-width:900px){
  #toc-sidebar{display:none;}
  #slide-container{right:0;}
  #slide-nav{right:0;}
  #slide-dots{display:none!important;}
  #kbd-hint{display:none;}
  .slide{padding:24px 20px;}
  #art-header{right:0;padding:12px 16px;}
  #toc-toggle{display:none;}
  /* D-030 v3: 모바일 일반 모드 헤로 심플화 (record-mode와 같은 룩) */
  .slide-hero{min-height:auto !important;padding:60px 20px 50px !important;text-align:center;}
  .art-hero-title{font-size:36px !important;line-height:1.18 !important;margin-bottom:16px !important;letter-spacing:-.025em !important;font-weight:900;}
  .art-hero-lead{font-size:15px !important;line-height:1.65 !important;margin:0 0 22px !important;color:rgba(232,245,233,.78);}
  /* 헤로 메타: chip 풀세트 + 키 안내 hide. 메타 한 줄 + 시작 버튼만 살림 */
  .slide-hero > div:last-child{margin-top:18px !important;gap:10px !important;}
  .slide-hero > div:last-child > div:first-child{font-size:10px !important;opacity:.55 !important;letter-spacing:.14em !important;}
  .slide-hero > div:last-child > div:nth-child(2){display:none !important;}
  #hero-start-btn{font-size:13px !important;padding:11px 22px !important;}
  .slide-hero > div:last-child > div:last-child > div:last-child{display:none !important;}
}

/* ════════════════════════════════════════════════════════════════
   v2 AAA additions — WCAG 2.2 AAA + Stripe Docs-grade interactions
   ════════════════════════════════════════════════════════════════ */

/* ── Skip link (WCAG 2.4.1) ── */
.skip-link{
  position:absolute;top:-100px;left:0;
  background:var(--gold);color:#000;padding:12px 16px;
  z-index:9999;text-decoration:none;font-weight:700;
  border-radius:0 0 6px 0;
}
.skip-link:focus{top:0;}

/* ── Focus-visible (WCAG 2.4.7 AAA) ── */
button:focus-visible,a:focus-visible,input:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--gold) !important;
  outline-offset:2px !important;
  border-radius:4px;
}

/* ── Touch targets ≥44×44 (WCAG 2.5.5 AAA) ── */
#slide-nav button,#toc-toggle{
  min-width:44px;min-height:44px;padding:10px 24px;
}
.toc-item a,.slide-dot{
  min-width:44px;min-height:44px;
  display:flex;align-items:center;
}
.slide-dot{justify-content:center;}

/* ── Reduced motion (WCAG 2.3.3 AAA) ── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
  #particle-canvas{display:none;}
}

/* ── Code blocks v2 (Prism + line numbers + copy button) ── */
.art-codeblock{
  position:relative;background:var(--code-bg);
  border:1.5px solid var(--border);border-radius:var(--card-r);
  margin:14px 0;overflow:hidden;
}
.art-codeblock-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(212,175,55,.08);
  border-bottom:1px solid var(--border);font-size:11px;
  font-family:var(--mono);color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
}
.art-codeblock-lang{color:var(--gold);font-weight:700;}
.art-codeblock-actions{display:flex;gap:6px;}
.art-codeblock-btn{
  background:none;border:1px solid var(--border);
  color:var(--muted);padding:4px 10px;border-radius:4px;
  cursor:pointer;font-size:10px;font-family:var(--mono);
  transition:all .15s;
}
.art-codeblock-btn:hover{
  background:var(--gold);color:#000;border-color:var(--gold);
}
.art-codeblock pre{
  margin:0;padding:12px;overflow-x:auto;
  font-family:var(--mono);font-size:13px;line-height:1.6;
  background:transparent;
}
.art-codeblock pre code{
  background:transparent;padding:0;color:var(--text);
}
.art-codeblock .line-highlight{
  background:rgba(212,175,55,.18) !important;
  margin-left:-12px;padding-left:12px;
  border-left:3px solid var(--gold);
}
.art-codeblock-runnable .art-codeblock-output{
  background:#000;color:var(--green);
  padding:8px 12px;font-family:var(--mono);font-size:12px;
  border-top:1px dashed var(--border);
  white-space:pre-wrap;line-height:1.4;
}

/* ── Variable input form ── */
.art-input-group{
  background:rgba(212,175,55,.06);
  border:1px solid rgba(212,175,55,.25);
  border-radius:var(--card-r);
  padding:14px;margin:14px 0;
}
.art-input-group label{
  display:block;font-size:11px;font-weight:700;
  color:var(--gold);text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:6px;
}
.art-input-group input[type=text],
.art-input-group input[type=number]{
  width:100%;padding:10px;font-size:13px;
  background:rgba(0,0,0,.3);color:var(--text);
  border:1px solid rgba(212,175,55,.3);border-radius:4px;
  font-family:var(--mono);min-height:44px;
}
.art-input-group input:focus{
  outline:none;border-color:var(--gold);
  box-shadow:0 0 8px rgba(212,175,55,.3);
}

/* ── CTA buttons ── */
.art-cta{
  display:inline-block;margin:8px 8px 8px 0;padding:12px 24px;
  background:var(--gold);color:#000;font-weight:700;font-size:13px;
  text-decoration:none;border-radius:6px;border:none;cursor:pointer;
  text-transform:uppercase;letter-spacing:.08em;
  min-height:44px;min-width:44px;
  transition:all .2s;
}
.art-cta:hover{
  filter:brightness(1.08);transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(212,175,55,.3);
}
.art-cta-secondary{
  background:transparent;color:var(--gold);
  border:1.5px solid var(--gold);
}

/* ── Infographic container ── */
.art-infographic{
  margin:18px 0;padding:14px;
  background:var(--card-bg);
  border:1.5px solid var(--border);border-left:3px solid var(--gold);
  border-radius:var(--card-r);
  min-height:200px;overflow:auto;
}
.art-infographic[data-infographic="stat_counter"]{display:grid;}

/* ── Cost transparency footer (Parksy differentiator #4) ── */
.art-cost-footer{
  position:fixed;bottom:8px;left:8px;z-index:400;
  font-size:10px;color:var(--muted2);opacity:.5;
  font-family:var(--mono);pointer-events:auto;
  background:rgba(10,26,15,.7);padding:4px 8px;border-radius:4px;
  cursor:pointer;
}
.art-cost-footer:hover{opacity:1;}

/* ── ARIA live region ── */
.sr-only{
  position:absolute !important;width:1px !important;height:1px !important;
  padding:0 !important;margin:-1px !important;overflow:hidden !important;
  clip:rect(0,0,0,0) !important;white-space:nowrap !important;border:0 !important;
}

/* ── slide-mode (extractor capture) ── */
body.slide-mode #art-header,
body.slide-mode #toc-sidebar,
body.slide-mode #slide-nav,
body.slide-mode #slide-dots,
body.slide-mode #toc-toggle,
body.slide-mode #kbd-hint,
body.slide-mode .art-cost-footer,
body.slide-mode .skip-link{display:none !important;}
body.slide-mode #slide-container{top:0;right:0;}

/* ── narrate-mode (scroll-based lecture) ── */
body.narrate-mode .slide{display:block !important;opacity:1 !important;}
body.narrate-mode #slide-dots,
body.narrate-mode #slide-nav{display:none;}
</style>
</head>
<body>

<!-- WCAG 2.4.1: Skip link -->
<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<!-- ARIA live region for slide changes (4.1.3 AA) -->
<div id="a11y-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<!-- ── Header ── -->
<header id="art-header" role="banner">
  <div class="art-header-inner">
    <span class="art-badge">PARKSY 슬라이드</span>
    <div id="art-h1">AI 기능인 백서 v2 — 27 무료 런타임 × 7 스테이션</div>
    <div class="art-meta-row">
      <span class="art-slide-counter" id="slide-counter-e9a53be6">
        <span id="slide-cur-e9a53be6">1</span>
        <span class="sep">/</span>
        <span class="total" id="slide-total-e9a53be6">—</span>
      </span>
    </div>
  </div>

span class='highlight'>무료 런타임</span>이 각 워크센터에 분산 배치됩니다. 사용자는 별도 비용 없이 즉시 실행 환경을 할당받을 수 있습니다.</p><p><span class='warn'>✓</span> 런타임 풀 자동 관리 · <span class='link'>세부 정책 보기</span></p></div><div class='panel' id='panel-7s-2' style='display:none'><h3>스테이션 2 · 워크센터 구성</h3><p>7개의 <span class='highlight'>스테이션 워크센터</span>가 단계별로 연결됩니다. 각 워크센터는 독립된 작업 공간을 제공하며, 데이터를 순차적으로 전달합니다.</p><p><span class='adv'>⚙</span> 워크센터 간 통신 프로토콜 · <span class='right'>지연 최적화</span></p></div><div class='panel' id='panel-7s-3' style='display:none'><h3>스테이션 3 · 공리 1: 자원 격리</h3><p>모든 런타임은 <span class='highlight'>완전 격리</span>되어 실행됩니다. 한 워크센터의 장애가 다른 스테이션에 영향을 주지 않습니다.</p><p><span class='num'>보안 등급: S+</span></p></div><div class='panel' id='panel-7s-4' style='display:none'><h3>스테이션 4 · 공리 2: 상태 불변</h3><p>각 스테이션의 <span class='highlight'>상태는 불변</span>입니다. 작업 완료 후 상태가 초기화되어 항상 동일한 조건에서 실행됩니다.</p><p><span class='warn'>재현성 100%</span> · 디버깅 용이</p></div><div class='panel' id='panel-7s-5' style='display:none'><h3>스테이션 5 · 공리 3: 선형 전개</h3><p>워크센터는 <span class='highlight'>선형 순서</span>로 실행됩니다. 병렬 처리 없이 단계별로 진행되어 예측 가능한 결과를 보장합니다.</p><p><span class='link'>타임라인 시각화</span></p></div><div class='panel' id='panel-7s-6' style='display:none'><h3>스테이션 6 · 공리 4: 자동 복구</h3><p>런타임 오류 발생 시 <span class='highlight'>자동 복구</span> 메커니즘이 작동합니다. 최대 3회 재시도 후 실패 처리됩니다.</p><p><span class='adv'>복구 시간: &lt; 2초</span></p></div><div class='panel' id='panel-7s-7' style='display:none'><h3>스테이션 7 · 통합 모니터링</h3><p>모든 스테이션의 <span class='highlight'>27개 런타임</span> 상태를 실시간으로 모니터링합니다. 대시보드에서 각 워크센터의 부하와 성능을 확인할 수 있습니다.</p><p><span class='right'>처리량: 1,200 req/s</span></p></div></div><div class='bottom-grid'><div class='card'><h4>27 무료 런타임</h4><p>각 워크센터에 <span class='num'>3~5개</span> 런타임 할당 · 탄력적 스케일링</p><p><span class='warn'>사용량 제한 없음</span> · 선착순 할당</p></div><div class='card'><h4>7 스테이션 워크센터</h4><p>스테이션 1~7 순차 실행 · 데이터 파이프라인</p><p><span class='link'>워크센터 간 지연: &lt; 10ms</span></p></div></div><details><summary>4대 공리 상세 보기</summary><div class='axiom- 조화</span></div><div class='station'><span class='num'>5</span><span class='label'>생성</span></div><div class='station'><span class='num'>6</span><span class='label'>검증</span></div><div class='station'><span class='num'>7</span><span class='label'>배포</span></div></div><details><summary>7 스테이션 상세</summary><div class='detail-body'>각 스테이션은 Layer 2 응용 아키텍처의 구성 요소입니다. v2에서는 각 스테이션이 어떤 무료 런타임 위에서 동작하는지 명시합니다. 예: 수집 → Cloudflare Workers, 정제 → Hugging Face Inference 등.</div></details></div><div class='panel panel-2'><div class='compare-row'><div class='compare-col'><h4>v1 (2026-05-03)</h4>7 스테이션 파이프라인만 정의<br>실행 자원 명시 없음<br>설계도만 존재</div><div class='compare-col v2'><h4>v2 (통합)</h4>7 스테이션 + 27개 무료 런타임<br>Layer 0 (런타임 개론)<br>Layer 2 (응용 아키텍처)<br>환원·합성 관계 명시</div></div><details><summary>결정적 결손 해소</summary><div class='detail-body'>v1의 결정적 결손: 각 스테이션이 어떤 실행 자원 위에서 도느냐가 명시되지 않음. v2는 이 둘을 한 권으로 합쳐 설계도와 부품 카탈로그를 통합 제공합니다.</div></details></div><div class='panel panel-3'><div class='layer-stack'><div class='layer'><span class='badge purple'>Layer 2</span> 응용 아키텍처 — 7 스테이션</div><div class='arrow'>↓ 환원·합성</div><div class='layer'><span class='badge blue'>Layer 1</span> 환원·합성 관계</div><div class='arrow'>↓ 기반</div><div class='layer'><span class='badge green'>Layer 0</span> 27개 무료 런타임 베이스라인 개론</div></div><div class='runtime-grid'><div class='runtime-item'>Cloudflare Workers</div><div class='runtime-item'>Hugging Face</div><div class='runtime-item'>Replit</div><div class='runtime-item'>Glitch</div><div class='runtime-item'>Vercel</div><div class='runtime-item'>Netlify</div><div class='runtime-item'>Railway</div><div class='runtime-item'>Fly.io</div><div class='runtime-item'>Deno Deploy</div><div class='runtime-item'>GitHub Pages</div><div class='runtime-item'>Streamlit</div><div class='runtime-item'>Colab</div></div><details><summary>27개 런타임 전체 보기</summary><div class='detail-body'>전체 27개 무료 런타임 목록은 Layer 0에서 다룹니다. 각 런타임은 특정 스테이션에 최적화되어 있으며, v2는 이 매핑을 명시합니다.</div></details></div><div class='footnote'>v2는 27개 무료 런타임을 베이스라인 개론(Layer 0)으로, 7 스테이션을 응용 아키텍처(Layer 2)로, 그 사이의 환원·합성 관계를 명시한다.</div></div></div>"}}}, {"heading": "정체성 선언", "body": "나는 AI 기능인(AI Functioner)이다. 모든 작업은 말(STT)로 시작해, 27개 무료 런타임 위에 배치된 7 스테이션을 거쳐, 마지막에는 웹페이지·디지털 콘텐츠·IoT 장난감 같은 실제 물건으로 굳어진다. 레이어 위계: Layer 0: 27개 무료 런타임 → \"뭐가 있나\" (도구 개론) Layer 1: 각 런타임 운용법 → \"어떻게 쓰나\" (도구 각론) Layer 2: 7 스테이션 워크센터 → \"어떻게 엮나\" (시스템 아키텍처) Layer 3: AI 기능인 자기 시스템 → \"내 것 만들기\" (개인 주권 인프라)", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .ci-uid-0 { background: #0A1A0F; color: #FFFFFF; padding: 1.5rem; border-radius: 1rem; max-width: 100%; font-family: inherit; }\n  .ci-uid-0 * { box-sizing: border-box; }\n  .ci-uid-0 h2 { color: #EEC864; margin: 0 0 0.5rem 0; font-size: 1.6rem; font-weight: 700; }\n  .ci-uid-0 .sub { color: rgba(255,255,255,0.62); margin: 0 0 1.2rem 0; font-size: 0.95rem; }\n  .ci-uid-0 .layers { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.5rem; }\n  .ci-uid-0 details { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.4rem 0.8rem; transition: all 0.2s; }\n  .ci-uid-0 details[open] { border-color: #EEC864; background: rgba(13,34,20,0.95); }\n  .ci-uid-0 summary { cursor: pointer; color: #EEC864; font-weight: 600; padding: 0.3rem 0; list-style: none; display: flex; align-items: center; gap: 0.5rem; }\n  .ci-uid-0 summary::-webkit-details-marker { display: none; }\n  .ci-uid-0 summary::before { content: '▶'; color: #EEC864; font-size: 0.75rem; transition: transform 0.2s; }\n  .ci-uid-0 details[open] summary::before { transform: rotate(90deg); }\n  .ci-uid-0 .layer-content { padding: 0.5rem 0 0.3rem 1.2rem; color: #FFFFFF; font-size: 0.9rem; line-height: 1.5; }\n  .ci-uid-0 .layer-content span { color: #5DD9A5; }\n  .ci-uid-0 .layer-content .hl { color: #F5C542; }\n  .ci-uid-0 .layer-content .sec { color: #7FB3FF; }\n  .ci-uid-0 .layer-content .adv { color: #B59CFF; }\n  .ci-uid-0 .pipeline { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin: 1.5rem 0 1rem; }\n  .ci-uid-0 .station { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.6rem; padding: 0.4rem 0.7rem; text-align: center; min-width: 3.2rem; flex: 1 0 auto; max-width: 5rem; transition: all 0.2s; cursor: default; }\n  .ci-uid-0 .station:hover { border-color: #EEC864; background: rgba(238,200,100,0.12); transform: scale(1.05); }\n  .ci-uid-0 .station .num { color: #EEC864; font-weight: 700; font-size: 0.85rem; }\n  .ci-uid-0 .station .label { color: rgba(255,255,255,0.62); font-size: 0.65rem; }\n  .ci-uid-0 .station .detail { display: none; margin-top: 0.3rem; color: #5DD9A5; font-size: 0.6rem; }\n  .ci-uid-0 .station:hover .detail { display: block; }\n  .ci-uid-0 .runtime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(4.5rem, 1fr)); gap: 0.4rem; margin: 1rem 0; }\n  .ci-uid-0 .runtime-item { background: rgba(13,34,20,0.8); border: 1px solid rgba(212,175,55,0.15); border-radius: 0.4rem; padding: 0.3rem 0.4rem; text-align: center; font-size: 0.7rem; color: #7FB3FF; transition: all 0.2s; }\n  .ci-uid-0 .runtime-item:hover { border-color: #EEC864; color: #EEC864; background: rgba(238,200,100,0.08); }\n  .ci-uid-0 .footer-note { margin-top: 1.2rem; padding-top: 0.8rem; border-top: 1px solid rgba(212,175,55,0.15); color: rgba(255,255,255,0.62); font-size: 0.8rem; text-align: center; }\n  .ci-uid-0 .footer-note strong { color: #EEC864; }\n</style>\n<div class=\"ci-uid-0\">\n  <h2>🧠 정체성 선언</h2>\n  <p class=\"sub\">나는 AI 기능인(AI Functioner)이다. 모든 작업은 말(STT)로 시작해, 27개 무료 런타임 위에 배치된 7 스테이션을 거쳐, 마지막에는 웹페이지·디지털 콘텐츠·IoT 장난감 같은 실제 물건으로 굳어진다.</p>\n\n  <div class=\"layers\">\n    <details>\n      <summary>Layer 0: 27개 무료 런타임 → \"뭐가 있나\" (도구 개론)</summary>\n      <div class=\"layer-content\">\n        <span>27</span>개의 무료 런타임을 탐색합니다. 각 런타임은 <span class=\"hl\">클라우드 함수</span>, <span class=\"sec\">서버리스</span>, <span class=\"adv\">에지 컴퓨팅</span> 등 다양한 환경을 제공합니다. 아래 그리드에서 주요 런타임을 살펴보세요.\n      </div>\n    </details>\n    <details>\n      <summary>Layer 1: 각 런타임 운용법 → \"어떻게 쓰나\" (도구 각론)</summary>\n      <div class=\"layer-content\">\n        각 런타임의 구체적인 사용법, API 호출 방식, 환경 변수 설정, 배포 전략을 다룹니다. <span class=\"hl\">예: Vercel Edge Functions, Cloudflare Workers, Deno Deploy</span>\n      </div>\n    </details>\n    <details>\n      <summary>Layer 2: 7 스테이션 워크센터 → \"어떻게 엮나\" (시스템 아키텍처)</summary>\n      <div class=\"layer-content\">\n        7개의 스테이션이 파이프라인으로 연결됩니다. 각 스테이션은 <span class=\"sec\">음성 입력 → 처리 → 변환 → 조합 → 배포 → 테스트 → 출력</span>의 단계를 담당합니다.\n      </div>\n    </details>\n    <details>\n      <summary>Layer 3: AI 기능인 자기 시스템 → \"내 것 만들기\" (개인 주권 인프라)</summary>\n      <div class=\"layer-content\">\n        최종 레이어: 나만의 AI 기능인 시스템을 구축합니다. <span class=\"adv\">개인 주권</span>을 기반으로 한 인프라로, 모든 데이터와 프로세스를 통제합니다.\n      </div>\n    </details>\n  </div>\n\n  <div class=\"pipeline\">\n    <div class=\"station\"><div class=\"num\">1</div><div class=\"label\">음성</div><div class=\"detail\">STT</div></div>\n    <div class=\"station\"><div class=\"num\">2</div><div class=\"label\">분석</div><div class=\"detail\">의도</div></div>\n    <div class=\"station\"><div class=\"num\">3</div><div class=\"label\">변환</div><div class=\"detail\">코드</div></div>\n    <div class=\"station\"><div class=\"num\">4</div><div class=\"label\">조합</div><div class=\"detail\">모듈</div></div>\n    <div class=\"station\"><div class=\"num\">5</div><div class=\"label\">배포</div><div class=\"detail\">런타임</div></div>\n    <div class=\"station\"><div class=\"num\">6</div><div class=\"label\">테스트</div><div class=\"detail\">검증</div></div>\n    <div class=\"station\"><div class=\"num\">7</div><div class=\"label\">출력</div><div class=\"detail\">제품</div></div>\n  </div>\n\n  <div class=\"runtime-grid\">\n    <div class=\"runtime-item\">Vercel</div>\n    <div class=\"runtime-item\">Cloudflare</div>\n    <div class=\"runtime-item\">Deno</div>\n    <div class=\"runtime-item\">Netlify</div>\n    <div class=\"runtime-item\">Fly.io</div>\n    <div class=\"runtime-item\">Railway</div>\n    <div class=\"runtime-item\">Render</div>\n    <div class=\"runtime-item\">Glitch</div>\n    <div class=\"runtime-item\">Replit</div>\n    <div class=\"runtime-item\">CodeSandbox</div>\n    <div class=\"runtime-item\">StackBlitz</div>\n    <div class=\"runtime-item\">GitPod</div>\n    <div class=\"runtime-item\">GitHub Codespaces</div>\n    <div class=\"runtime-item\">AWS Lambda</div>\n    <div class=\"runtime-item\">Google Cloud Run</div>\n    <div class=\"runtime-item\">Azure Functions</div>\n    <div class=\"runtime-item\">Supabase Edge</div>\n    <div class=\"runtime-item\">PlanetScale</div>\n    <div class=\"runtime-item\">Neon</div>\n    <div class=\"runtime-item\">TiDB Serverless</div>\n    <div class=\"runtime-item\">MongoDB Atlas</div>\n    <div class=\"runtime-item\">Fauna</div>\n    <div class=\"runtime-item\">Upstash</div>\n    <div class=\"runtime-item\">Redis Cloud</div>\n    <div class=\"runtime-item\">Convex</div>\n    <div class=\"runtime-item\">Val.town</div>\n    <div class=\"runtime-item\">Pipedream</div>\n  </div>\n\n  <div class=\"footer-note\">\n    <strong>7 스테이션</strong> · <strong>27 런타임</strong> · 말 한마디로 시작되는 AI 기능인 파이프라인\n  </div>\n</div>\n</div>"}}}, {"heading": "무료 런타임 27 — 분류와 목록", "body": "무료 런타임: 일정 조건 안에서 금전 비용 없이 실행 자원을 확보할 수 있는 환경. 로컬(내 전기)과 클라우드(남의 전기)로 나뉜다. 로컬(7): 브라우저, Termux, WSL, Python, Node.js, Bun, Deno 클라우드 정적/웹(4): GitHub Pages, Vercel, Netlify, Cloudflare Workers 클라우드 컨테이너(4): Railway, Render, Google Cloud Run, Fly.io 클라우드 CI/VM(3): GitHub Actions, Oracle Cloud VM, Replit AI/LLM(8): Groq, Gemini, OpenRouter, HF Spaces, HF Inference, Colab, Kaggle, Modal, Lightning.ai", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-27 *{box-sizing:border-box;margin:0;padding:0}.ci-27{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;bord pan></div></div></div><details><summary>상세 비교</summary><div class='detail-content'>Oracle VM: 1GB RAM, 4OCPU, 200MBps — 소규모 서비스에 적합. Fly.io: Anycast IP, 330ms 콜드 스타트. Cloudflare Workers: 128MB 메모리, 30ms 콜드 스타트, 10ms 응답.</div></details></div><div class='panel panel-2'><h3>GPU 필요</h3><p>딥러닝 학습 및 추론. GPU 자원이 필수인 작업.</p><div class='grid'><div class='grid-item'><div class='label'>Colab / Kaggle</div><div class='value'>프로토타입, 무료 GPU<span class='badge purple'>무료</span></div></div><div class='grid-item'><div class='label'>RunPod</div><div class='value'>본학습, A100/H100<span class='badge orange'>고성능</span></div></div></div><details><summary>GPU 스펙</summary><div class='detail-content'>Colab: T4 16GB VRAM, 12시간 제한. Kaggle: P100 16GB, 30시간/주. RunPod: A100 80GB, 시간당 $0.79, 무중단.</div></details></div><div class='panel panel-3'><h3>정적 웹</h3><p>변경이 적은 문서, 블로그, 포트폴리오. 빌드 후 정적 파일 제공.</p><div class='grid'><div class='grid-item'><div class='label'>GitHub Pages</div><div class='value'>무료 호스팅, 커스텀 도메인<span class='badge'>무료</span></div></div></div><details><summary>제한 사항</summary><div class='detail-content'>1GB 저장소, 100GB/월 대역폭, 10개 사이트/계정. Jekyll 기본 지원.</div></details></div><div class='panel panel-4'><h3>API 엔드포인트</h3><p>REST/GraphQL API 서버. 동적 데이터 처리.</p><div class='grid'><div class='grid-item'><div class='label'>Cloudflare Workers (Edge)</div><div class='value'>엣지 컴퓨팅, 0ms 글로벌<span class='badge blue'>엣지</span></div></div><div class='grid-item'><div class='label'>Vercel (풀스택)</div><div class='value'>서버리스 함수, ISR<span class='badge green'>풀스택</span></div></div><div class='grid-item'><div class='label'>Railway (컨테이너)</div><div class='value'>컨테이너 오케스트레이션<span class='badge purple'>컨테이너</span></div></div></div><details><summary>비용 비교</summary><div class='detail-content'>Workers: 10만 요청/일 무료, $0.30/백만. Vercel: 100GB 대역폭 무료, $20/월 Pro. Railway: $5/월 스타터, 컨테이너 1개.</div></details></div><div class='panel panel-5'><h3>LLM 추론</h3><p>대규모 언어 모델 추론. 속도, 컨텍스트, 멀티모달.</p><div class='grid'><div class='grid-item'><div class='label'>Groq</div><div class='value'>빠른 추론, LPU<span class='badge green'>빠름</span></div></div><div class='grid-item'><div class='label'>Gemini</div><div class='value'>긴 컨텍스트, 1M 토큰<span class='badge yellow'>긴 컨텍스트</span></div></div><div class='grid-item'><div class='label'>OpenRouter</div><div class='value'>멀티 모델 라우팅<span class='badge purple'>멀티</span></div></div></div><details><summary>성능 지표</summary><div class='detail-content'>Groq: 500 tok/s (Llama 3 70B). Gemini: 1M 컨텍스트, 60 tok/s. OpenRouter: 200+ 모델, pay-as-you-go.</div></details></div><div class='panel panel-6'><h3>모델 데모</h3><p>모델 시연 및 공유. 인터랙티브 UI 필요.</p><div class='grid'><div class='grid-item'><div class='label'>Hugging Face Spaces</div><div class='value'>Gradio/Streamlit, 무료 GPU<span class='badge'>무료</span></div></div></div><details><summary>Spaces 옵션</summary><div class='detail-content'>무료 티어: 2 vCPU, 16GB RAM, T4 GPU (선택). 커스텀 도메인, Docker 지원.</div></details></div><div class='panel panel-7'><h3>로컬 처리</h3><p>개발 환경, 개인 작업. 로컬 리소스 활용.</p><div class='grid'><div class='grid-item'><div class='label'>Termux (폰)</div><div class='value'>안드로이드 터미널, Python<span class='badge blue'>모바일</span></div></div><div class='grid-item'><div class='label'>WSL (PC)</div><div class='value'>Windows Linux 서브시스템<span class='badge green'>데스크탑</span></div></div></div><details><summary>설정 팁</summary><div class='detail-content'>Termux: proot-distro로 Ubuntu 설치, 4GB RAM 제한. WSL2: GPU passthrough, systemd 지원, 최대 128GB RAM 할당.</div></details></div><div class='svg-wrap'><svg viewBox='0 0 600 200'><defs><marker id='arrow-7a3f' markerWidth='8' markerHeight='6' refX='8' refY='3' orient='auto'><path d='M0,0 L8,3 L0,6' fill='rgba(212,175,55,0.25)'/></marker></defs><rect x='0' y='0' width='600' height='200' fill='none'/><line x1='30' y1='100' x2='570' y2='100' stroke='rgba(212,175,55,0.15)' stroke-width='2' marker-end='url(#arrow-7a3f)'/><circle cx='60' cy='100' r='18' fill='#0D2214' stroke='#EEC864' stroke-width='2'/><text x='60' y= tom: 1px solid rgba(212,175,55,0.15); }\n  .ci-uid-0 .ci-details[open] summary { border-bottom-color: #EEC864; }\n  .ci-uid-0 .ci-details .ci-detail-content { padding: 0.8rem 0; color: rgba(255,255,255,0.62); line-height: 1.6; font-size: 0.9rem; }\n  .ci-uid-0 .ci-details .ci-detail-content strong { color: #5DD9A5; }\n</style>\n<div class=\"ci-uid-0\">\n  <div class=\"ci-title\">역귀납적 학습</div>\n  <div class=\"ci-sub\">실행(AI 결과물) → 관찰 → 이론 추출. 일반적인 이론→실행의 역순. AI를 블랙박스 탐침처럼 사용해 패턴과 감각을 바텀업으로 축적.</div>\n\n  <!-- Step radio buttons -->\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-1\" hidden checked>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-2\" hidden>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-3\" hidden>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-4\" hidden>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-5\" hidden>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-6\" hidden>\n  <input type=\"radio\" name=\"step-uid-0\" id=\"step-uid-0-7\" hidden>\n\n  <!-- Step circles -->\n  <div class=\"ci-steps\">\n    <label for=\"step-uid-0-1\" class=\"ci-step-label\">1</label>\n    <label for=\"step-uid-0-2\" class=\"ci-step-label\">2</label>\n    <label for=\"step-uid-0-3\" class=\"ci-step-label\">3</label>\n    <label for=\"step-uid-0-4\" class=\"ci-step-label\">4</label>\n    <label for=\"step-uid-0-5\" class=\"ci-step-label\">5</label>\n    <label for=\"step-uid-0-6\" class=\"ci-step-label\">6</label>\n    <label for=\"step-uid-0-7\" class=\"ci-step-label\">7</label>\n  </div>\n\n  <!-- Panels -->\n  <div class=\"ci-panel ci-panel-1\">\n    <div class=\"ci-panel-title\">① 실행 — AI 결과물 생성</div>\n    <div class=\"ci-panel-desc\">모델에 <strong>프롬프트</strong>를 입력하고 <strong>출력</strong>을 얻습니다. 이 단계에서는 이론 없이 <span class=\"ci-warn\">일단 실행</span>합니다. 블랙박스 탐침의 첫 신호.</div>\n    <div class=\"ci-svg-wrap\">\n      <svg viewBox=\"0 0 200 60\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x= \n      <svg viewBox=\"0 0 200 60\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"10\" y=\"15\" width=\"40\" height=\"30\" rx=\"6\" fill=\"rgba(238,200,100,0.1)\" stroke=\"#EEC864\" stroke-width=\"1.5\"/>\n        <text x=\"30\" y=\"35\" text-anchor=\"middle\" fill=\"#EEC864\" font-size=\"10\">이론</text>\n        <path d=\"M55 30 L80 30\" stroke=\"#5DD9A5\" stroke-width=\"2\" marker-end=\"url(#arrow-uid-0)\"/>\n        <defs><marker id=\"arrow-uid-0\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10\" fill=\"#5DD9A5\"/></marker></defs>\n        <rect x=\"85\" y=\"10\" width=\"50\" height=\"40\" rx=\"8\" fill=\"#0D2214\" stroke=\"#5DD9A5\" stroke-width=\"2\"/>\n        <text x=\"110\" y=\"35\" text-anchor=\"middle\" fill=\"#5DD9A5\" font-size=\"11\" font-weight=\"bold\">실행</text>\n        <path d=\"M140 30 L165 30\" stroke=\"rgba(255,255,255,0.3)\" stroke-width=\"1.5\"/>\n        <circle cx=\"175\" cy=\"30\" r=\"7\" fill=\"#F5C542\"/>\n        <text x=\"175\" y=\"33\" text-anchor=\"middle\" fill=\"#0A1A0F\" font-size=\"9\" font-weight=\"bold\">✓</text>\n      </svg>\n    </div>\n  </div>\n\n  <div class=\"ci-panel ci-panel-5\">\n    <div class=\"ci-panel-title\">⑤ 축적 — 감각의 레이어</div>\n    <div class=\"ci-panel-desc\">반복된 실행-관찰-이론 주기를 통해 <strong>암묵적 지식</strong>이 쌓입니다. <span class=\"ci-right\">직관적인 판단</span>이 가능해지며, 블랙박스의 내부 동작을 <span class=\"ci-adv\">예측</span>할 수 있게 됩니다.</div>\n    <div class=\"ci-svg-wrap\">\n      <svg viewBox=\"0 0 200 60\" xmlns=\"http://www.w3.org/2000/svg\">\n        <rect x=\"10\" y=\"5\" width=\"180\" height=\"50\" rx=\"10\" fill=\"rgba(13,34,20,0.6)\" stroke=\"rgba(212,175,55,0.15)\" stroke-width=\"1\"/>\n        <rect x=\"20\" y=\"10\" width=\"160\" height=\"12\" rx=\"4\" fill=\"rgba(93,217,165,0.2)\" stroke=\"#5DD9A5\" stroke-width=\"1\"/>\n        <text x=\"100\" y=\"20\" text-anchor=\"middle\" fill=\"#5DD9A5\" font-size=\"8\">Layer 1: 실행</text>\n        <rect x=\"20\" y=\"24\" width=\"160\" height=\"12\" rx=\"4\" fill=\"rgba(127,179,255,0.2)\" stroke=\"#7FB3FF\" stroke-width=\"1\"/>\n        <text x=\"100\" y=\"34\" text-anchor=\"middle\" fill=\"#7FB3FF\" font-size=\"8\">Layer 2: 관찰</text>\n        <rect x=\"20\" y=\"38\" width=\"160\" height=\"12\" rx=\"4\" fill=\"rgba(181,156,255,0.2)\" stroke=\"#B59CFF\" stroke-width=\"1\"/>\n        <text x=\"100\" y=\"48\" text-anchor=\"middle\" fill=\"#B59CFF\" font-size=\"8\">Layer 3: 이론</text>\n      </svg>\n    </div>\n  </div>\n\n  <div class=\"ci-panel ci-panel-6\">\n    <div class=\"ci-panel-title\">⑥ 확장 — 다른 도메인으로 전이</div>\n    <div class=\"ci-panel-desc\">축적된 감각을 <strong>새로운 문제</strong>에 적용합니다. <span class=\"ci-link\">전이 학습</span>처럼, 한 블랙박스에서 얻은 패턴 인식이 다른 AI 모델이나 맥락에서도 <span class=\"ci-warn\">유효함</span>을 발견합니다.</div>\n    <div class=\"ci-svg-wrap\">\n      <svg viewBox=\"0 0 200 60\" xmlns=\"http://www.w3.org/2000/svg\">\n        <circle cx=\"40\" cy=\"30\" r=\"18\" fill=\"rgba(93,217,165,0.1)\" stroke=\"#5DD9A5\" stroke-width=\"2\"/>\n        <text x=\"40\" y=\"35\" text-anchor=\"middle\" fill=\"#5DD9A5\" font-size=\"10\">도메인A</text>\n        <path d=\"M62 30 L85 30\" stroke=\"#EEC864\" stroke-width=\"2\" stroke-dasharray=\"5 3\"/>\n        <circle cx=\"110\" cy=\"30\" r=\"18\" fill=\"rgba(255,168,110,0.1)\" stroke=\"#FFA86E\" stroke-width=\"2\"/>\n        <text x=\"110\" y=\"35\" text-anchor=\"middle\" fill=\"#FFA86E\" font-size=\"10\">도메인B</text>\n        <path d=\"M132 30 L155 30\" stroke=\"#EEC864\" stroke-width=\"2\" stroke-dasharray=\"5 3\"/>\n        <circle cx=\"180\" cy=\"30\" r=\"18\" fill=\"rgba(181,156,255,0.1)\" stroke=\"#B59CFF\" stroke-width=\"2\"/>\n        <text x=\"180\" y=\"35\" text-anchor=\"middle\" fill=\"#B59CFF\" font-size=\"10\">도메인C</text>\n      </svg>\n    </div>\n  </div>\n\n  <div class=\"ci-panel ci-panel-7\">\n    <div class=\"ci-panel-title\">⑦ 성숙 — 역귀납적 사고의 완성</div>\n    <div class=\"ci-panel-desc\">더 이상 <strong>명시적 이론</strong>이 필요하지 않은 단계. <span class=\"ci-right\">AI와의 상호작용이 자연스러운 대화</span>가 되며, 블랙박스는 <span class=\"ci-adv\">투명한 도구</span>로 경험됩니다. <strong>실행→관찰→이론</strong>의 순환이 <span class=\"ci-warn\">무의식적</span>으로 일어납니다.</div>\n    <div class=\"ci-svg-wrap\">\n      <svg viewBox=\"0 0 200 60\" xmlns=\"http://www.w3.org/2000/svg\">\n        <circle cx=\"100\" cy=\"30\" r=\"25\" fill=\"none\" stroke=\"#EEC864\" stroke-width=\"2\" stroke-dasharray=\"6 4\"/>\n        <path d=\"M100 5 A25 25 0 0 1 125 30\" stroke=\"#5DD9A5\" stroke-width=\"2\" fill=\"none\"/>\n        <path d=\"M125 30 A25 25 0 0 1 100 55\" stroke=\"#7FB3FF\" stroke-width=\"2\" fill=\"none\"/>\n        <path d=\"M100 55 A25 25 0 0 1 75 30\" stroke=\"#B59CFF\" stroke-width=\"2\" fill=\"none\"/>\n        <path d=\"M75 30 A25 25 0 0 1 100 5\" stroke=\"#FFA86E\" stroke-width=\"2\" fill=\"none\"/>\n        <text x=\"100\" y=\"35\" text-anchor=\"middle\" fill=\"#EEC864\" font-size=\"11\" font-weight=\"bold\">순환</text>\n      </svg>\n    </div>\n  </div>\n\n  <!-- Expandable details for deeper explanation -->\n  <div class=\"ci-details\">\n    <details>\n      <summary>🔍 역귀납적 학습이란? (더 알아보기)</summary>\n      <div class=\"ci-detail-content\">\n        <strong>역귀납(abduction)</strong>은 관찰된 결과를 설명하는 가장 그럴듯한 가설을 추론하는 과정입니다. 일반적인 연역(이론→결과)과 달리, <strong>결과→이론</strong>의 방향으로 사고합니다.<br><br>\n        이 방법은 <span class=\"ci-link\">AI 블랙박스</span>를 다룰 때 특히 유용합니다. 내부 로직을 알 수 없더라도, <strong>출력 패턴</strong>을 통해 모델의 '습관'과 '경향성'을 이해할 수 있습니다.<br><br>\n        <span class=\"ci-adv\">실전 팁:</span> 매번 실행할 때마다 <strong>예측</strong>을 먼저 적고, 실제 결과와 비교해보세요. 예측이 빗나갈수록 학습 효과가 커집니다.\n      </div>\n    </details>\n    <details>\n      <summary>⚡ 블랙박스 탐침 전략</summary>\n      <div class=\"ci-detail-content\">\n        <strong>탐침(probe)</strong>은 AI의 반응을 체계적으로 살피는 작은 실험입니다.<br><br>\n        • <span class=\"ci-warn\">경계 탐색:</span> 모델이 실패하는 지점을 찾으세요.<br>\n        • <span class=\"ci-right\">변주 테스트:</span> 같은 의도를 다른 표현으로 바꿔보세요.<br>\n        • <span class=\"ci-adv\">메타 인지:</span> \"왜 이런 답을 했을까?\"를 스스로에게 질문하세요.<br><br>\n        이 과정을 반복하면 <strong>AI의 사고 패턴</strong>이 마치 투명해진 것처럼 느껴집니다.\n      </div>\n    </details>\n  </div>\n</div>\n</div>"}}}, {"heading": "커버리지 평가", "body": "정통 CS 이론: 30~40% (의도적 얕음) AI 실전 CS/IT: 70~80% (돌아가는 시스템 기준) 무료 런타임 생태계: 90% (6개 사용 + 21개 인지)", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>.ci-cover{background:#0A1A0F;color:#fff;padding:1.5rem;border-radius:1rem;max-width:100%;font-family:inherit}.ci-cover .ci-tabs{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}.ci-cover .ci-tab-label{background:#0D2214;color:rgba(255,255,255,0.62);padding:0.5rem 1rem;border-radius:2rem;cursor:pointer;border:1px solid rgba(212,175,55,0.15);transition:all .2s;font-size:0.9rem}.ci-cover .ci-tab-label:hover{background:rgba(238,200,100,0.15);color:#EEC864}.ci-cover input:checked+.ci-tab-label{background:#EEC864;color:#0A1A0F;font-weight:700;border-color:#EEC864}.ci-cover .ci-panel{display:none;padding:1rem 0;border-top:1px solid rgba(212,175,55,0.15)}.ci-cover .ci-panel.ci-active{display:block}.ci-cover .ci-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}.ci-cover .ci-card{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:1rem;text-align:center;transition:all .2s}.ci-cover .ci-card:hover{background:rgba(238,200,100,0.1);border-color:#EEC864;transform:translateY(-2px)}.ci-cover .ci-card .ci-pct{font-size:1.8rem;font-weight:700;color:#EEC864;display:block}.ci-cover .ci-card .ci-label{font-size:0.8rem;color:rgba(255,255,255,0.62);margin-top:0.3rem}.ci-cover .ci-card .ci-sub{font-size:0.7rem;color:#5DD9A5;margin-top:0.2rem}.ci-cover .ci-detail{background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:1rem;margin-top:1rem}.ci-cover .ci-detail summary{color:#EEC864;font-weight:600;cursor:pointer;padding:0.3rem 0;list-style:none;display:flex;align-items:center;gap:0.5rem}.ci-cover .ci-detail summary::-webkit-details-marker{display:none}.ci-cover .ci-detail summary::before{content:'▶';color:#EEC864;font-size:0.7rem;transition:transform .2s}.ci-cover .ci-detail[open] summary::before{transform:rotate(90deg)}.ci-cover .ci-detail .ci-detail-content{padding-top:0.8rem;color:rgba(255,255,255,0.62);font-size:0.9rem;line-height:1.5}.ci-cover .ci-detail .ci-detail-content span{color:#7FB3FF;font-weight:500}.ci-cover .ci-bar{display:flex;align-items:center;gap:0.8rem;margin:0.5rem 0}.ci-cover .ci-bar .ci-bar-label{min-width:100px;font-size:0.85rem;color:rgba(255,255,255,0.62)}.ci-cover .ci-bar .ci-bar-track{flex:1;height:12px;background:#0D2214;border-radius:6px;overflow:hidden;border:1px solid rgba(212,175,55,0.15)}.ci-cover .ci-bar .ci-bar-fill{height:100%;border-radius:6px;transition:width .4s}.ci-cover .ci-bar .ci-bar-pct{min-width:40px;text-align:right;font-weight:600;font-size:0.85rem}.ci-cover .ci-legend{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(212,175,55,0.15);font-size:0.8rem;color:rgba(255,255,255,0.62)}.ci-cover .ci-legend span{display:flex;align-items:center;gap:0.4rem}.ci-cover .ci-legend .ci-dot{width:10px;height:10px;border-radius:50%;display:inline-block}</style><div class='ci-cover'><input type='radio' name='tabs-cover' id='tab-cover-1' hidden checked><label for='tab-cover-1' class='ci-tab-label'>📊 커버리지 개요</label><input type='radio' name='tabs-cover' id='tab-cover-2' hidden><label for='tab-cover-2' class='ci-tab-label'>🔍 세부 분석</label><input type='radio' name='tabs-cover' id='tab-cover-3' hidden><label for='tab-cover-3' class='ci-tab-label'>🧩 생태계</label><div class='ci-panel ci-active' id='panel-cover-1'><div style='text-align:center;margin-bottom:1.2rem'><h2 style='color:#EEC864;margin:0 0 0.3rem;font-size:1.4rem'>커버리지 평가</h2><p style='color:rgba(255,255,255,0.62);margin:0;font-size:0.9rem'>영역별 학습 범위와 깊이</p></div><div class='ci-grid'><div class='ci-card'><span class='ci-pct'>30~40%</span><div class='ci-label'>정통 CS 이론</div><div class='ci-sub'>의도적 얕음</div></div><div class='ci-card'><span class='ci-pct'>70~80%</span><div class='ci-label'>AI 실전 CS/IT</div><div class='ci-sub'>돌아가는 시스템 기준</div></div><div class='ci-card'><span class='ci-pct'>90%</span><div class='ci-label'>무료 런타임 생태계</div><div class='ci-sub'>6개 사용 + 21개 인지</div></div></div><details class='ci-detail'><summary>📌 커버리지 해석</summary><div class='ci-detail-content'>정통 CS 이론은 <span>30~40%</span>로 의도적으로 얕게 다룹니다. 반면 AI 실전 CS/IT는 <span>70~80%</span>로 실제 시스템이 돌아가는 기준으로 학습합니다. 무료 런타임 생태계는 <span>90%</span>에 달하며, 6개를 직접 사용하고 21개를 인지 수준으로 알고 있습니다.</div></details></div><div class='ci-panel' id='panel-cover-2'><h3 style='color:#EEC864;margin:0 0 1rem;font-size:1.1rem'>영역별 상세 커버리지</h3><div class='ci-bar'><span class='ci-bar-label'>정통 CS 이론</span><div class='ci-bar-track'><div class='ci-bar-fill' style='width:35%;background:#7FB3FF'></div></div><span class='ci-bar-pct' style='color:#7FB3FF'>35%</span></div><div class='ci-bar'><span class='ci-bar-label'>AI 실전 CS/IT</span><div class='ci-bar-track'><div class='ci-bar-fill' style='width:75%;background:#5DD9A5'></div></div><span class='ci-bar-pct' style='color:#5DD9A5'>75%</span></div><div class='ci-bar'><span class='ci-bar-label'>무료 런타임</span><div class='ci-bar-track'><div class='ci-bar-fill' style='width:90%;background:#EEC864'></div></div><span class='ci-bar-pct' style='color:#EEC864'>90%</span></div><div class='ci-legend'><span><span class='ci-dot' style='background:#7FB3FF'></span> 정통 CS</span><span><span class='ci-dot' style='background:#5DD9A5'></span> AI 실전</span><span><span class='ci-dot' style='background:#EEC864'></span> 런타임</span></div><details class='ci-detail' style='margin-top:1rem'><summary>📐 측정 기준</summary><div class='ci-detail-content'>각 영역은 학습 로드맵 대비 실제 습득 비율을 기준으로 측정했습니다. 정통 CS는 자료구조/알고리즘 기초 위주, AI 실전은 파이프라인/배포/최적화 포함, 런타임은 사용 가능한 도구와 인지 도구를 합산했습니다.</div></details></div><div class='ci-panel' id='panel-cover-3'><h3 style='color:#EEC864;margin:0 0 1rem;font-size:1.1rem'>무료 런타임 생태계</h3><div style='display:grid;grid-template-columns:1fr 1fr;gap:1rem'><div style='background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.8rem'><div style='color:#5DD9A5;font-weight:600;font-size:0.9rem;margin-bottom:0.5rem'>✅ 사용 (6개)</div><div style='color:rgba(255,255,255,0.62);font-size:0.8rem;line-height:1.6'>Colab · Kaggle · Hugging Face Spaces · Replit · GitHub Codespaces · Streamlit Cloud</div></div><div style='background:rgba(13,34,20,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:0.75rem;padding:0.8rem'><div style='color:#7FB3FF;font-weight:600;font-size:0.9rem;margin-bottom:0.5rem'>👁️ 인지 (21개)</div><div style='color:rgba(255,255,255,0.62);font-size:0.8rem;line-height:1.6'>Deepnote · Gradient · Saturn Cloud · Binder · CodeSandbox · Glitch · Vercel · Netlify · Railway · Fly.io · Render · Deta · Pipedream · Modal · Beam · Banana · Replicate · OctoML · Lightning AI · SageMaker Studio Lab · CoCalc</div></div></div><details class='ci-detail' style='margin-top:1rem'><summary>🌐 생태계 확장성</summary><div class='ci-detail-content'>6개 도구를 실제 프로젝트에 사용하며, 21개 도구를 인지하고 필요시 전환 가능합니다. 이는 전체 무료 런타임 생태계의 <span>90%</span>를 커버하는 수준입니다.</div></details></div></div></div>"}}}, {"heading": "개론서·각론서·계론서 위계", "body": "개론서: 너비와 지형도 — 이 백서 각론서: 항목별 운용 매뉴얼 — 28개 레포 README 계론서: 닫힌 체계·관계망 — 미발간 AI 시대 제너럴리스트 = 도구 지형 전체를 인지하고, 작업에 맞는 도구를 골라 조립하는 사람.", "infographic": {"type": "custom_svg", "data": {"html": "<div class='custom-info'><style>\n  .hierarchy-7k9 {\n    background: #0A1A0F;\n    color: #FFFFFF;\n    padding: 2rem 1.5rem;\n    border-radius: 1.5rem;\n    border: 1px solid rgba(212,175,55,0.15);\n    max-width: 100%;\n    box-sizing: border-box;\n  }\n  .hierarchy-7k9 h2 {\n    color: #EEC864;\n    font-size: 1.6rem;\n    margin: 0 0 1.8rem 0;\n    text-align: center;\n    letter-spacing: 0.02em;\n  }\n  .hierarchy-7k9 .tabs {\n    display: flex;\n    justify-content: center;\n e {\n    margin-top: 1.8rem;\n    text-align: center;\n    color: rgba(255,255,255,0.62);\n    font-size: 0.9rem;\n    border-top: 1px solid rgba(212,175,55,0.15);\n    padding-top: 1.2rem;\n  }\n  .hierarchy-7k9 .footer-note strong {\n    color: #5DD9A5;\n  }\n</style>\n\n<div class=\"hierarchy-7k9\">\n  <h2>📘 개론서 · 각론서 · 계론서 위계</h2>\n\n  <!-- Tab switcher -->\n  <input type=\"radio\" name=\"tabs-7k9\" id=\"tab1-7k9\" hidden checked>\n  <input type=\"radio\" name=\"tabs-7k9\" id=\"tab2-7k9\" hidden>\n  <input type=\"radio\" name=\"tabs-7k9\" id=\"tab3-7k9\" hidden>\n\n  <div class=\"tabs\">\n    <label for=\"tab1-7k9\">개론서</label>\n    <label for=\"tab2-7k9\">각론서</label>\n    <label for=\"tab3-7k9\">계론서</label>\n  </div>\n\n  <!-- Panel 1: 개론서 -->\n  <div class=\"panel panel-1\">\n    <h3>🌐 개론서 — 너비와 지형도</h3>\n    <p>이 백서는 전체 도구 지형의 <span class=\"highlight\">너비</span>를 조망합니다. 마치 항공 사진처럼, 각 영역이 어디에 위치하고 어떻게 연결되는지 한눈에 보여줍니다.</p>\n    <p>초보자부터 전문가까지, <strong style=\"color:#7FB3FF;\">전체 맥락</strong>을 이해하는 데 초점을 맞춥니다.</p>\n    <div class=\"meta\">📄 형식: 백서 · 대상: 모든 독자</div>\n  </div>\n\n  <!-- Panel 2: 각론서 -->\n  <div class=\"panel panel-2\">\n    <h3>📂 각론서 — 항목별 운용 매뉴얼</h3>\n    <p>28개 레포지토리의 <span class=\"highlight\">README</span>로 구성된 각론서는 각 도구의 설치, 설정, 실제 운용 방법을 상세히 다룹니다.</p>\n    <p>실무자가 필요할 때 바로 찾아보는 <strong style=\"color:#7FB3FF;\">레시피 북</strong>입니다.</p>\n    <div class=\"meta\">📁 28개 레포 · 형식: README · 대상: 실무자</div>\n  </div>\n\n  <!-- Panel 3: 계론서 -->\n  <div class=\"panel panel-3\">\n    <h3>🔗 계론서 — 닫힌 체계 · 관계망</h3>\n    <p>아직 미발간된 계론서는 도구들 사이의 <span class=\"highlight\">관계망</span>과 <strong style=\"color:#B59CFF;\">닫힌 체계</strong>를 탐구합니다. 각 도구가 어떻게 상호 의존하고, 어떤 흐름으로 연결되는지를 구조적으로 분석합니다.</p>\n    <p>시스템 설계자와 아키텍트를 위한 고급 참고서입니다.</p>\n    <div class=\"meta\">🔮 미발간 · 형식: 관계도 · 대상: 설계자</div>\n  </div>\n\n  <!-- SVG Hub + Spokes -->\n  <div class=\"hub-svg-wrap\">\n    <svg viewBox=\"0 0 400 280\" xmlns=\"http://www.w3.org/2000/svg\">\n      <!-- center hub -->\n      <circle cx=\"200\" cy=\"140\" r=\"38\" fill=\"#0D2214\" stroke=\"#EEC864\" stroke-width=\"2.5\" class=\"center-ring\"/>\n      <text x=\"200\" y=\"135\" fill=\"#EEC864\" font-size=\"14\" font-weight=\"bold\">도구 지형</text>\n      <text x=\"200\" y=\"155\" fill=\"rgba(255,255,255,0.62)\" font-size=\"10\">전체 인지</text>\n\n      <!-- spokes -->\n      <!-- 개론서 -->\n      <line x1=\"200\" y1=\"140\" x2=\"70\" y2=\"50\" stroke=\"rgba(212,175,55,0.3)\" stroke-width=\"2\" class=\"spoke\"/>\n      <circle cx=\"70\" cy=\"50\" r=\"22\" fill=\"rgba(13,34,20,0.9)\" stroke=\"#7FB3FF\" stroke-width=\"1.5\"/>\n      <text x=\"70\" y=\"46\" fill=\"#7FB3FF\" font-size=\"11\" font-weight=\"500\">개론서</text>\n      <text x=\"70\" y=\"60\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">너비</text>\n\n      <!-- 각론서 -->\n      <line x1=\"200\" y1=\"140\" x2=\"330\" y2=\"50\" stroke=\"rgba(212,175,55,0.3)\" stroke-width=\"2\" class=\"spoke\"/>\n      <circle cx=\"330\" cy=\"50\" r=\"22\" fill=\"rgba(13,34,20,0.9)\" stroke=\"#5DD9A5\" stroke-width=\"1.5\"/>\n      <text x=\"330\" y=\"46\" fill=\"#5DD9A5\" font-size=\"11\" font-weight=\"500\">각론서</text>\n      <text x=\"330\" y=\"60\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">매뉴얼</text>\n\n      <!-- 계론서 -->\n      <line x1=\"200\" y1=\"140\" x2=\"200\" y2=\"250\" stroke=\"rgba(212,175,55,0.3)\" stroke-width=\"2\" class=\"spoke\"/>\n      <circle cx=\"200\" cy=\"250\" r=\"22\" fill=\"rgba(13,34,20,0.9)\" stroke=\"#B59CFF\" stroke-width=\"1.5\"/>\n      <text x=\"200\" y=\"246\" fill=\"#B59CFF\" font-size=\"11\" font-weight=\"500\">계론서</text>\n      <text x=\"200\" y=\"260\" fill=\"rgba(255,255,255,0.62)\" font-size=\"8\">관계망</text>\n\n      <!-- 제너럴리스트 -->\n      <line x1=\"200\" y1=\"140\" x2=\"60\" y2=\"230\" stroke=\"rgba(212,175,55,0.2)\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\" class=\"spoke\"/>\n      <circle cx=\"60\" cy=\"230\" r=\"18\" fill=\"rgba(13,34,20,0.9)\" stroke=\"#FFA86E\" stroke-width=\"1.5\"/>\n      <text x=\"60\" y=\"226\" fill=\"#FFA86E\" font-size=\"9\" font-weight=\"500\">제너럴</text>\n      <text x=\"60\" y=\"238\" fill=\"rgba(255,255,255,0.62)\" font-size=\"7\">리스트</text>\n\n      <!-- AI 시대 -->\n      <line x1=\"200\" y1=\"140\" x2=\"340\" y2=\"230\" stroke=\"rgba(212,175,55,0.2)\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\" class=\"spoke\"/>\n      <circle cx=\"340\" cy=\"230\" r=\"18\" fill=\"rgba(13,34,20,0.9)\" stroke=\"#F5C542\" stroke-width=\"1.5\"/>\n      <text x=\"340\" y=\"226\" fill=\"#F5C542\" font-size=\"9\" font-weight=\"500\">AI 시대</text>\n      <text x=\"340\" y=\"238\" fill=\"rgba(255,255,255,0.62)\" font-size=\"7\">도구 조립</text>\n    </svg>\n  </div>\n\n  <!-- Expand/collapse details stack -->\n  <div class=\"details-stack\">\n    <details>\n      <summary>개론서 상세 — 지형도 구성</summary>\n      <div class=\"detail-body\">\n        <p><span class=\"tag\">범위</span> 전체 도구 생태계의 지형도를 제공합니다. 각 영역의 경계와 연결점을 시각화합니다.</p>\n        <p><span class=\"tag\">독자층</span> 신규 입문자부터 의사 결정자까지 폭넓게 대상.</p>\n        <p><span class=\"tag\">특징</span> 너비 우선, 깊이는 각론서에 위임.</p>\n      </div>\n    </details>\n    <details>\n      <summary>각론서 상세 — 28개 레포 README</summary>\n      <div class=\"detail-body\">\n        <p><span class=\"tag\">구성</span> 28개의 독립적인 레포지토리. 각 레포는 하나의 도구/주제에 대한 완전한 매뉴얼.</p>\n        <p><span class=\"tag\">형식</span> README 중심, 코드 예제와 설정 가이드 포함.</p>\n        <p><span class=\"tag\">사용법</span> 필요할 때 검색하여 바로 적용.</p>\n      </div>\n    </details>\n    <details>\n      <summary>계론서 상세 — 닫힌 체계와 관계망</summary>\n      <div class=\"detail-body\">\n        <p><span class=\"tag\">상태</span> 미발간 (초안 단계)</p>\n        <p><span class=\"tag\">초점</span> 도구 간 의존성, 데이터 흐름, 시스템 경계.</p>\n        <p><span class=\"tag\">대상</span> 시스템 설계자, 아키텍트, 고급 엔지니어.</p>\n        <p><span class=\"tag\">형식</span> 관계도 + 설명서.</p>\n      </div>\n    </details>\n    <details>\n      <summary>🧠 AI 시대 제너럴리스트</summary>\n      <div class=\"detail-body\">\n        <p><strong style=\"color:#FFA86E;\">제너럴리스트</strong> = 도구 지형 전체를 인지하고, 작업에 맞는 도구를 골라 조립하는 사람.</p>\n        <p>개론서로 지형을 읽고, 각론서로 도구를 익히며, 계론서로 관계를 설계합니다.</p>\n        <p><span class=\"tag\">핵심 역량</span> 너비 + 깊이 + 연결</p>\n      </div>\n    </details>\n  </div>\n\n  <div class=\"footer-note\">\n    <strong>✦</strong> 개론서 → 각론서 → 계론서로 이어지는 위계는 <strong>너비 · 깊이 · 연결</strong>의 삼중 구조를 이룹니다.\n  </div>\n</div>"}}}];

}

          + "<pre><code class=\"language-"+lang+"\">"+escapeHtml(code)+"</code></pre>"

        lastIdx = m.index + m[0].length;

      if(lastIdx < bodyHtml.length){

/* ─── slide navigation ─── */
function showSlide(index){
  if(index < 0 || index >= slideEls.length) return;
  // BUG-015 fix: was 'if(index === currentSlide) return;' which blocked
  // first showSlide(0) call. Now bail only when target is already active.
  if(index === currentSlide && slideEls[index].classList.contains('active')) return;

  // Hide current
  slideEls[currentSlide].classList.remove('active');

  // Show new
  currentSlide = index;
  slideEls[currentSlide].classList.add('active');

  // Re-trigger animation
  slideEls[currentSlide].style.animation = 'none';
  void slideEls[currentSlide].offsetHeight;
  slideEls[currentSlide].style.animation = '';

  // Update UI
  updateUI();
  updateHash();
}

function goSlide(delta){
  showSlide(currentSlide + delta);
}

/* BUG-016 fix: inline onclick="goSlide(±1)" handlers on prev/next buttons
   resolve against global scope, but goSlide/showSlide are IIFE-local.
   Expose to window so the buttons actually navigate. */
window.goSlide = goSlide;
window.showSlide = showSlide;

/* ─── UI ... ─── */
function updateUI(){
  var cur = currentSlide + 1;
  var tot = slideEls.length;

  // Counter
  var curEls = document.querySelectorAll('#slide-cur-' + uid + ', #nav-cur-' + uid);
  for(var i = 0; i < curEls.length; i++) curEls[i].textContent = cur;

  // Buttons
  var btnP = _$('btn-prev-' + uid);
  var btnN = _$('btn-next-' + uid);
  if(btnP) btnP.disabled = currentSlide === 0;
  if(btnN) btnN.disabled = currentSlide >= tot - 1;

  // TOC active
  var tocItems = document.querySelectorAll('.toc-item');
  for(var ti = 0; ti < tocItems.length; ti++){
    tocItems[ti].classList.toggle('active', parseInt(tocItems[ti].dataset.slideIdx) === currentSlide);
  }

  // Dots active
  var dots = document.querySelectorAll('.slide-dot');
  for(var di = 0; di < dots.length; di++){
    dots[di].classList.toggle('active', parseInt(dots[di].dataset.idx) === currentSlide);
  }
}

/* ─── URL ... ─── */
function updateHash(){
  var h = currentSlide === 0 ? '' : '#/' + currentSlide;
  if(location.hash !== h && !h && location.hash) history.replaceState(null, '', h || '.');
  else if(location.hash !== h) history.pushState(null, '', h || '.');
}

function parseHash(){
  try{
    var m = location.hash.match(/#\/(\d+)/);
    if(m){
      var idx = parseInt(m[1]);
      if(idx > 0 && idx < slideEls.length) showSlide(idx);
    }
  } catch(e){}
}

/* ─── TOC ... ─── */
window.toggleToc = function(){
  var sidebar = _$('toc-sidebar');
  if(sidebar) sidebar.classList.toggle('toc-hidden');
};

/* ─── ... ─── */
document.addEventListener('keydown', function(e){
  var tag = (e.target || {}).tagName || '';
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;

  switch(e.key){
    case 'ArrowRight':
    case ' ':
      e.preventDefault();
      goSlide(1);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      goSlide(-1);
      break;
    case 'Home':
      e.preventDefault();
      showSlide(0);
      break;
    case 'End':
      e.preventDefault();
      showSlide(slideEls.length - 1);
      break;
    case 'Escape':
      e.preventDefault();
      toggleToc();
      break;
  }
});

/* ─── ... ... ─── */
(function(){
  var tx = 0;
  document.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - tx;
    if(Math.abs(dx) > 50) goSlide(dx < 0 ? 1 : -1);
  });
})();

/* ─── ... ... ─── */
window.addEventListener('popstate', function(){

});

/* ─── Particle system ─── */
(function(){
  var canvas = _$('particle-canvas');
  if(!canvas) return;
  // Performance gate (Article 13 wrapper duty): kill in slide/narrate mode
  // and respect prefers-reduced-motion + low-end devices.
  var qs = new URLSearchParams(window.location.search);
  var mode = qs.get('mode');
  var reducedMotion = window.matchMedia &&
                      window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var slowDevice = (navigator.deviceMemory && navigator.deviceMemory < 4) ||
                   (navigator.hardwareConcurrency && navigator.hardwareConcurrency < 4);
  if (mode === 'slide' || mode === 'narrate' || reducedMotion || slowDevice) {
    canvas.style.display = 'none';
    canvas.remove();  // free CPU completely
    return;
  }
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  var COLORS = ['rgba(212,175,55,', 'rgba(52,211,153,', 'rgba(96,165,250,'];
  function Particle(){ this.reset(); }
  Particle.prototype.reset = function(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.4 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.18;
    this.vy = (Math.random() - 0.5) * 0.14 - 0.05;
    this.a = Math.random() * 0.5 + 0.1;
    this.da = (Math.random() - 0.5) * 0.003;
    this.col = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.pulse = Math.random() * Math.PI * 2;
  };
  Particle.prototype.update = function(){
    this.x += this.vx; this.y += this.vy; this.a += this.da; this.pulse += 0.02;
    if(this.a < 0.04 || this.a > 0.65) this.da *= -1;
    if(this.x < -10) this.x = W + 10; if(this.x > W+10) this.x = -10;
    if(this.y < -10) this.y = H + 10; if(this.y > H+10) this.y = -10;
  };
  Particle.prototype.draw = function(){
    var r = this.r * (1 + Math.sin(this.pulse) * 0.25);
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2);
    ctx.fillStyle = this.col + this.a + ')'; ctx.fill();
  };

  var N = Math.min(60, Math.floor(W * H / 16000));
  for(var pi=0; pi<N; pi++) particles.push(new Particle());

  function drawLines(){
    var MAX_D = 120;
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var d = Math.sqrt(dx*dx+dy*dy);
        if(d < MAX_D){
          var alpha = (1 - d/MAX_D) * 0.08;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(212,175,55,' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  var raf;
  function animLoop(){
    ctx.clearRect(0,0,W,H); drawLines();
    particles.forEach(function(p){ p.update(); p.draw(); });
    raf = requestAnimationFrame(animLoop);
  }
  animLoop();
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) cancelAnimationFrame(raf);
    else animLoop();
  });
})();

function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.copyCodeBlock = function(btn){
  var pre = btn.closest('.art-codeblock').querySelector('pre code');
  var text = pre.textContent;
  navigator.clipboard.writeText(text).then(function(){
    var orig = btn.textContent;
    btn.textContent = '복사됨';
    setTimeout(function(){ btn.textContent = orig; }, 1500);

function embedInfographics(){
  document.querySelectorAll('[data-infographic]').forEach(function(el){
    if(el.dataset.v2Embedded) return;
    el.dataset.v2Embedded = '1';
    var type = el.dataset.infographic;
    var dataAttr = el.dataset.payload || '{}';
    var data;
    try{ data = JSON.parse(dataAttr); }catch(e){ data = {}; }
    el.classList.add('art-infographic');
    el.setAttribute('role', 'img');
    el.setAttribute('aria-label', 'Infographic: ' + type);
    renderInfographic(el, type, data);
  });
}

/* Inline render — all 13 infographic types (Constitution D-010 phase-2 complete). */
function renderInfographic(container, type, data){
  if(type === 'custom_svg')     return renderCustomSvg(container, data);
  if(type === 'stat_counter')   return renderStatCounter(container, data);
  if(type === 'flowchart')      return renderFlowchart(container, data);
  if(type === 'vs_compare')     return renderVsCompare(container, data);
  if(type === 'zoom_detail')    return renderZoomDetail(container, data);
  if(type === 'timeline')       return renderTimeline(container, data);
  if(type === 'node_map')       return renderNodeMapSimple(container, data);
  if(type === 'orbit_diagram')  return renderOrbitDiagram(container, data);
  if(type === 'accordion')      return renderAccordion(container, data);
  if(type === 'dashboard')      return renderDashboard(container, data);
  if(type === 'landing_page')   return renderLandingHero(container, data);
  if(type === 'matrix_grid')    return renderMatrixGrid(container, data);
  if(type === 'pipeline_stack') return renderPipelineStack(container, data);
  if(type === 'article_page')   return renderArticleCard(container, data);
  container.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px;">'
    + 'Unknown infographic type "<strong>'+escapeHtml(type)+'</strong>".</div>';
}

function renderNodeMapSimple(c, d){
  // Simplified inline: just SVG with circles + lines (full force-directed in node_map.html)
  var W = 360, H = 220;
  var nodes = (d && d.nodes) || [];
  var links = (d && d.links) || [];
  // place nodes in a circle
  var cx = W/2, cy = H/2, r = 80;
  var positioned = nodes.map(function(n, i){
    var theta = (i / nodes.length) * 2 * Math.PI - Math.PI/2;
    return {x: n.root ? cx : cx + r*Math.cos(theta),
            y: n.root ? cy : cy + r*Math.sin(theta),
            label: n.label, root: !!n.root, idx: i, id: n.id};
  });
  function findIdx(ref){
    if(typeof ref === 'number') return ref;
    return positioned.findIndex(function(p){return p.id === ref;});
  }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:240px;display:block;">';
  links.forEach(function(l){
    var s = positioned[findIdx(l.source)], t = positioned[findIdx(l.target)];
    if(!s || !t) return;
    svg += '<line x1="'+s.x+'" y1="'+s.y+'" x2="'+t.x+'" y2="'+t.y+'" stroke="rgba(212,175,55,.4)" stroke-width="1.5" />';
  });
  positioned.forEach(function(p){
    var rx = p.root ? 9 : 5;
    svg += '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+rx+'" fill="'+(p.root?'var(--gold)':'var(--green)')+'" />';
    svg += '<text x="'+(p.x)+'" y="'+(p.y - rx - 4)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(p.label||'')+'</text>';
  });
  svg += '</svg>';
  c.innerHTML = svg;
}

function renderOrbitDiagram(c, d){
  var W = 360, H = 260;
  /* Handle both LLM format ({core, orbits[{label,desc}]}) and renderer format ({center:{label}, orbits[{nodes:[{label}]}]}) */
  var centerLabel = (d && (d.center ? d.center.label : d.core)) || 'Core';
  var orbits = (d && d.orbits) || [];
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:280px;display:block;">';
  var cx = W/2, cy = H/2;
  orbits.forEach(function(o, i){
    var r = 50 + i*32;
    svg += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(212,175,55,.18)" stroke-dasharray="3 4" />';
    /* Support both o.nodes[] (renderer format) and direct label (LLM format) */
    var nodes = o.nodes || (o.label ? [{label: o.label, desc: o.desc}] : []);
    nodes.forEach(function(n, j){
      var theta = (j / nodes.length) * 2 * Math.PI + i * 0.4;
      var x = cx + r*Math.cos(theta), y = cy + r*Math.sin(theta);
      svg += '<circle cx="'+x+'" cy="'+y+'" r="6" fill="var(--gold)"><title>'+escapeHtml(n.label||'')+'</title></circle>';
      svg += '<text x="'+x+'" y="'+(y - 10)+'" font-size="10" fill="var(--text)" text-anchor="middle">'+escapeHtml(n.label||'')+'</text>';
    });
  });
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="var(--gold)" />';
  svg += '<text x="'+cx+'" y="'+(cy+4)+'" font-size="10" fill="#0A1A0F" text-anchor="middle" font-weight="700">'+escapeHtml(centerLabel)+'</text>';
  svg += '</svg>';
  /* Add orbit labels as a legend below the SVG */
  var legendHtml = '';
  orbits.forEach(function(o, i){
    var label = o.label || (o.nodes && o.nodes.length ? o.nodes[0].label : '');
    var desc = o.desc || (o.nodes && o.nodes.length ? o.nodes[0].desc : '');
    if(label){
      legendHtml += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);margin-top:4px;">'
        + '<span style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;"></span>'
        + '<strong style="color:var(--gold);">'+escapeHtml(label)+'</strong>'
        + (desc ? '<span style="color:var(--muted);">'+escapeHtml(desc)+'</span>' : '')
        + '</div>';
    }
  });
  if(legendHtml) c.innerHTML = svg + '<div style="padding:4px 0;">'+legendHtml+'</div>';
  else c.innerHTML = svg;
}

function renderMatrixGrid(c, d){
  var rows = (d && d.rows) || [];
  var cols = (d && d.cols) || [];
  var cells = (d && d.cells) || {};
  if(!rows.length || !cols.length){ c.innerHTML = '<div style="color:var(--muted);font-size:12px;">matrix_grid: rows/cols required</div>'; return; }

  // Mobile fallback: > 4 columns OR viewport < 480px → render as row-grouped cards
  var narrow = (window.innerWidth || 0) < 480;
  var tooWide = cols.length > 4;
  if (narrow || tooWide) {
    var fallback = '<div style="display:flex;flex-direction:column;gap:10px;">';
    rows.forEach(function(row){
      fallback += '<div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;">'
        + '<div style="font-size:11px;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;">'+escapeHtml(row)+'</div>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;">';
      cols.forEach(function(col){
        var key = row + '|' + col;
        var v = cells[key];
        var content = '—'; var border = 'var(--border)';
        if (v && typeof v === 'object') {
          content = v.value || v.label || '✓';
          if (v.score === 'high') border = 'var(--green)';
          else if (v.score === 'low') border = '#FF8A8A';
          else if (v.score === 'mid') border = 'var(--yellow)';
        } else if (v != null) { content = String(v); }
        fallback += '<div style="background:rgba(255,255,255,.02);border-left:2px solid '+border+';padding:6px 8px;border-radius:0 4px 4px 0;font-size:11px;">'
          + '<div style="color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</div>'
          + '<div style="color:var(--text);margin-top:2px;font-weight:600;">'+escapeHtml(content)+'</div>'
          + '</div>';
      });
      fallback += '</div></div>';
    });
    fallback += '</div>';
    c.innerHTML = fallback;
    return;
  }

  // Desktop / narrow data: 정규 표 (≤ 4 컬럼)
  var html = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;">';
  html += '<thead><tr><th style="padding:8px;border-bottom:2px solid var(--gold);text-align:left;color:var(--gold);"></th>';
  cols.forEach(function(col){
    html += '<th style="padding:8px;border-bottom:2px solid var(--gold);text-align:center;color:var(--gold);font-size:11px;text-transform:uppercase;letter-spacing:.08em;">'+escapeHtml(col)+'</th>';
  });
  html += '</tr></thead><tbody>';
  rows.forEach(function(row){
    html += '<tr><th style="padding:8px;text-align:left;font-weight:700;color:var(--text);border-bottom:1px solid var(--border);">'+escapeHtml(row)+'</th>';
    cols.forEach(function(col){
      var key = row + '|' + col;
      var v = cells[key];
      var bg = '';
      var content = '—';
      if(v && typeof v === 'object'){
        content = v.value || v.label || '✓';
        if(v.score === 'high') bg = 'background:rgba(93,217,165,.2);';
        else if(v.score === 'low') bg = 'background:rgba(255,138,138,.15);';
        else if(v.score === 'mid') bg = 'background:rgba(212,175,55,.15);';
      } else if(v != null) {
        content = String(v);
      }
      html += '<td style="padding:8px;text-align:center;border-bottom:1px solid var(--border);'+bg+'">'+escapeHtml(content)+'</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  c.innerHTML = html;
}

function renderPipelineStack(c, d){
  /* BUG-019 fix: LLM generates d.layers[{label, items:[{name,desc}]}]
     but renderer expected d.stages[{label,desc,done,metric}].
     Handle both formats. */
  var stages = (d && (d.stages || d.layers)) || [];
  var row = document.createElement('div');
  row.style.cssText = 'display:flex;flex-wrap:wrap;align-items:stretch;gap:0;';
  stages.forEach(function(s, i){
    var box = document.createElement('div');
    var done = !!s.done;
    /* If s has items[] (LLM layers format), extract desc from items */
    var stageLabel = s.label || (s.name || '');
    var stageDesc = s.desc || '';
    if(s.items && s.items.length){
      stageDesc = s.items.map(function(it){ return it.label || it.name || it.desc || ''; }).join(' → ');
    }
    box.style.cssText = 'flex:1 1 140px;min-width:120px;background:'+(done?'rgba(93,217,165,.08)':'rgba(212,175,55,.05)')+';'
      + 'border:1px solid '+(done?'var(--green)':'var(--gold)')+';border-radius:8px;padding:10px;margin:4px;position:relative;';
    box.innerHTML = '<div style="font-size:10px;color:var(--muted);font-family:var(--mono);">P'+(i+1)+(done?' ✓':'')+'</div>'
      + '<div style="font-size:13px;font-weight:700;color:'+(done?'var(--green)':'var(--gold)')+';margin-top:4px;">'+escapeHtml(stageLabel)+'</div>'
      + (stageDesc?'<div style="font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;">'+escapeHtml(stageDesc)+'</div>':'')
      + (s.metric?'<div style="font-size:10px;color:var(--text);margin-top:6px;font-family:var(--mono);">'+escapeHtml(s.metric)+'</div>':'');
    row.appendChild(box);
  });
  c.appendChild(row);
}

function renderArticleCard(c, d){
  var title = (d && d.title) || 'Article';
  var meta = (d && d.meta) || {};
  var paragraphs = (d && d.paragraphs) || [];
  var card = document.createElement('article');
  card.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:16px;';
  var html = '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:6px;">'
    + escapeHtml(meta.section||'Article')
    + (meta.date ? ' · <span style="font-family:var(--mono);">'+escapeHtml(meta.date)+'</span>' : '') + '</div>'
    + '<h4 style="font-size:18px;font-weight:800;color:var(--text);margin:0 0 10px;line-height:1.3;">'+escapeHtml(title)+'</h4>';
  paragraphs.forEach(function(p){
    html += '<p style="font-size:13px;color:var(--text);line-height:1.65;margin:0 0 8px;">'+escapeHtml(p)+'</p>';
  });
  if(meta.tags && meta.tags.length){
    html += '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;">'
      + meta.tags.map(function(t){
          return '<span style="font-size:10px;background:rgba(212,175,55,.12);color:var(--gold);padding:2px 8px;border-radius:10px;font-family:var(--mono);">#'+escapeHtml(t)+'</span>';
        }).join('')
      + '</div>';
  }
  card.innerHTML = html;
  c.appendChild(card);
}

function wireVariableInputs(){
  var inputs = document.querySelectorAll('input[data-var]');
  var state = {};
  // Load from localStorage
  try{
    var saved = localStorage.getItem('parksy_vars_e9a53be6');
    if(saved) state = JSON.parse(saved);
  }catch(e){}
  inputs.forEach(function(inp){
    var name = inp.dataset.var;
    if(state[name] !== undefined) inp.value = state[name];
    inp.addEventListener('input', function(){
      state[name] = inp.value;
      try{ localStorage.setItem('parksy_vars_e9a53be6', JSON.stringify(state)); }catch(e){}
      // Replace {{name}} occurrences in slide bodies
      document.querySelectorAll('[data-bind="'+name+'"]').forEach(function(el){
        el.textContent = inp.value;
      });
    });
    // Trigger initial substitution
    inp.dispatchEvent(new Event('input'));
  });
}

function wireCostFooter(){
  var f = document.getElementById('cost-footer');
  if(!f) return;
  f.addEventListener('click', function(){
    var meta = window.PARKSY_META || {build_cost: {estimated_usd: 0}};
    var cost = meta.build_cost || {};
    alert('Build cost transparency:\n\n'
      + 'Models: ' + (cost.models_used||['Claude']).join(', ') + '\n'
      + 'Tokens: ' + JSON.stringify(cost.tokens || {}) + '\n'
      + 'Estimated USD: $' + (cost.estimated_usd || 0).toFixed(2) + '\n'
      + 'Wall time: ' + (cost.wallclock_seconds || 0) + 's\n\n'
      + 'This page was machine-built. Source: github.com/dtslib1979/parksy-image');
  });
}

function wireSkipLink(){
  var skip = document.querySelector('.skip-link');
  if(!skip) return;
  skip.addEventListener('click', function(e){
    e.preventDefault();
    var target = document.getElementById('main-content');
    if(target){
      target.setAttribute('tabindex', '-1');
      target.focus();
    }
  });
}

function hookSlideAnnouncer(){
  var status = document.getElementById('a11y-status');
  if(!status) return;
  // Hook into existing showSlide if available; otherwise observe slide-wrapper
  var wrapper = document.getElementById('slide-wrapper-e9a53be6');
  if(!wrapper) return;
  var observer = new MutationObserver(function(){
    var active = wrapper.querySelector('.slide.active');
    if(active){
      var heading = active.querySelector('h1, h2, .art-heading');
      if(heading) status.textContent = 'Slide: ' + heading.textContent;
    }
  });
  observer.observe(wrapper, {attributes: true, subtree: true, attributeFilter: ['class']});
}

})();

<script id="d028-entry-js">
(function(){
  var io = new IntersectionObserver(function(es){
    es.forEach(function(e){if(e.isIntersecting) e.target.classList.add('in-view');});
  }, {threshold:[0,.15,.4], rootMargin:'-5% 0px -5% 0px'});
  function init(){
    var slides = document.querySelectorAll('.slide');
    slides.forEach(function(s){ io.observe(s); });
    if(slides[0]) slides[0].classList.add('in-view');
    var orig = window.showSlide;
    if(typeof orig === 'function'){
      window.showSlide = function(i){orig(i); if(slides[i]) slides[i].classList.add('in-view');};
    }
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { setTimeout(init, 50); }
})();
</script>
