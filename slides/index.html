<title>One Phone. No Code. Running a Server. — termux-bridge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{

.slide.enter-right{animation:slideInRight .55s cubic-bezier(.22,1,.36,1) forwards}

@keyframes slideInLeft{from{opacity:0;transform:translateX(80px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-80px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideOutLeft{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-80px) scale(.97)}}
@keyframes slideOutRight{from{opacity:1;transform:none}to{opacity:0;transform:translateX(80px) scale(.97)}}
.slide::before{content:'';position:absolute;inset:0;z-index:-1;opacity:.07;background:radial-gradient(ellipse 70% 60% at 50% 30%,var(--accent,#D4AF37),transparent);transition:opacity .6s}
.slide.active::before{opacity:.12}
.slide-inner{width:100%;max-width:800px;margin:0 auto}
.ch-tag{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent,var(--gold));margin-bottom:20px;opacity:0;animation:fadeUp .5s .1s forwards}
.ch-tag::before{content:'';display:block;width:28px;height:2px;background:currentColor;border-radius:1px}
.slide-title{font-size:clamp(26px,4.5vw,50px);font-weight:900;line-height:1.1;letter-spacing:-.035em;margin-bottom:22px;opacity:0;animation:fadeUp .5s .18s forwards}
.slide-title em{color:var(--accent,var(--gold));font-style:normal}
.slide-sub{font-size:clamp(13px,1.8vw,17px);color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:600px;opacity:0;animation:fadeUp .5s .26s forwards}
.slide-sub strong{color:var(--text)}
.cards{display:grid;gap:12px;width:100%}
.cards.c2{grid-template-columns:1fr 1fr}

.card:hover{background:rgba(248,250,249,.07);transform:translateY(-2px)}
.card-icon{font-size:24px;margin-bottom:8px}

.card-body strong{color:var(--text)}

.layer-num{font-size:10px;font-weight:900;letter-spacing:.06em;color:var(--accent,var(--gold));flex-shrink:0;min-width:20px}

.code-wrap pre{font-family:'SF Mono','Fira Code',monospace;font-size:13px;color:var(--green);line-height:1.7;white-space:pre-wrap;word-break:break-all}
.code-wrap pre .c{color:var(--muted)}
.code-wrap pre .o{color:var(--orange)}
.code-label{font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:block}
.code-cursor{display:inline-block;width:8px;height:14px;background:var(--green);vertical-align:middle;animation:blink 1.1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.tbl{width:100%;border-collapse:collapse;opacity:0;animation:fadeUp .5s .3s forwards}
.tbl th{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{font-size:13px;padding:10px 12px;border-bottom:1px solid rgba(248,250,249,.04);vertical-align:top;line-height:1.5}
.tbl td:first-child{font-weight:700;color:var(--text);white-space:nowrap}
.tbl td:not(:first-child){color:var(--muted)}
.tbl td code{font-family:'SF Mono',monospace;font-size:12px;color:var(--green)}
.tbl tr{opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
.hl-box{background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.25);border-radius:12px;padding:18px;width:100%;opacity:0;animation:fadeUp .5s .35s forwards}
.hl-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;color:var(--gold)}
.hl-text{font-size:13px;color:var(--muted);line-height:1.7}
.hl-text strong{color:var(--text)}
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:100%}
.vs-col{background:rgba(248,250,249,.04);border:1px solid var(--border);border-radius:12px;padding:16px;opacity:0;animation:fadeUp .5s .3s forwards}
.vs-col.bad{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.04)}
.vs-col.good{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04)}
.vs-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.vs-label.bad{color:var(--red)}
.vs-label.good{color:var(--green)}
.vs-sep{font-size:20px;color:var(--muted);text-align:center;opacity:0;animation:fadeUp .5s .4s forwards}
.vs-item{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid rgba(248,250,249,.04);line-height:1.5}
.vs-item:last-child{border-bottom:none}
.flow{display:flex;flex-direction:column;gap:0;width:100%;max-width:500px}
.flow-step{display:flex;align-items:center;gap:14px;background:rgba(248,250,249,.04);border:1px solid var(--border);border-radius:10px;padding:12px 16px;opacity:0;transform:translateY(10px)}
.flow-step.highlight{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.flow-icon{font-size:18px;flex-shrink:0}
.flow-label{font-size:13px;font-weight:700}
.flow-sub{font-size:11px;color:var(--muted)}
.flow-arrow{text-align:center;color:var(--muted);font-size:14px;padding:2px 0;opacity:0}
.cover-title{font-size:clamp(30px,6vw,62px);font-weight:900;line-height:1.05;letter-spacing:-.04em;text-align:center;margin-bottom:20px;background:linear-gradient(135deg,var(--gold) 0%,#ffe57a 30%,var(--gold) 60%,#a07a00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;animation:coverIn .9s .2s cubic-bezier(.22,1,.36,1) forwards}
.cover-sub{font-size:clamp(14px,2vw,19px);color:var(--muted);text-align:center;line-height:1.6;max-width:560px;opacity:0;animation:coverIn .8s .5s forwards}
.cover-chips{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px;opacity:0;animation:coverIn .8s .7s forwards}
.cover-chip{font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.3);color:var(--gold);background:rgba(212,175,55,.08)}
@keyframes coverIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.ch-num{font-size:clamp(80px,15vw,140px);font-weight:900;letter-spacing:-.05em;line-height:.9;color:var(--accent,var(--gold));opacity:.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:-1;user-select:none;pointer-events:none;animation:numGrow 1s cubic-bezier(.22,1,.36,1) forwards}
@keyframes numGrow{from{opacity:0;transform:translate(-50%,-50%) scale(.6)}to{opacity:.15;transform:translate(-50%,-50%) scale(1)}}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:90;display:flex;align-items:center;justify-content:space-between;padding:20px 32px;background:linear-gradient(transparent,rgba(2,4,4,.9))}
.nav-btn{display:flex;align-items:center;gap:8px;background:rgba(248,250,249,.05);border:1px solid var(--border);border-radius:12px;padding:10px 18px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;user-select:none}
.nav-btn:hover{background:rgba(248,250,249,.1);color:var(--text);border-color:rgba(248,250,249,.15)}
.nav-btn:active{transform:scale(.96)}
#dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:400px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--muted);cursor:pointer;transition:all .3s;flex-shrink:0}
.dot.active{background:var(--gold);transform:scale(1.6)}
.dot:hover{background:var(--text)}
#autoplay-btn{position:fixed;top:14px;right:80px;z-index:95;background:rgba(248,250,249,.05);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);transition:all .2s}
#autoplay-btn:hover{color:var(--text);background:rgba(248,250,249,.1)}
#autoplay-btn.on{color:var(--green);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08)}
#back-btn{position:fixed;top:14px;right:160px;z-index:95;background:rgba(248,250,249,.05);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:5px}
#back-btn:hover{color:var(--text);background:rgba(248,250,249,.1)}
#overview{position:fixed;inset:0;z-index:200;background:rgba(2,4,4,.97);display:none;padding:60px 24px;overflow-y:auto}
#overview.open{display:block}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;max-width:1200px;margin:0 auto}
.ov-thumb{background:rgba(248,250,249,.04);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;aspect-ratio:16/9;display:flex;flex-direction:column;justify-content:center;gap:6px}
.ov-thumb:hover{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.06);transform:scale(1.03)}
.ov-thumb.cur{border-color:var(--gold);background:rgba(212,175,55,.1)}
.ov-n{font-size:9px;color:var(--muted);font-weight:700}
.ov-t{font-size:11px;font-weight:800;line-height:1.3}
.ov-close{position:fixed;top:20px;right:24px;font-size:22px;cursor:pointer;color:var(--muted);background:none;border:none}
#kbd-hint{position:fixed;bottom:70px;right:24px;z-index:90;font-size:9px;color:var(--muted);text-align:right;line-height:1.8;opacity:.4;pointer-events:none}
#kbd-hint kbd{display:inline-block;background:rgba(248,250,249,.08);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:9px;font-family:inherit}
#timer-bar{position:fixed;bottom:60px;left:0;right:0;height:2px;z-index:89;background:rgba(248,250,249,.05);display:none}
#timer-fill{height:100%;background:var(--green);width:0;transition:width .1s linear}
</style>
</head>

<script>
const SLIDES = [

{id:1,ch:'Ch 0',chLabel:'Prerequisites',color:'#34D399',type:'cards',

 ]},

{id:2,ch:'Ch 1',chLabel:'World Model',color:'#A78BFA',type:'chapter-intro',

   ['Main device','Phone + Termux','Home PC + WSL2'],

   ['Browser automation','Headless hacks, ADB chains','PC Chrome directly'],

 ]},

{id:5,ch:'Ch 1',chLabel:'Triple Backup',color:'#A78BFA',type:'triple',

   {n:'1st',label:'PC WSL2 · Claude Code',desc:'Main workspace',color:'#34D399'},

   {n:'3rd',label:'Termux (phone)',desc:'When both are down — SSH reconnect',color:'#A78BFA'},
 ]},

{id:6,ch:'Ch 2',chLabel:'Termux Basics',color:'#34D399',type:'chapter-intro',

# When completely frozen:

{id:9,ch:'Ch 3',chLabel:'PC Server',color:'#60A5FA',type:'chapter-intro',

{id:12,ch:'Ch 3',chLabel:'Auto-Recovery Chain',color:'#60A5FA',type:'flow',

{id:13,ch:'Ch 4',chLabel:'SSH Stability',color:'#FB923C',type:'chapter-intro',

{id:14,ch:'Ch 4',chLabel:'Root Cause Analysis',color:'#FB923C',type:'rca',

 sub:'2026-03-21 incident RCA — all four causes were active simultaneously.',
 items:[
   {cause:'SSH self-loop',symptom:'CPU 38% spike, session drops',fix:'ps aux | grep ssh → kill'},

{id:15,ch:'Ch 4',chLabel:'autossh',color:'#FB923C',type:'code',
 title:'WiFi ↔ LTE switch.\n<em>Stays connected.</em>',
 codeLabel:'Phone ~/.bashrc · pc alias',
 code:`alias pc='autossh -M 0 \\

  -o "ServerAliveCountMax 3" \\
  -o "TCPKeepAlive yes" \\
  -p 2222 user@100.90.83.128 \\
  -t "tmux attach -t claude-main || \\
      tmux new-session -s claude-main"'`},

{id:16,ch:'Ch 4',chLabel:'SSH Config',color:'#FB923C',type:'code',

 codeLabel:'~/.ssh/config',
 code:`Host pc-wsl
    HostName 100.90.83.128
    Port 2222
    User your-username
    ServerAliveInterval 30
    ServerAliveCountMax 3
    TCPKeepAlive yes
    ConnectTimeout 10`},

let cur=0,autoplay=false,autoTimer=null,autoInterval=6000;
let touchStartX=0,touchStartY=0;

function renderAll(){
  const deck=document.getElementById('deck');
  SLIDES.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='slide';el.id='slide-'+i;
    el.style.setProperty('--accent',s.color);
    el.innerHTML=buildSlide(s);
    deck.appendChild(el);
  });
  const dots=document.getElementById('dots');
  SLIDES.forEach((_,i)=>{
    const d=document.createElement('div');d.className='dot';
    d.onclick=()=>goTo(i);dots.appendChild(d);
  });
  const grid=document.getElementById('ov-grid');
  SLIDES.forEach((s,i)=>{
    const t=document.createElement('div');t.className='ov-thumb';
    t.style.borderColor=s.color+'40';
    t.innerHTML=`<div class="ov-n" style="color:${s.color}">${s.ch||'INTRO'}</div><div class="ov-t">${stripTags(s.title)}</div>`;
    t.onclick=()=>{goTo(i);closeOverview();};t.id='ov-'+i;grid.appendChild(t);
  });
}

function buildSlide(s){
  if(s.type==='cover')return buildCover(s);
  if(s.type==='chapter-intro')return buildChapterIntro(s);
  if(s.type==='layers')return buildLayers(s);
  if(s.type==='table')return buildTable(s);
  if(s.type==='triple')return buildTriple(s);
  if(s.type==='code')return buildCode(s);
  if(s.type==='incident'||s.type==='flow')return buildFlow(s);
  if(s.type==='steps')return buildSteps(s);
  if(s.type==='cards')return buildCards(s);
  if(s.type==='rca')return buildRCA(s);
  if(s.type==='sessions')return buildSessions(s);
  if(s.type==='priority')return buildPriority(s);
  if(s.type==='foreman')return buildForeman(s);
  if(s.type==='vs')return buildVS(s);
  if(s.type==='roles')return buildRoles(s);
  if(s.type==='checklist')return buildChecklist(s);
  if(s.type==='escape')return buildEscape(s);
  if(s.type==='arch')return buildArch(s);
  if(s.type==='boundary')return buildBoundary(s);
  return`<div class="slide-inner"><h2 class="slide-title">${s.title}</h2></div>`;
}

function buildCover(s){return`<div style="text-align:center;position:relative;z-index:1">
  <div class="cover-title">${s.title}</div>
  <div class="cover-sub">${s.sub}</div>
  <div class="cover-chips">
    <span class="cover-chip">39 slides</span>
    <span class="cover-chip">3 months of real logs</span>
    <span class="cover-chip">Claude Code × Termux</span>
  </div></div>`;}

function buildChapterIntro(s){return`<div class="slide-inner" style="position:relative">
  <div class="ch-num">${s.num}</div>
  <div class="ch-tag" style="color:${s.color}">${s.ch}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="slide-sub">${s.sub}</div></div>`;}

function buildLayers(s){
  const ls=s.layers.map(l=>`<div class="layer" style="animation-delay:${l.delay}ms">
    <span class="layer-num">${l.num}</span>
    <span class="layer-name">${l.name}</span>
    <span class="layer-desc">${l.desc}</span></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="slide-sub">${s.sub}</div>
  <div class="layers">${ls}</div></div>`;}

function buildTable(s){
  const head=s.cols.map(c=>`<th>${c}</th>`).join('');
  const body=s.rows.map((r,i)=>`<tr style="animation-delay:${i*60+300}ms">${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  ${s.sub?`<div class="slide-sub">${s.sub}</div>`:''}
  <table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;}

function buildCards(s){
  const css=s.cards.length===3?'c3':s.cards.length===2?'c2':'';
  const cs=s.cards.map((c,i)=>`<div class="card" style="animation-delay:${i*100+300}ms">
    <div class="card-icon">${c.icon}</div>
    <div class="card-title">${c.title}</div>
    <div class="card-body">${c.body}</div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  ${s.sub?`<div class="slide-sub">${s.sub}</div>`:''}
  <div class="cards ${css}">${cs}</div></div>`;}

function buildCode(s){return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="code-wrap">
    <span class="code-label">${s.codeLabel}</span>
    <pre id="codepre-${s.id}"></pre>
  </div></div>`;}

function buildTriple(s){
  const items=s.items.map((it,i)=>`<div class="card" style="animation-delay:${i*100+300}ms;border-color:${it.color}33">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span style="font-size:22px;font-weight:900;color:${it.color};opacity:.6">${it.n}</span>
      <span class="card-title" style="margin-bottom:0">${it.label}</span>
    </div>
    <div class="card-body">${it.desc}</div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="slide-sub">${s.sub}</div>
  <div class="cards c3">${items}</div></div>`;}

function buildFlow(s){
  const steps=s.flow.map((f,i)=>`
    <div class="flow-step${f.highlight?' highlight':''}" style="animation-delay:${i*80+300}ms">
      <span class="flow-icon">${f.icon}</span>
      <div><div class="flow-label">${f.label}</div>${f.sub?`<div class="flow-sub">${f.sub}</div>`:''}</div>
    </div>${i<s.flow.length-1?`<div class="flow-arrow" style="animation-delay:${i*80+360}ms">↓</div>`:''}`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  ${s.sub?`<div class="slide-sub">${s.sub}</div>`:''}
  <div class="flow">${steps}</div></div>`;}

function buildSteps(s){
  const items=s.steps.map((st,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;display:flex;gap:14px;align-items:flex-start">
    <span style="font-size:11px;font-weight:900;color:${s.color};flex-shrink:0;margin-top:2px">${st.n}</span>
    <div><div class="card-title">${st.title}</div><div class="card-body">${st.desc}</div></div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="cards">${items}</div></div>`;}

function buildRCA(s){
  const items=s.items.map((it,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;border-left:3px solid #F87171">
    <div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:6px">
      <span class="card-title" style="color:#F87171">${it.cause}</span>
      <span style="font-size:10px;color:var(--green);font-weight:700;white-space:nowrap">${it.fix}</span>
    </div>
    <div class="card-body">${it.symptom}</div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="slide-sub">${s.sub}</div>
  <div class="cards">${items}</div></div>`;}

function buildSessions(s){
  const items=s.sessions.map((se,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;border-color:${se.color}33;display:flex;align-items:center;gap:14px">
    <code style="font-family:'SF Mono',monospace;font-size:13px;font-weight:800;color:${se.color};flex-shrink:0">${se.name}</code>
    <div style="flex:1"><div class="card-title" style="margin-bottom:2px">${se.role}</div></div>
    <code style="font-size:11px;background:rgba(248,250,249,.06);padding:3px 8px;border-radius:6px;color:var(--muted)">${se.alias}</code>
  </div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="cards">${items}</div></div>`;}

function buildPriority(s){
  const items=s.steps.map((st,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;border-left:3px solid ${st.color};display:flex;gap:14px;align-items:flex-start">
    <span style="font-size:10px;font-weight:900;color:${st.color};flex-shrink:0;min-width:60px">${st.n}</span>
    <div><div class="card-title">${st.label}</div><div class="card-body">${st.desc}</div></div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="cards">${items}</div></div>`;}

function buildVS(s){
  const badItems=s.bad.map(b=>`<div class="vs-item">${b}</div>`).join('');
  const goodItems=s.good.map(g=>`<div class="vs-item">${g}</div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="vs">
    <div class="vs-col bad"><div class="vs-label bad">❌ Bad</div>${badItems}</div>
    <div class="vs-sep">VS</div>
    <div class="vs-col good"><div class="vs-label good">✅ Good</div>${goodItems}</div>
  </div></div>`;}

function buildForeman(s){
  const items=s.items.map((it,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;display:flex;gap:12px;align-items:center">
    <span style="font-size:11px;color:var(--muted);flex-shrink:0;min-width:110px">${it.a}</span>
    <span style="color:var(--muted);flex-shrink:0">→</span>
    <span style="font-size:13px;font-weight:700;color:${s.color}">${it.b}</span></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="hl-box" style="margin-bottom:16px">
    <div style="font-size:15px;font-weight:800;color:var(--gold);line-height:1.6">A foreman doesn't swing a hammer.<br>They just know where the wall goes.</div>
  </div>
  <div class="cards">${items}</div></div>`;}

function buildRoles(s){
  const items=s.roles.map((r,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;text-align:center;border-color:${r.color}33">
    <div style="font-size:10px;font-weight:800;color:${r.color};letter-spacing:.1em;margin-bottom:6px">${r.model}</div>
    <div class="card-title">${r.role}</div>
    <div class="card-body">${r.tasks}</div></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="cards c3">${items}</div></div>`;}

function buildChecklist(s){
  const items=s.items.map((it,i)=>`<div class="card" style="animation-delay:${i*80+300}ms;display:flex;gap:12px;align-items:flex-start">
    <span style="color:${s.color};font-weight:900;flex-shrink:0">${i+1}</span>
    <span class="card-body" style="color:var(--text)">${it}</span></div>`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="cards">${items}</div></div>`;}

function buildEscape(s){return`<div class="slide-inner" style="text-align:center">
  <div class="ch-tag" style="justify-content:center">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div style="opacity:0;animation:fadeUp .5s .3s forwards">
    <div style="font-size:clamp(60px,12vw,100px);font-weight:900;font-family:'SF Mono',monospace;
      color:var(--orange);letter-spacing:.1em;margin:24px 0;
      text-shadow:0 0 40px rgba(251,146,60,.4)">${s.key}</div>
    <div class="slide-sub" style="text-align:center;white-space:pre-line">${s.desc}</div>
  </div></div>`;}

function buildArch(s){
  const ls=s.layers.map((l,i)=>`
    <div class="layer" style="animation-delay:${i*80+300}ms;border-color:${l.color}44">
      <span class="layer-num">${i}</span>
      <span class="layer-name" style="color:${l.color}">${l.label}</span>
    </div>${i<s.layers.length-1?`<div class="flow-arrow" style="animation-delay:${i*80+360}ms;text-align:center">↓</div>`:''}`).join('');
  return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="layers">${ls}</div></div>`;}

function buildBoundary(s){return`<div class="slide-inner">
  <div class="ch-tag">${s.ch} · ${s.chLabel}</div>
  <h2 class="slide-title">${s.title}</h2>
  <div class="hl-box" style="margin-bottom:16px">
    <div style="font-size:15px;font-weight:800;color:var(--gold);line-height:1.7;white-space:pre-line">${s.quote}</div>
  </div>
  <div class="cards c2" style="opacity:0;animation:fadeUp .5s .35s forwards">
    <div class="card" style="border-color:rgba(52,211,153,.2)">
      <div class="card-title" style="color:var(--green);margin-bottom:8px">Automate ✓</div>
      ${s.auto.map(a=>`<div class="card-body" style="padding:3px 0;border-bottom:1px solid var(--border)">${a}</div>`).join('')}
    </div>
    <div class="card" style="border-color:rgba(96,165,250,.2)">
      <div class="card-title" style="color:var(--blue);margin-bottom:8px">Human decides ✓</div>
      ${s.human.map(h=>`<div class="card-body" style="padding:3px 0;border-bottom:1px solid var(--border)">${h}</div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-top:10px;border-color:rgba(248,113,113,.2);opacity:0;animation:fadeUp .5s .5s forwards">
    <div class="card-title" style="color:var(--red);margin-bottom:8px">Intentionally NOT automated</div>
    ${s.never.map(n=>`<div class="card-body" style="padding:2px 0">${n}</div>`).join('')}
  </div></div>`;}

function stripTags(str){return(str||'').replace(/<[^>]+>/g,'').replace(/\n/g,' ')}

function goTo(n,dir){
  if(n<0||n>=SLIDES.length||n===cur)return;
  const direction=dir!==undefined?dir:(n>cur?1:-1);
  const prevEl=document.getElementById('slide-'+cur);
  const nextEl=document.getElementById('slide-'+n);
  prevEl.classList.remove('active','enter-left','enter-right');
  prevEl.classList.add(direction>0?'exit-left':'exit-right');
  nextEl.style.opacity=0;
  nextEl.classList.remove('exit-left','exit-right','enter-left','enter-right');
  setTimeout(()=>{
    nextEl.classList.add('active');
    nextEl.classList.add(direction>0?'enter-left':'enter-right');
    nextEl.style.opacity='';
    nextEl.querySelectorAll('.layer,.card,.flow-step,.flow-arrow,.tbl tr').forEach(el=>{
      const d=el.style.animationDelay||'0ms';
      el.style.animation='none';
      requestAnimationFrame(()=>{el.style.animation='';el.style.animationDelay=d;el.style.animationFillMode='forwards';});
    });
    const s=SLIDES[n];
    if(s.type==='code'&&s.code)typewriterCode('codepre-'+s.id,s.code);
  },20);
  setTimeout(()=>{prevEl.classList.remove('active','exit-left','exit-right');},500);
  cur=n;updateHUD();
  if(autoplay)resetAutoTimer();
}

function go(delta){goTo(cur+delta,delta)}

function updateHUD(){
  const s=SLIDES[cur];
  const hc=document.getElementById('hud-chapter');
  hc.textContent=s.ch?`${s.ch} · ${s.chLabel}`:'INTRO';
  hc.style.color=s.color;
  document.getElementById('hud-counter').textContent=`${cur+1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width=((cur+1)/SLIDES.length*100)+'%';
  document.getElementById('progress-bar').style.background=s.color;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active',i===cur);
    if(i===cur)d.style.background=s.color; else d.style.background='';
  });
  document.querySelectorAll('.ov-thumb').forEach((t,i)=>t.classList.toggle('cur',i===cur));
  document.getElementById('btn-prev').style.opacity=cur===0?'.3':'1';
  document.getElementById('btn-next').style.opacity=cur===SLIDES.length-1?'.3':'1';
}

const typeTimers={};
function typewriterCode(id,code){
  const el=document.getElementById(id);if(!el)return;
  if(typeTimers[id])clearTimeout(typeTimers[id]);
  el.innerHTML='';let i=0;
  function tick(){
    if(i>code.length){el.innerHTML+='<span class="code-cursor"></span>';return;}
    el.textContent=code.slice(0,i);i+=2;
    typeTimers[id]=setTimeout(tick,12);
  }tick();
}

function toggleAutoplay(){
  autoplay=!autoplay;
  const btn=document.getElementById('autoplay-btn');
  const bar=document.getElementById('timer-bar');
  btn.classList.toggle('on',autoplay);
  btn.textContent=autoplay?'⏸ PAUSE':'▶ AUTO';
  bar.style.display=autoplay?'block':'none';
  if(autoplay)resetAutoTimer();
  else{clearInterval(autoTimer);document.getElementById('timer-fill').style.width='0';}
}

function resetAutoTimer(){
  clearInterval(autoTimer);
  const fill=document.getElementById('timer-fill');
  fill.style.transition='none';fill.style.width='0';
  setTimeout(()=>{fill.style.transition=`width ${autoInterval}ms linear`;fill.style.width='100%';},50);
  autoTimer=setTimeout(()=>{if(cur<SLIDES.length-1)go(1);else toggleAutoplay();},autoInterval);
}

function openOverview(){document.getElementById('overview').classList.add('open')}
function closeOverview(){document.getElementById('overview').classList.remove('open')}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key==='PageDown')go(1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'||e.key==='PageUp')go(-1);
  else if(e.key===' '){e.preventDefault();toggleAutoplay();}
  else if(e.key==='o'||e.key==='O')openOverview();
  else if(e.key==='Escape')closeOverview();
});

document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){if(dx<0)go(1);else go(-1);}
},{passive:true});

(function(){
  const c=document.getElementById('canvas');const ctx=c.getContext('2d');let pts=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;init();}
  function init(){pts=Array.from({length:50},()=>({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.5,a:Math.random()}));}
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const col=SLIDES[cur]?.color||'#D4AF37';
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=col+Math.floor(p.a*40).toString(16).padStart(2,'0');ctx.fill();
    });
    pts.forEach((p,i)=>pts.slice(i+1).forEach(q=>{
      const d=Math.hypot(p.x-q.x,p.y-q.y);
      if(d<120){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=col+Math.floor((1-d/120)*.08*255).toString(16).padStart(2,'0');
        ctx.lineWidth=.5;ctx.stroke();}
    }));
    requestAnimationFrame(draw);
  }
  addEventListener('resize',resize);resize();draw();
})();

renderAll();
document.getElementById('slide-0').classList.add('active');
updateHUD();
</script>
</body>
</html>
