<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>폰 하나로 AI를 쓴다, 만든다, 움직인다</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020404;--gold:#D4AF37;--green:#34D399;--blue:#60A5FA;
  --purple:#A78BFA;--orange:#FB923C;--red:#F87171;
  --text:#F8FAF9;--muted:rgba(248,250,249,0.5);
  --border:rgba(248,250,249,0.07);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif}

/* ─── CANVAS PARTICLES ─── */
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── PROGRESS BAR ─── */
#progress-bar{
  position:fixed;top:0;left:0;height:3px;z-index:100;
  background:var(--gold);transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ─── TOP HUD ─── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:90;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;pointer-events:none;
}
#hud-chapter{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.7;transition:color .4s}
#hud-counter{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}

/* ─── SLIDE CONTAINER ─── */
#deck{position:fixed;inset:0;z-index:10}

/* ─── INDIVIDUAL SLIDES ─── */
.slide{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:80px 40px 100px;
  opacity:0;pointer-events:none;
  transition:opacity .05s;
  overflow:hidden;
}
.slide.active{opacity:1;pointer-events:all}
.slide.enter-left{animation:slideInLeft .55s cubic-bezier(.22,1,.36,1) forwards}
.slide.enter-right{animation:slideInRight .55s cubic-bezier(.22,1,.36,1) forwards}
.slide.exit-left{animation:slideOutLeft .45s cubic-bezier(.4,0,1,1) forwards}
.slide.exit-right{animation:slideOutRight .45s cubic-bezier(.4,0,1,1) forwards}

@keyframes slideInLeft{from{opacity:0;transform:translateX(80px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideInRight{from{opacity:0;transform:translateX(-80px) scale(.97)}to{opacity:1;transform:none}}
@keyframes slideOutLeft{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-80px) scale(.97)}}
@keyframes slideOutRight{from{opacity:1;transform:none}to{opacity:0;transform:translateX(80px) scale(.97)}}

/* ─── SLIDE BG GRADIENT ─── */
.slide::before{
  content:'';position:absolute;inset:0;z-index:-1;opacity:.07;
  background:radial-gradient(ellipse 70% 60% at 50% 30%, var(--accent,#D4AF37), transparent);
  transition:opacity .6s;
}
.slide.active::before{opacity:.12}

/* ─── CONTENT MAX-WIDTH ─── */
.slide-inner{width:100%;max-width:800px;margin:0 auto}

/* ─── CHAPTER TAG ─── */
.ch-tag{
  display:inline-flex;align-items:center;gap:8px;
  font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent,var(--gold));margin-bottom:20px;
  opacity:0;animation:fadeUp .5s .1s forwards;
}
.ch-tag::before{content:'';display:block;width:28px;height:2px;background:currentColor;border-radius:1px}

/* ─── SLIDE TITLE ─── */
.slide-title{
  font-size:clamp(28px,5vw,52px);font-weight:900;line-height:1.1;
  letter-spacing:-.035em;margin-bottom:24px;
  opacity:0;animation:fadeUp .5s .18s forwards;
}
.slide-title em{color:var(--accent,var(--gold));font-style:normal}
.slide-title .dim{color:var(--muted)}

/* ─── SUBTITLE ─── */
.slide-sub{
  font-size:clamp(14px,2vw,18px);color:var(--muted);line-height:1.7;
  margin-bottom:32px;max-width:600px;
  opacity:0;animation:fadeUp .5s .26s forwards;
}
.slide-sub strong{color:var(--text)}

/* ─── CARDS GRID ─── */
.cards{display:grid;gap:12px;width:100%}
.cards.c2{grid-template-columns:1fr 1fr}
.cards.c3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:640px){.cards.c2,.cards.c3{grid-template-columns:1fr}}

.card{
  background:rgba(248,250,249,.04);border:1px solid var(--border);
  border-radius:14px;padding:18px;
  opacity:0;transform:translateY(16px);
  transition:transform .3s,background .2s;
}
.card:hover{background:rgba(248,250,249,.07);transform:translateY(-2px)}

.card-icon{font-size:24px;margin-bottom:8px}
.card-title{font-size:14px;font-weight:800;margin-bottom:5px}
.card-body{font-size:12px;color:var(--muted);line-height:1.6}
.card-body strong{color:var(--text)}

/* ─── LAYER STACK ─── */
.layers{display:flex;flex-direction:column;gap:6px;width:100%;max-width:560px}
.layer{
  display:flex;align-items:center;gap:14px;
  background:rgba(248,250,249,.04);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;
  opacity:0;transform:translateX(-20px);
}
.layer-num{
  font-size:10px;font-weight:900;letter-spacing:.06em;
  color:var(--accent,var(--gold));flex-shrink:0;min-width:20px;
}
.layer-name{font-size:13px;font-weight:700;flex:1}
.layer-desc{font-size:11px;color:var(--muted);text-align:right}

/* ─── CODE BLOCK ─── */
.code-wrap{
  background:#060d0a;border:1px solid rgba(52,211,153,.15);
  border-radius:12px;padding:20px;width:100%;
  opacity:0;animation:fadeUp .5s .3s forwards;
  position:relative;
}
.code-wrap pre{
  font-family:'SF Mono','Fira Code',monospace;font-size:13px;
  color:var(--green);line-height:1.7;white-space:pre-wrap;word-break:break-all;
}
.code-wrap pre .c{color:var(--muted)}
.code-wrap pre .h{color:var(--gold)}
.code-wrap pre .o{color:var(--orange)}
.code-wrap pre .b{color:var(--blue)}
.code-wrap pre .r{color:var(--red)}
.code-label{
  font-size:9px;font-weight:700;color:var(--blue);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:10px;display:block;
}
.code-cursor{display:inline-block;width:8px;height:14px;background:var(--green);vertical-align:middle;animation:blink 1.1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ─── TABLE ─── */
.tbl{width:100%;border-collapse:collapse;opacity:0;animation:fadeUp .5s .3s forwards}
.tbl th{
  font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;text-align:left;padding:10px 12px;
  border-bottom:1px solid var(--border);
}
.tbl td{
  font-size:13px;padding:10px 12px;border-bottom:1px solid rgba(248,250,249,.04);
  vertical-align:top;line-height:1.5;
}
.tbl td:first-child{font-weight:700;color:var(--text);white-space:nowrap}
.tbl td:not(:first-child){color:var(--muted)}
.tbl td code{font-family:'SF Mono',monospace;font-size:12px;color:var(--green)}
.tbl tr{opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}

/* ─── HIGHLIGHT BOX ─── */
.hl-box{
  background:rgba(212,175,55,.05);border:1px solid rgba(212,175,55,.25);
  border-radius:12px;padding:18px;width:100%;
  opacity:0;animation:fadeUp .5s .35s forwards;
}
.hl-box.blue{background:rgba(96,165,250,.05);border-color:rgba(96,165,250,.25)}
.hl-box.green{background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.25)}
.hl-box.red{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.25)}
.hl-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px}
.hl-label.gold{color:var(--gold)}
.hl-label.blue{color:var(--blue)}
.hl-label.green{color:var(--green)}
.hl-label.red{color:var(--red)}
.hl-text{font-size:13px;color:var(--muted);line-height:1.7}
.hl-text strong{color:var(--text)}

/* ─── VS COMPARISON ─── */
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:100%}
.vs-col{background:rgba(248,250,249,.04);border:1px solid var(--border);border-radius:12px;padding:16px;opacity:0;animation:fadeUp .5s .3s forwards}
.vs-col.bad{border-color:rgba(248,113,113,.2);background:rgba(248,113,113,.04)}
.vs-col.good{border-color:rgba(52,211,153,.2);background:rgba(52,211,153,.04)}
.vs-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.vs-label.bad{color:var(--red)}
.vs-label.good{color:var(--green)}
.vs-sep{font-size:20px;color:var(--muted);text-align:center;opacity:0;animation:fadeUp .5s .4s forwards}
.vs-item{font-size:12px;color:var(--muted);padding:4px 0;border-bottom:1px solid rgba(248,250,249,.04);line-height:1.5}
.vs-item:last-child{border-bottom:none}

/* ─── STAT CHIPS ─── */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;opacity:0;animation:fadeUp .5s .3s forwards}
.stat-chip{
  background:rgba(248,250,249,.05);border:1px solid var(--border);
  border-radius:12px;padding:14px 20px;text-align:center;min-width:100px;
}
.stat-n{font-size:28px;font-weight:900;line-height:1;color:var(--accent,var(--green));margin-bottom:4px}
.stat-l{font-size:10px;color:var(--muted)}

/* ─── FLOW DIAGRAM ─── */
.flow{display:flex;flex-direction:column;gap:0;width:100%;max-width:500px}
.flow-step{
  display:flex;align-items:center;gap:14px;
  background:rgba(248,250,249,.04);border:1px solid var(--border);
  border-radius:10px;padding:12px 16px;
  opacity:0;transform:translateY(10px);
}
.flow-step.highlight{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.06)}
.flow-icon{font-size:18px;flex-shrink:0}
.flow-label{font-size:13px;font-weight:700}
.flow-sub{font-size:11px;color:var(--muted)}
.flow-arrow{text-align:center;color:var(--muted);font-size:14px;padding:2px 0;opacity:0}

/* ─── COVER SLIDE ─── */
.cover-title{
  font-size:clamp(32px,6vw,64px);font-weight:900;line-height:1.05;
  letter-spacing:-.04em;text-align:center;margin-bottom:20px;
  background:linear-gradient(135deg,var(--gold) 0%,#ffe57a 30%,var(--gold) 60%,#a07a00 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  opacity:0;animation:coverIn .9s .2s cubic-bezier(.22,1,.36,1) forwards;
}
.cover-sub{
  font-size:clamp(14px,2.2vw,20px);color:var(--muted);text-align:center;
  line-height:1.6;max-width:560px;
  opacity:0;animation:coverIn .8s .5s forwards;
}
.cover-chips{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:28px;
  opacity:0;animation:coverIn .8s .7s forwards;
}
.cover-chip{
  font-size:11px;font-weight:700;padding:6px 14px;border-radius:20px;
  border:1px solid rgba(212,175,55,.3);color:var(--gold);
  background:rgba(212,175,55,.08);
}
@keyframes coverIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ─── CHAPTER INTRO ─── */
.ch-num{
  font-size:clamp(80px,15vw,140px);font-weight:900;letter-spacing:-.05em;
  line-height:.9;color:var(--accent,var(--gold));opacity:.15;
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:-1;user-select:none;pointer-events:none;
  animation:numGrow 1s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes numGrow{from{opacity:0;transform:translate(-50%,-50%) scale(.6)}to{opacity:.15;transform:translate(-50%,-50%) scale(1)}}

/* ─── NAVIGATION ─── */
#nav{
  position:fixed;bottom:0;left:0;right:0;z-index:90;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;
  background:linear-gradient(transparent,rgba(2,4,4,.9));
}
.nav-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(248,250,249,.05);border:1px solid var(--border);
  border-radius:12px;padding:10px 18px;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--muted);
  transition:all .2s;user-select:none;
}
.nav-btn:hover{background:rgba(248,250,249,.1);color:var(--text);border-color:rgba(248,250,249,.15)}
.nav-btn:active{transform:scale(.96)}

#dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:400px}
.dot{
  width:5px;height:5px;border-radius:50%;background:var(--muted);
  cursor:pointer;transition:all .3s;flex-shrink:0;
}
.dot.active{background:var(--gold);transform:scale(1.6)}
.dot:hover{background:var(--text)}

/* ─── AUTO-PLAY CONTROL ─── */
#autoplay-btn{
  position:fixed;top:14px;right:80px;z-index:95;
  background:rgba(248,250,249,.05);border:1px solid var(--border);
  border-radius:8px;padding:6px 12px;cursor:pointer;
  font-size:10px;font-weight:700;color:var(--muted);
  transition:all .2s;
}
#autoplay-btn:hover{color:var(--text);background:rgba(248,250,249,.1)}
#autoplay-btn.on{color:var(--green);border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08)}

/* ─── OVERVIEW MODE ─── */
#overview{
  position:fixed;inset:0;z-index:200;
  background:rgba(2,4,4,.97);
  display:none;padding:60px 24px;overflow-y:auto;
}
#overview.open{display:block}
.overview-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;max-width:1200px;margin:0 auto;
}
.ov-thumb{
  background:rgba(248,250,249,.04);border:1px solid var(--border);
  border-radius:10px;padding:14px;cursor:pointer;
  transition:all .2s;aspect-ratio:16/9;
  display:flex;flex-direction:column;justify-content:center;gap:6px;
}
.ov-thumb:hover{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.06);transform:scale(1.03)}
.ov-thumb.cur{border-color:var(--gold);background:rgba(212,175,55,.1)}
.ov-n{font-size:9px;color:var(--muted);font-weight:700}
.ov-t{font-size:11px;font-weight:800;line-height:1.3}
.ov-close{
  position:fixed;top:20px;right:24px;
  font-size:22px;cursor:pointer;color:var(--muted);
  background:none;border:none;
}

/* ─── KEYBOARD HINT ─── */
#kbd-hint{
  position:fixed;bottom:70px;right:24px;z-index:90;
  font-size:9px;color:var(--muted);text-align:right;line-height:1.8;
  opacity:.4;pointer-events:none;
}
#kbd-hint kbd{
  display:inline-block;background:rgba(248,250,249,.08);
  border:1px solid var(--border);border-radius:3px;
  padding:1px 5px;font-size:9px;font-family:inherit;
}

/* ─── TIMER BAR ─── */
#timer-bar{
  position:fixed;bottom:60px;left:0;right:0;height:2px;z-index:89;
  background:rgba(248,250,249,.05);display:none;
}
#timer-fill{height:100%;background:var(--green);width:0;transition:width .1s linear}

/* ─── TOUCH SWIPE ─── */
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="progress-bar"></div>

<div id="hud">
  <span id="hud-chapter"></span>
  <span id="hud-counter"></span>
</div>

<button id="autoplay-btn" onclick="toggleAutoplay()">▶ AUTO</button>

<div id="deck"></div>

<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="go(-1)">← 이전</button>
  <div id="dots"></div>
  <button class="nav-btn" id="btn-next" onclick="go(1)">다음 →</button>
</div>

<div id="timer-bar"><div id="timer-fill"></div></div>

</div>

<div id="overview">
  <button class="ov-close" onclick="closeOverview()">✕</button>
  <div class="overview-grid" id="ov-grid"></div>
</div>

];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let cur = 0, prev = -1, autoplay = false, autoTimer = null, autoInterval = 6000;
let touchStartX = 0, touchStartY = 0;

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function renderAll() {
  const deck = document.getElementById('deck');
  SLIDES.forEach((s,i) => {
    const el = document.createElement('div');
    el.className = 'slide';
    el.id = 'slide-' + i;
    el.style.setProperty('--accent', s.color);
    el.innerHTML = buildSlide(s);
    deck.appendChild(el);
  });

  // DOTS
  const dots = document.getElementById('dots');
  SLIDES.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.onclick = () => goTo(i);
    dots.appendChild(d);
  });

  // OVERVIEW GRID
  const grid = document.getElementById('ov-grid');
  SLIDES.forEach((s,i) => {
    const t = document.createElement('div');
    t.className = 'ov-thumb';
    t.style.borderColor = s.color + '40';
    t.innerHTML = `<div class="ov-n" style="color:${s.color}">${s.ch || 'COVER'}</div><div class="ov-t">${stripTags(s.title)}</div>`;
    t.onclick = () => { goTo(i); closeOverview(); };
    t.id = 'ov-' + i;
    grid.appendChild(t);
  });
}

function buildSlide(s) {
  if (s.type === 'cover') return buildCover(s);
  if (s.type === 'chapter-intro') return buildChapterIntro(s);
  if (s.type === 'layers') return buildLayers(s);
  if (s.type === 'table') return buildTable(s);
  if (s.type === 'triple') return buildTriple(s);
  if (s.type === 'code') return buildCode(s);
  if (s.type === 'incident') return buildFlow(s);
  if (s.type === 'flow') return buildFlow(s);
  if (s.type === 'steps') return buildSteps(s);
  if (s.type === 'prereq') return buildCards(s);
  if (s.type === 'cards') return buildCards(s);
  if (s.type === 'rca') return buildRCA(s);
  if (s.type === 'sessions') return buildSessions(s);
  if (s.type === 'priority') return buildPriority(s);
  if (s.type === 'foreman') return buildForeman(s);
  if (s.type === 'vs') return buildVS(s);
  if (s.type === 'roles') return buildRoles(s);
  if (s.type === 'checklist') return buildChecklist(s);
  if (s.type === 'escape') return buildEscape(s);
  if (s.type === 'arch') return buildArch(s);
  if (s.type === 'boundary') return buildBoundary(s);
  return `<div class="slide-inner"><div class="ch-tag">${s.ch}</div><h2 class="slide-title">${s.title}</h2></div>`;
}

function stripTags(str) {
  return (str||'').replace(/<[^>]+>/g,'').replace(/\n/g,' ');

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function goTo(n, dir) {
  if (n < 0 || n >= SLIDES.length) return;
  if (n === cur) return;

  const direction = dir !== undefined ? dir : (n > cur ? 1 : -1);
  const prevEl = document.getElementById('slide-' + cur);
  const nextEl = document.getElementById('slide-' + n);

  prevEl.classList.remove('active','enter-left','enter-right');
  prevEl.classList.add(direction > 0 ? 'exit-left' : 'exit-right');

  nextEl.style.opacity = 0;
  nextEl.classList.remove('exit-left','exit-right','enter-left','enter-right');

  setTimeout(() => {
    nextEl.classList.add('active');
    nextEl.classList.add(direction > 0 ? 'enter-left' : 'enter-right');
    nextEl.style.opacity = '';

    // animate children
    nextEl.querySelectorAll('.layer,.card,.flow-step,.flow-arrow,.tbl tr').forEach(el => {
      const d = el.style.animationDelay || '0ms';
      el.style.animation = 'none';
      requestAnimationFrame(() => {
        el.style.animation = '';
        el.style.animationDelay = d;
        el.style.animationFillMode = 'forwards';
      });
    });

    // typewriter for code
    const s = SLIDES[n];
    if (s.type === 'code' && s.code) {
      typewriterCode('codepre-' + s.id, s.code);
    }
  }, 20);

  setTimeout(() => { prevEl.classList.remove('active','exit-left','exit-right'); }, 500);

  cur = n;
  updateHUD();
  if (autoplay) resetAutoTimer();
}

function go(delta) { goTo(cur + delta, delta); }

function updateHUD() {
  const s = SLIDES[cur];
  const hc = document.getElementById('hud-chapter');
  hc.textContent = s.ch ? `${s.ch} · ${s.chLabel}` : 'INTRO';
  hc.style.color = s.color;

  document.getElementById('hud-counter').textContent = `${cur + 1} / ${SLIDES.length}`;
  document.getElementById('progress-bar').style.width = ((cur+1)/SLIDES.length * 100) + '%';
  document.getElementById('progress-bar').style.background = s.color;

  document.querySelectorAll('.dot').forEach((d,i) => {
    d.classList.toggle('active', i === cur);
    if (i === cur) d.style.background = s.color;
    else d.style.background = '';
  });

  document.querySelectorAll('.ov-thumb').forEach((t,i) => {
    t.classList.toggle('cur', i === cur);
  });

  document.getElementById('btn-prev').style.opacity = cur === 0 ? '.3' : '1';
  document.getElementById('btn-next').style.opacity = cur === SLIDES.length-1 ? '.3' : '1';
}

// ─────────────────────────────────────────
// TYPEWRITER
// ─────────────────────────────────────────
const typeTimers = {};
function typewriterCode(id, code) {
  const el = document.getElementById(id);
  if (!el) return;
  if (typeTimers[id]) clearTimeout(typeTimers[id]);
  el.innerHTML = '';
  let i = 0;
  function tick() {
    if (i > code.length) { el.innerHTML += '<span class="code-cursor"></span>'; return; }
    el.textContent = code.slice(0, i);
    i += 2;
    typeTimers[id] = setTimeout(tick, 12);
  }
  tick();
}

// ─────────────────────────────────────────
// AUTOPLAY
// ─────────────────────────────────────────
function toggleAutoplay() {
  autoplay = !autoplay;
  const btn = document.getElementById('autoplay-btn');
  const bar = document.getElementById('timer-bar');
  btn.classList.toggle('on', autoplay);
  btn.textContent = autoplay ? '⏸ PAUSE' : '▶ AUTO';
  bar.style.display = autoplay ? 'block' : 'none';
  if (autoplay) resetAutoTimer();
  else { clearInterval(autoTimer); document.getElementById('timer-fill').style.width = '0'; }
}

function resetAutoTimer() {
  clearInterval(autoTimer);
  const fill = document.getElementById('timer-fill');
  fill.style.transition = 'none';
  fill.style.width = '0';
  setTimeout(() => {
    fill.style.transition = `width ${autoInterval}ms linear`;
    fill.style.width = '100%';
  }, 50);
  autoTimer = setTimeout(() => {
    if (cur < SLIDES.length - 1) go(1);
    else { toggleAutoplay(); }
  }, autoInterval);
}

// ─────────────────────────────────────────
// OVERVIEW
// ─────────────────────────────────────────
function openOverview() { document.getElementById('overview').classList.add('open'); }
function closeOverview() { document.getElementById('overview').classList.remove('open'); }

// ─────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') go(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') go(-1);
  else if (e.key === ' ') { e.preventDefault(); toggleAutoplay(); }
  else if (e.key === 'o' || e.key === 'O') openOverview();
  else if (e.key === 'Escape') closeOverview();
});

// ─────────────────────────────────────────
// TOUCH SWIPE
// ─────────────────────────────────────────
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (dx < 0) go(1); else go(-1);
  }
}, {passive:true});

// ─────────────────────────────────────────
// PARTICLE CANVAS
// ─────────────────────────────────────────
(function() {
  const c = document.getElementById('canvas');
  const ctx = c.getContext('2d');
  let pts = [];
  function resize() { c.width = innerWidth; c.height = innerHeight; init(); }
  function init() {
    pts = Array.from({length:50}, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      vx: (Math.random()-.5) * .3, vy: (Math.random()-.5) * .3,
      r: Math.random() * 1.5 + .5, a: Math.random()
    }));
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    const col = SLIDES[cur]?.color || '#D4AF37';
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > c.width) p.vx *= -1;
      if (p.y < 0 || p.y > c.height) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = col + Math.floor(p.a * 40).toString(16).padStart(2,'0');
      ctx.fill();
    });
    pts.forEach((p,i) => pts.slice(i+1).forEach(q => {
      const d = Math.hypot(p.x-q.x, p.y-q.y);
      if (d < 120) {
        ctx.beginPath();
        ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
        ctx.strokeStyle = col + Math.floor((1-d/120)*.08*255).toString(16).padStart(2,'0');
        ctx.lineWidth = .5;
        ctx.stroke();
      }
    }));
    requestAnimationFrame(draw);
  }
  addEventListener('resize', resize);
  resize(); draw();
})();

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
renderAll();
document.getElementById('slide-0').classList.add('active');
updateHUD();
</script>
